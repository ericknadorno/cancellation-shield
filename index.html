<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancellation Shield — The Haus Group</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#0c0f1a;color:#c8d0e0;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0c0f1a}
::-webkit-scrollbar-thumb{background:#1e2545;border-radius:3px}
.header{background:#12162a;border-bottom:1px solid #1e2545;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,#ef4444,#f59e0b,#22c55e);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.logo-text{font-size:14px;font-weight:800;letter-spacing:1px;color:#f0f4ff}
.logo-sub{font-size:9px;color:#4a5280;letter-spacing:2px}
.prop-btns{display:flex;gap:4px}
.prop-btn{padding:5px 12px;border-radius:5px;border:1px solid #1e2545;background:#12162a;color:#4a5280;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.prop-btn.active{border-color:#4f6ef7;background:#1e3a8a;color:#93b4ff}
.kpis{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #1e2545}
.kpi{padding:10px 12px;text-align:center}
.kpi-label{font-size:8px;color:#4a5280;font-weight:700;letter-spacing:1.5px;margin-bottom:2px}
.kpi-value{font-size:22px;font-weight:900;line-height:1.1}
.kpi-sub{font-size:9px;color:#3a4270;margin-top:1px}
.tabs{display:flex;border-bottom:1px solid #1e2545;background:#0e1125}
.tab{padding:8px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:#4a5280;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.tab.active{border-bottom-color:#4f6ef7;color:#93b4ff}
.tab-icon{font-size:13px}
.nav{display:flex;align-items:center;gap:6px;padding:0 14px;margin-left:auto;font-size:10px}
.nav-btn{background:#1e2545;border:none;color:#7080b0;padding:3px 7px;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}
.nav-btn.active{background:#1e3a8a;color:#93b4ff;border:1px solid #4f6ef7}
.nav-today{background:#1e3a8a;border:none;color:#93b4ff;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:9px;font-weight:700;font-family:inherit}
.content{display:flex}
.main{flex:1;overflow:hidden}
/* Timeline */
.timeline-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 158px)}
.timeline{display:inline-flex;min-width:100%}
.tl-labels{flex-shrink:0;position:sticky;left:0;z-index:10;background:#0c0f1a}
.tl-label-hdr{height:28px;background:#12162a;border-bottom:1px solid #1e2545;border-right:1px solid #1e2545}
.tl-label{display:flex;align-items:center;padding:0 6px;border-bottom:1px solid #12162a;border-right:1px solid #1e254540;font-size:9px}
.tl-label-prop{color:#3a4270;font-size:8px;font-weight:700}
.tl-label-room{color:#8090c0;font-weight:600;margin-left:4px}
.tl-days{display:flex}
.tl-day-col{flex-shrink:0}
.tl-day-hdr{height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#12162a;border-bottom:1px solid #1e2545;border-right:1px solid #12162a}
.tl-day-hdr.today{background:#1e3a8a}
.tl-day-name{font-size:7px;font-weight:600}
.tl-day-num{font-weight:700}
.tl-cell{border-bottom:1px solid #0e1125;cursor:default;display:flex;align-items:center;justify-content:center;transition:opacity .1s}
.tl-cell.res{cursor:pointer}
.tl-cell.res:hover{opacity:1!important}
.tl-cell.arrival{border-radius:3px 0 0 3px}
.tl-cell-name{font-size:7px;color:#fff;font-weight:800;text-shadow:0 1px 3px #000;overflow:hidden;white-space:nowrap;padding:0 2px}
.legend{display:flex;gap:14px;padding:6px 12px;border-top:1px solid #1e2545;font-size:9px;position:sticky;left:0}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.legend-label{color:#4a5280}
/* Tables */
.table-wrap{padding:14px;overflow-y:auto;max-height:calc(100vh - 158px)}
.table-title{font-size:12px;font-weight:800;margin-bottom:10px;color:#f0f4ff}
.table{background:#12162a;border-radius:6px;overflow:hidden;border:1px solid #1e2545}
.table-hdr{padding:6px 8px;border-bottom:1px solid #1e2545;font-size:8px;font-weight:800;color:#3a4270;letter-spacing:1px;display:grid;gap:1px}
.table-row{padding:4px 8px;border-bottom:1px solid #1e254530;font-size:10px;cursor:pointer;display:grid;gap:1px;transition:background .1s}
.table-row:hover{background:rgba(79,110,247,.08)}
.table-footer{padding:8px;border-top:1px solid #1e2545;font-size:10px;color:#4a5280;display:flex;justify-content:space-between}
/* Detail panel */
.panel{width:320px;border-left:1px solid #1e2545;background:#12162a;overflow-y:auto;max-height:calc(100vh - 158px);flex-shrink:0}
.panel-hdr{padding:12px 14px;border-bottom:1px solid #1e2545;display:flex;justify-content:space-between;align-items:start}
.panel-name{font-size:14px;font-weight:800;color:#f0f4ff}
.panel-sub{font-size:10px;color:#4a5280}
.panel-close{background:none;border:none;color:#4a5280;font-size:16px;cursor:pointer;padding:0 4px;font-family:inherit}
.panel-risk{margin:12px;padding:14px;border-radius:6px}
.panel-score{font-size:26px;font-weight:900}
.panel-level{font-size:11px;margin-left:8px;font-weight:800}
.panel-override{display:inline-block;font-size:8px;padding:2px 6px;border-radius:3px;background:#1e2545;color:#6a7aaa;margin-left:8px}
.panel-details{padding:0 14px}
.panel-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e254520;font-size:10px}
.panel-row-label{color:#4a5280}
.panel-row-value{color:#c8d0e0;font-weight:500;text-align:right;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-factors{padding:10px 14px}
.panel-factors-title{font-size:8px;font-weight:800;color:#3a4270;letter-spacing:1.5px;margin-bottom:6px}
.factor-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:3px;background:#ef444418;color:#ef9090;border:1px solid #ef444420;margin:1px}
/* Colors */
.c-high{color:#ef4444}.c-med{color:#f59e0b}.c-low{color:#22c55e}.c-blue{color:#60a5fa}.c-purple{color:#a78bfa}.c-white{color:#f0f4ff}
.bg-high{background:#ef4444}.bg-med{background:#f59e0b}.bg-low{background:#22c55e}.bg-blue{background:#60a5fa}.bg-duve{background:#4ade80}
.obg-high{background:rgba(239,68,68,.15)}.obg-med{background:rgba(245,158,11,.10)}.obg-low{background:rgba(34,197,94,.08)}
/* OB subtitle */
.ob-sub{font-size:9px;color:#4a5280;margin-bottom:12px}
.ob-empty{padding:40px;text-align:center;color:#3a4270}
/* Responsive */
@media(max-width:900px){.kpis{grid-template-columns:repeat(4,1fr)}.panel{width:280px}}
</style>
</head>

  // KPIs
  h+=`<div class="kpis">`;
  [{l:"RESERVAS",v:res.length,c:"#f0f4ff"},{l:"HIGH RISK",v:high.length,s:"€"+Math.round(high.reduce((s,r)=>s+r.total,0)/1000)+"K",c:"#ef4444"},
   {l:"MEDIUM",v:med.length,s:"€"+Math.round(med.reduce((s,r)=>s+r.total,0)/1000)+"K",c:"#f59e0b"},
   {l:"LOW/SAFE",v:low.length,s:low.filter(r=>r.override).length+" overrides",c:"#22c55e"},
   {l:"RETENÇÃO",v:retention.length,s:"contactar",c:"#60a5fa"},
   {l:"OB DIAS",v:ob.length,s:ob.reduce((s,o)=>s+o.ob,0)+" unit-nights",c:"#a78bfa"},
   {l:"OB RECEITA",v:"€"+Math.round(ob.reduce((s,o)=>s+o.ob*o.avgRate,0)/1000)+"K",s:"potencial",c:"#c084fc"}
  ].forEach(k=>{h+=`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-value" style="color:${k.c}">${k.v}</div>${k.s?`<div class="kpi-sub">${k.s}</div>`:""}</div>`});
  h+=`</div>`;

  // Tabs + Nav
  h+=`<div class="tabs">`;
  [{id:"timeline",icon:"▦",label:"Timeline"},{id:"retention",icon:"☎",label:"Retenção"},{id:"overbooking",icon:"⊕",label:"Overbooking"}].forEach(t=>{
    h+=`<button class="tab${state.tab===t.id?" active":""}" onclick="setTab('${t.id}')"><span class="tab-icon">${t.icon}</span>${t.label}</button>`;
  });
  h+=`<div class="nav">`;
  h+=`<button class="nav-btn" onclick="navPrev()">◀</button>`;
  h+=`<button class="nav-today" onclick="navToday()">HOJE</button>`;
  h+=`<button class="nav-btn" onclick="navNext()">▶</button>`;
  h+=`<span style="color:#3a4270;margin:0 4px">|</span>`;
  [14,30,60,90].forEach(d=>{h+=`<button class="nav-btn${state.viewDays===d?" active":""}" onclick="setDays(${d})">${d}d</button>`});
  h+=`</div></div>`;

  // Content
  h+=`<div class="content"><div class="main">`;

  // TIMELINE
  if(state.tab==="timeline"){
    h+=`<div class="timeline-wrap"><div class="timeline">`;
    h+=`<div class="tl-labels" style="width:${labelW}px"><div class="tl-label-hdr"></div>`;
    rows.forEach((row,i)=>{h+=`<div class="tl-label" style="height:${rowH}px;background:${i%2===0?"#0c0f1a":"#0e1125"}"><span class="tl-label-prop" style="width:32px">${SHORT[row.prop]}</span><span class="tl-label-room">${row.room}</span></div>`});
    h+=`</div><div class="tl-days">`;
    days.forEach((day,di)=>{
      const isToday=day===today;
      const isWknd=[0,6].includes(new Date(day).getDay());
      h+=`<div class="tl-day-col" style="width:${cellW}px">`;
      h+=`<div class="tl-day-hdr${isToday?" today":""}"><span class="tl-day-name" style="color:${isToday?"#93b4ff":isWknd?"#4a5280":"#3a4270"}">${dn(day)}</span><span class="tl-day-num" style="font-size:${cellW>=38?10:8}px;color:${isToday?"#fff":"#6070a0"}">${new Date(day).getDate()}</span></div>`;
      rows.forEach((row,ri)=>{
        const r=row.res.find(x=>x.arrival<=day&&x.departure>day);
        if(!r){h+=`<div class="tl-cell" style="height:${rowH}px;background:${isWknd?"#0b0e18":"#0c0f1a"}"></div>`;return}
        const isArr=r.arrival===day;
        const bg=cellBg(r);
        h+=`<div class="tl-cell res${isArr?" arrival":""}" style="height:${rowH}px;background:${bg};opacity:${isArr?1:.7}" onclick="selectRes('${r.id}')" title="${r.guest} | ${r.level} (${r.score}) | ${r.rate}">`;
        if(isArr&&cellW>=30)h+=`<span class="tl-cell-name">${(r.guest.split(" ").pop()||"").slice(0,5)}</span>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    });
    h+=`</div></div>`;
    h+=`<div class="legend">`;
    [{c:"#ef4444",l:"HIGH risk"},{c:"#f59e0b",l:"MEDIUM"},{c:"#22c55e",l:"LOW"},{c:"#60a5fa",l:"NR+Paid"},{c:"#4ade80",l:"Duve preCheckedIn"}].forEach(x=>{
      h+=`<div class="legend-item"><div class="legend-dot" style="background:${x.c}"></div><span class="legend-label">${x.l}</span></div>`;
    });
    h+=`</div></div>`;
  }

  // RETENTION
  if(state.tab==="retention"){
    const cols="32px 40px 48px 44px 130px 52px 36px 36px 52px 1fr";
    h+=`<div class="table-wrap"><div class="table-title">Reservas para contactar — ${retention.length}</div><div class="table">`;
    h+=`<div class="table-hdr" style="grid-template-columns:${cols}"><span>#</span><span>SCORE</span><span>RISCO</span><span>PROP</span><span>GUEST</span><span>ARRIVAL</span><span>N</span><span>DIAS</span><span>TMPL</span><span>OFERTA</span></div>`;
    retention.forEach((r,i)=>{
      h+=`<div class="table-row" style="grid-template-columns:${cols};background:${i%2===0?"transparent":"#0e112510"}" onclick="selectRes('${r.id}')">`;
      h+=`<span style="color:#4a5280">${i+1}</span>`;
      h+=`<span style="font-weight:800;color:${riskColor(r.level)}">${r.score}</span>`;
      h+=`<span style="font-weight:700;color:${riskColor(r.level)};font-size:9px">${r.level}</span>`;
      h+=`<span style="color:#5a6a9a;font-size:9px">${SHORT[r.prop]||r.prop}</span>`;
      h+=`<span style="color:#c8d0e0;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.guest}</span>`;
      h+=`<span style="color:#6a7aaa">${fmt(r.arrival)}</span>`;
      h+=`<span style="color:#6a7aaa">${r.nights}n</span>`;
      h+=`<span style="color:${r.daysUntil<=7?"#ef4444":"#6a7aaa"};font-weight:${r.daysUntil<=7?800:400}">${r.daysUntil}d</span>`;
      h+=`<span style="color:#4f6ef7;font-weight:700">${r.template}</span>`;
      h+=`<span style="color:#4a5280;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.offer}</span>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  }

  // OVERBOOKING
  if(state.tab==="overbooking"){
    const cols="64px 36px 44px 48px 40px 44px 1fr 56px";
    h+=`<div class="table-wrap"><div class="table-title">Overbooking — Apartamentos para abrir à venda</div>`;
    h+=`<div class="ob-sub">Ocup ≥70% + HIGH risk. Máx 40% das HIGH. Reduz 1 c/ retenção activa.</div>`;
    if(ob.length===0){h+=`<div class="ob-empty">Nenhuma oportunidade no período</div>`}
    else{
      h+=`<div class="table"><div class="table-hdr" style="grid-template-columns:${cols}"><span>DATA</span><span>DIA</span><span>PROP</span><span>OCUP</span><span>HIGH</span><span>OB</span><span>TIPO APT</span><span>RATE</span></div>`;
      ob.forEach((o,i)=>{
        h+=`<div class="table-row" style="grid-template-columns:${cols};background:${o.ob>=2?"rgba(239,68,68,.06)":"transparent"}">`;
        h+=`<span style="color:#c8d0e0;font-weight:700">${fmt(o.date)}</span>`;
        h+=`<span style="color:#4a5280">${o.dow}</span>`;
        h+=`<span style="color:#6a7aaa;font-size:9px">${SHORT[o.prop]||o.prop}</span>`;
        h+=`<span style="color:${o.occPct>=90?"#ef4444":"#f59e0b"};font-weight:800">${Math.round(o.occPct)}%</span>`;
        h+=`<span style="color:#ef4444;font-weight:800">${o.nHigh}</span>`;
        h+=`<span style="color:#a78bfa;font-weight:900;font-size:13px">+${o.ob}</span>`;
        h+=`<span style="color:#5a6a9a;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.rooms}</span>`;
        h+=`<span style="color:#22c55e;font-weight:700">€${o.avgRate}</span>`;
        h+=`</div>`;
      });
      h+=`<div class="table-footer"><span>${ob.length} dias | ${ob.reduce((s,o)=>s+o.ob,0)} unit-nights</span><span style="color:#22c55e;font-weight:700">Receita potencial: €${Math.round(ob.reduce((s,o)=>s+o.ob*o.avgRate,0)).toLocaleString()}</span></div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }

  h+=`</div>`;

  // DETAIL PANEL
  if(sel){
    const bg=riskColor(sel.level);
    h+=`<div class="panel"><div class="panel-hdr"><div><div class="panel-name">${sel.guest}</div><div class="panel-sub">${sel.prop} — ${sel.room}</div></div><button class="panel-close" onclick="closeSel()">✕</button></div>`;
    h+=`<div class="panel-risk" style="background:${bg}18;border:1px solid ${bg}30"><span class="panel-score" style="color:${bg}">${sel.score}</span><span class="panel-level" style="color:${bg}">${sel.level}</span>`;
    if(sel.override)h+=`<span class="panel-override">${sel.override}</span>`;
    h+=`</div><div class="panel-details">`;
    [{l:"Arrival",v:fmt(sel.arrival)+" ("+sel.daysUntil+"d)"},{l:"Departure",v:fmt(sel.departure)},{l:"Noites",v:sel.nights},
     {l:"Rate Plan",v:sel.rate},{l:"ADR",v:"€"+sel.adr},{l:"Total",v:"€"+sel.total},{l:"Canal",v:sel.source},
     {l:"Pagamento",v:sel.payment||"—"},{l:"Email",v:sel.email||"—"},{l:"Telefone",v:sel.phone||"—"},
     {l:"Pessoas",v:sel.persons},{l:"Nacionalidade",v:sel.nationality||"—"},{l:"Template",v:sel.template},{l:"Oferta",v:sel.offer}
    ].forEach(d=>{h+=`<div class="panel-row"><span class="panel-row-label">${d.l}</span><span class="panel-row-value">${d.v}</span></div>`});
    h+=`</div>`;
    if(sel.factors&&sel.factors.length>0){
      h+=`<div class="panel-factors"><div class="panel-factors-title">FACTORES DE RISCO</div>`;
      sel.factors.forEach(f=>{h+=`<span class="factor-tag">${f}</span>`});
      h+=`</div>`;
    }
    h+=`</div>`;
  }

  h+=`</div>`;
  document.getElementById("app").innerHTML=h;
}

function setProp(p){state.prop=p;state.sel=null;render()}
function setTab(t){state.tab=t;render()}
function setDays(d){state.viewDays=d;render()}
function navPrev(){const d=new Date(state.viewStart);d.setDate(d.getDate()-state.viewDays);state.viewStart=d.toISOString().split("T")[0];render()}
function navNext(){const d=new Date(state.viewStart);d.setDate(d.getDate()+state.viewDays);state.viewStart=d.toISOString().split("T")[0];render()}
function navToday(){const d=new Date();d.setDate(d.getDate()-1);state.viewStart=d.toISOString().split("T")[0];render()}
function selectRes(id){state.sel=D.reservations.find(r=>r.id===id)||null;render()}
function closeSel(){state.sel=null;render()}

render();
</script>
</body>
</html>
