<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nexo</title> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   nexo — editorial ops aesthetic
   Display: Fraunces (variable serif, optical-size tuned)
   Body:    Inter Tight (tighter tracking than Inter)
   Mono:    JetBrains Mono (IDs, dates)
   ═══════════════════════════════════════════════════ */

:root{
  --ink:#0a0a0a;
  --ink-2:#2a2a2a;
  --ink-3:#6b6b70;
  --ink-4:#9a9aa1;
  --paper:#FAF9F6;
  --paper-2:#F2F0EA;
  --rule:#E8E4DA;
  --rule-2:#DCD6C7;
  --accent:#FF83DA;
  --accent-ink:#C4007B;
  --accent-wash:#FFF0FB;
  --red:#D4281F;
  --orange:#E8811E;
  --green:#0E8A40;
  --yellow:#E8FF5B;
  --olive:#8B9A00;
  --shadow-lift:0 1px 2px rgba(10,10,10,.04),0 8px 24px -12px rgba(10,10,10,.08);
  --font-display:'Fraunces',Georgia,'Times New Roman',serif;
  --font-body:'Inter Tight',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--paper)}
body{
  font-family:var(--font-body);
  color:var(--ink);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  line-height:1.5;
  font-feature-settings:"ss01","cv11","kern";
  /* Paper grain — subtle SVG noise, locked to viewport for stable shimmer */
  background-image:
    radial-gradient(circle at 0% 0%,rgba(255,131,218,.05) 0%,transparent 38%),
    radial-gradient(circle at 100% 0%,rgba(232,255,91,.04) 0%,transparent 42%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 .12 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-attachment:fixed;
}
::selection{background:var(--accent);color:var(--ink)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rule-2);border-radius:0;border:2px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:var(--ink-4)}

/* ─── Motion primitives ─── */
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(255,131,218,.6)}50%{box-shadow:0 0 0 6px rgba(255,131,218,0)}}
@keyframes tick{0%{transform:scaleX(0);transform-origin:left}100%{transform:scaleX(1);transform-origin:left}}

/* ─── Header — editorial masthead ─── */
.hdr{
  background:var(--paper);
  border-bottom:1px solid var(--ink);
  padding:14px 28px 12px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  position:sticky;top:0;z-index:50;
  backdrop-filter:saturate(140%);
}
.hdr::after{
  content:"";position:absolute;left:0;right:0;bottom:-4px;height:3px;
  background:repeating-linear-gradient(90deg,var(--ink) 0 8px,transparent 8px 14px);
  opacity:.9;
}
.logo{display:flex;align-items:center;gap:12px}
.logo svg{width:38px;height:38px;flex-shrink:0;filter:drop-shadow(0 1px 0 rgba(0,0,0,.08))}
.logo h1{
  font-family:var(--font-display);
  font-weight:900;
  font-size:30px;
  letter-spacing:-1.2px;
  color:var(--ink);
  text-transform:lowercase;
  font-variation-settings:"opsz" 144;
  line-height:.9;
}
.logo small{
  font-family:var(--font-mono);
  font-size:9px;color:var(--ink-3);font-weight:500;
  display:block;margin-top:3px;
  text-transform:uppercase;letter-spacing:1.6px;
}
.btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn{
  padding:6px 14px;
  border-radius:0;
  border:1px solid var(--ink);
  background:var(--paper);color:var(--ink);
  font-size:10.5px;font-weight:600;
  font-family:var(--font-body);
  cursor:pointer;transition:all .18s cubic-bezier(.2,.8,.2,1);
  text-transform:uppercase;letter-spacing:1.1px;
  position:relative;
}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn.on{background:var(--ink);color:var(--paper)}
.btn.api{border-color:var(--accent);color:var(--accent-ink);background:var(--paper)}
.btn.api:hover{background:var(--accent);color:var(--ink)}
.btn.act{border-color:var(--red);color:var(--red)}
.btn.act:hover{background:var(--red);color:var(--paper)}
.btn.grn{border-color:var(--green);color:var(--green)}
.btn.grn:hover{background:var(--green);color:var(--paper)}

/* Production badge — masthead tag */
.prod-tag{
  font-family:var(--font-mono);
  background:var(--ink);color:var(--yellow);
  font-size:9px;font-weight:600;
  padding:3px 10px;letter-spacing:2px;
  border-radius:0;
}

/* ─── Status bar — tape ticker ─── */
.status-bar{
  padding:9px 28px;background:var(--paper-2);
  border-bottom:1px solid var(--rule);
  font-family:var(--font-mono);
  font-size:11px;color:var(--ink-2);
  display:flex;align-items:center;gap:10px;
  letter-spacing:.2px;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  animation:pulse-dot 2s ease-in-out infinite;
}

/* ─── KPI cards — editorial numerals ─── */
.kpis{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;padding:0;
  background:var(--paper);
  border-bottom:1px solid var(--ink);
}
.kpi{
  background:transparent;
  border-right:1px solid var(--rule);
  padding:24px 28px 22px;
  position:relative;
  animation:rise .55s cubic-bezier(.2,.8,.2,1) both;
}
.kpi:nth-child(1){animation-delay:.05s}
.kpi:nth-child(2){animation-delay:.12s}
.kpi:nth-child(3){animation-delay:.19s}
.kpi:nth-child(4){animation-delay:.26s;border-right:none}
.kpi label{
  font-family:var(--font-mono);
  font-size:9px;color:var(--ink-3);
  font-weight:500;display:block;margin-bottom:10px;
  text-transform:uppercase;letter-spacing:1.8px;
}
.kpi b{
  font-family:var(--font-display);
  font-variation-settings:"opsz" 144;
  font-size:48px;font-weight:400;
  line-height:.95;display:block;
  letter-spacing:-2px;
  color:var(--ink);
  font-feature-settings:"ss01","lnum","tnum";
}
.kpi small{
  font-family:var(--font-body);
  font-size:11px;color:var(--ink-3);
  display:block;margin-top:8px;font-weight:500;
}
.kpi .tick{
  display:block;height:2px;background:var(--ink);
  margin-top:14px;width:40%;
  animation:tick 1s cubic-bezier(.2,.8,.2,1) both;
  animation-delay:inherit;
}
.kpi:nth-child(2) .tick{background:var(--red);width:60%}
.kpi:nth-child(3) .tick{background:var(--red);width:75%}
.kpi:nth-child(4) .tick{background:var(--olive);width:50%}

/* ─── Tabs — newspaper sections ─── */
.tabs{
  display:flex;border-bottom:1px solid var(--rule);
  background:var(--paper);padding:0 28px;gap:0;
}
.tab{
  padding:16px 20px 14px;background:0;border:none;
  border-bottom:3px solid transparent;
  color:var(--ink-3);
  font-family:var(--font-body);
  font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.6px;
  cursor:pointer;transition:all .18s;
}
.tab:hover{color:var(--ink)}
.tab.on{border-bottom-color:var(--ink);color:var(--ink);font-weight:700}
.nav{display:flex;align-items:center;gap:6px;margin-left:auto;padding:10px 0}
.nbtn{
  background:transparent;border:1px solid var(--rule-2);
  color:var(--ink-3);padding:6px 12px;border-radius:0;
  cursor:pointer;font-size:10.5px;
  font-family:var(--font-mono);font-weight:500;
  transition:all .18s;text-transform:uppercase;
  letter-spacing:.8px;
}
.nbtn:hover{background:var(--paper-2);color:var(--ink);border-color:var(--ink)}
.nbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* ─── Layout ─── */
.content{display:flex;min-height:calc(100vh - 260px)}
.main{flex:1;overflow:hidden;animation:fade .6s .3s both}

/* ─── Timeline — editorial grid ─── */
.tl-wrap{
  overflow-x:auto;overflow-y:auto;
  max-height:calc(100vh - 260px);
  background:var(--paper);
}
.tl{display:inline-flex;min-width:100%}
.tl-lbl{
  flex-shrink:0;position:sticky;left:0;z-index:10;
  background:var(--paper);
  border-right:1px solid var(--ink);
}
.tl-r{
  display:flex;align-items:center;padding:0 10px;
  border-bottom:1px solid var(--rule);
  font-size:10.5px;
  font-family:var(--font-mono);font-weight:500;
}
.tl-c{
  border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .12s;
}
.tl-c:hover{opacity:1!important}
.tl-c.res{cursor:pointer}
.legend{
  display:flex;gap:18px;padding:12px 28px;
  border-top:1px solid var(--rule);
  font-family:var(--font-mono);
  font-size:10px;background:var(--paper-2);
  text-transform:uppercase;letter-spacing:1px;
}
.legend span{display:flex;align-items:center;gap:6px;color:var(--ink-3);font-weight:500}
.legend i{width:10px;height:10px;display:inline-block;font-style:normal}

/* ─── Tables ─── */
.tbl{padding:24px 28px;overflow-y:auto;max-height:calc(100vh - 260px)}
.tbl table{
  width:100%;background:var(--paper);
  border:1px solid var(--ink);border-collapse:collapse;
  border-radius:0;
}
.tbl th{
  padding:12px 14px;
  border-bottom:1px solid var(--ink);
  font-family:var(--font-mono);
  font-size:9.5px;font-weight:600;
  color:var(--ink);text-align:left;
  background:var(--paper-2);
  text-transform:uppercase;letter-spacing:1.4px;
}
.tbl td{
  padding:10px 14px;
  border-bottom:1px solid var(--rule);
  font-size:13px;color:var(--ink);
  font-variant-numeric:tabular-nums;
}
.tbl tr{cursor:pointer;transition:background .12s}
.tbl tr:hover{background:var(--accent-wash)}

/* ─── Panel — magazine spread ─── */
.panel{
  width:380px;
  border-left:1px solid var(--ink);
  background:var(--paper);
  overflow-y:auto;
  max-height:calc(100vh - 260px);
  flex-shrink:0;
  animation:rise .45s cubic-bezier(.2,.8,.2,1) both;
}
.panel h2{
  font-family:var(--font-display);
  font-variation-settings:"opsz" 144;
  font-size:28px;font-weight:500;
  color:var(--ink);letter-spacing:-.8px;
  line-height:1.05;
  padding-right:8px;
}
.panel h3{
  font-family:var(--font-mono);
  font-size:10px;color:var(--ink-3);
  font-weight:500;margin-top:6px;
  text-transform:uppercase;letter-spacing:1.4px;
}
.panel .risk{
  margin:18px 20px;padding:22px;
  border:1px solid var(--rule);
  border-radius:0;
  background:var(--paper-2);
}
.panel .sc{
  font-family:var(--font-display);
  font-variation-settings:"opsz" 144;
  font-size:52px;font-weight:400;
  letter-spacing:-2.5px;
  font-feature-settings:"lnum","tnum";
  line-height:1;
}
.panel .row{
  display:flex;justify-content:space-between;
  padding:9px 0;
  border-bottom:1px solid var(--rule);
  font-size:13px;
}
.panel .row label{color:var(--ink-3);font-weight:400;font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.8px}
.panel .row span{
  color:var(--ink);font-weight:500;text-align:right;
  max-width:200px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.panel .section-title{
  font-family:var(--font-mono);
  font-size:9.5px;font-weight:600;
  color:var(--ink-2);
  padding:22px 0 8px;
  text-transform:uppercase;letter-spacing:1.8px;
  border-bottom:1px solid var(--ink);
  margin-bottom:4px;
}

/* ─── Upload — editorial hero ─── */
.up-zone{
  max-width:640px;margin:60px auto;padding:40px 30px;
  text-align:left;
}
.up-zone .kicker{
  font-family:var(--font-mono);
  font-size:10.5px;color:var(--accent-ink);
  text-transform:uppercase;letter-spacing:2.4px;
  font-weight:600;margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
}
.up-zone .kicker::before,.up-zone .kicker::after{
  content:"";flex:1;height:1px;background:var(--rule-2);
}
.up-zone .headline{
  font-family:var(--font-display);
  font-variation-settings:"opsz" 144;
  font-size:84px;font-weight:400;
  letter-spacing:-4px;line-height:.92;
  color:var(--ink);margin-bottom:18px;
  animation:rise .8s cubic-bezier(.2,.8,.2,1) both;
}
.up-zone .headline em{
  font-style:italic;font-weight:300;
  color:var(--accent-ink);
  font-variation-settings:"opsz" 144;
}
.up-zone .dek{
  font-size:16px;color:var(--ink-2);
  line-height:1.55;margin-bottom:40px;
  max-width:520px;
  animation:rise .8s .1s cubic-bezier(.2,.8,.2,1) both;
}
.api-section{
  background:var(--paper-2);
  border:1px solid var(--ink);
  border-radius:0;padding:32px;margin-bottom:24px;
  animation:rise .8s .2s cubic-bezier(.2,.8,.2,1) both;
  position:relative;
}
.api-section::before{
  content:"01";position:absolute;top:-11px;left:24px;
  font-family:var(--font-mono);font-size:10px;
  background:var(--paper);padding:0 8px;
  color:var(--ink-3);letter-spacing:1.5px;
}
.api-section h3{
  font-family:var(--font-display);
  font-variation-settings:"opsz" 72;
  font-size:22px;font-weight:500;
  color:var(--ink);margin-bottom:8px;
  letter-spacing:-.4px;
}
.api-section .msg{
  font-size:13.5px;color:var(--ink-3);
  line-height:1.6;margin-bottom:22px;
  max-width:460px;
}
.api-btn{
  padding:15px 26px;
  background:var(--ink);color:var(--paper);
  border:1px solid var(--ink);
  border-radius:0;
  font-family:var(--font-body);font-size:12px;font-weight:700;
  cursor:pointer;width:auto;min-width:220px;
  transition:all .2s cubic-bezier(.2,.8,.2,1);
  text-transform:uppercase;letter-spacing:2px;
  display:inline-flex;align-items:center;gap:10px;
}
.api-btn:hover:not(:disabled){background:var(--accent);color:var(--ink);border-color:var(--accent)}
.api-btn:disabled{opacity:.5;cursor:not-allowed}
.api-btn::after{content:"→";font-size:14px;transition:transform .2s}
.api-btn:hover:not(:disabled)::after{transform:translateX(4px)}
.msg{margin-top:14px;font-size:12px;font-family:var(--font-mono)}
.msg.err{color:var(--red)}
.msg.ok{color:var(--green)}
.msg.info{color:var(--accent-ink)}

/* ─── Misc ─── */
.prob-bar{
  display:inline-block;height:6px;border-radius:0;
  margin-right:6px;vertical-align:middle;
}
.ob-card{
  background:var(--paper);
  border:1px solid var(--ink);
  border-radius:0;padding:22px;
  transition:all .2s cubic-bezier(.2,.8,.2,1);
  position:relative;
}
.ob-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--yellow);
}
.ob-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift)}
.action-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:100%;padding:12px 14px;margin-bottom:8px;
  border-radius:0;font-family:var(--font-body);
  font-size:11px;font-weight:700;cursor:pointer;
  text-align:center;border:1px solid;
  transition:all .2s cubic-bezier(.2,.8,.2,1);
  text-decoration:none;box-sizing:border-box;
  text-transform:uppercase;letter-spacing:1.5px;
}
.action-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lift)}

/* Period cards */
.period-card{
  background:var(--paper);
  border:1px solid var(--ink);
  border-radius:0;padding:22px;
  animation:rise .55s cubic-bezier(.2,.8,.2,1) both;
  transition:all .2s;
}
.period-card:hover{box-shadow:var(--shadow-lift);transform:translateY(-2px)}

/* Badge (used in report) */
.badge{
  display:inline-block;padding:3px 10px;border-radius:0;
  font-size:10px;font-weight:600;
  font-family:var(--font-mono);
  text-transform:uppercase;letter-spacing:1px;
}

/* Focus visible */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// nexo v1.0 — cancellation intelligence for hotels
// 27-signal risk model · EV overbooking · Mews PMS integration
// ═══════════════════════════════════════════════════

// ─── NAMESPACE ───
const nexo=(function(){
  // Global state
  let state={prop:"ALL",tab:"timeline",sel:null,viewDays:30,phase:"upload",uping:false,umsg:"",modelMetrics:null,modelLoading:false,retraining:false,backfilling:false,lastBackfill:null};
  let data={reservations:[],availability:{},overbooking:[],obMap:{},log:[],calibratedWeights:null,weatherCache:{},serviceId:null,serviceIds:{},propKeyByName:{}};
  let pendingFiles=[];
  let propShorthand={};
  let properties=[];

  state.vs=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split("T")[0]})();

  // ─── UI-only constants ───
  // Scoring constants and functions now live in api/score.js (backend).
  // The client keeps only the nationality tier lookup, which is used
  // for UI labels ("nacionalidade ALTO risco"), not for scoring itself.
  const NAT_HIGH=["india","angola","mozambique","united arab emirates","saudi arabia","nigeria","greece","türkiye","turkey","morocco"];
  const NAT_LOW=["belgium","switzerland","latvia","mexico","sweden","netherlands","ukraine","france","czech republic","norway"];

  // ─── UTILITIES ───
  const esc=s=>{if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")};
  const fmt=d=>{if(!d)return"";const p=d.split("-");return p[2]+"/"+p[1]};
  const dayName=d=>["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][new Date(d+"T12:00:00").getDay()];
  const riskColor=l=>l==="HIGH"?"#FF3B30":l==="MEDIUM"?"#FF9500":"#34C759";
  const overbookingColor=o=>o==="NR+Paid"?"#000":o&&o.includes("Safe")?"#34C759":null;
  const reservationColor=r=>overbookingColor(r.override)||riskColor(r.level);
  const probColor=p=>p>=70?"#FF3B30":p>=40?"#FF9500":p>=15?"#000":"#34C759";
  const today=new Date().toISOString().split("T")[0];

  function buildPropertyShorthand(reservations){
    properties=[...new Set(reservations.map(r=>r.prop).filter(Boolean))].sort();
    propShorthand={};
    const used=new Set();
    properties.forEach(p=>{
      const clean=p.replace(/\s*\(.*?\)\s*/g,"").trim();
      const words=clean.split(/\s+/).filter(w=>w.length>0);
      let abbr;
      if(words.length===0)abbr=p.replace(/[^A-Za-z0-9]/g,"").slice(0,3).toUpperCase();
      else if(words.length===1)abbr=words[0].slice(0,3).toUpperCase();
      else abbr=words.slice(0,3).map(w=>w[0]).join("").toUpperCase();
      if(abbr.length>4)abbr=abbr.slice(0,4);
      if(used.has(abbr)){let i=1;while(used.has(abbr+i))i++;abbr=abbr.slice(0,3)+i}
      used.add(abbr);
      propShorthand[p]=abbr;
    });
  }

  // ─── UI helpers ───
  // The scoring model (27 signals, weights, overrides, sigmoid, factors) now
  // lives in api/score.js. The client calls /api/score with an array of
  // reservation feature objects and gets back { score, level, prob, override,
  // factors } for each. This is what keeps the algorithm off the browser.
  const nationalityTier=nat=>{const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return"HIGH";if(NAT_LOW.some(x=>n.includes(x)))return"LOW";return""};

  async function scoreReservationsViaBackend(reservations){

  let activeProperty=null;
  const WRITE_ENDPOINTS=new Set(["serviceOrderNotes/add","tasks/add","services/updateAvailability"]);
  async function callMewsProxy(endpoint,params,opts={}){
    // opts.property overrides the global activeProperty (avoids races when writing concurrently)
    const property=opts.property!==undefined?opts.property:activeProperty;
    // WRITE endpoints are NOT retried — Mews may have processed the write even if the response failed;
    // retrying would duplicate notes/tasks/availability changes.
    const isWrite=WRITE_ENDPOINTS.has(endpoint);
    const maxRetries=isWrite?0:2;
    for(let attempt=0;attempt<=maxRetries;attempt++){
      const controller=new AbortController();
      const timeoutId=setTimeout(()=>controller.abort(),20000);
      try{
        const resp=await fetch("/api/mews",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({endpoint,params,property}),
          signal:controller.signal
        });
        clearTimeout(timeoutId);
        const text=await resp.text();
        let res;
        try{res=JSON.parse(text)}
        catch(e){
          if(!isWrite&&attempt<maxRetries){await new Promise(r=>setTimeout(r,(attempt+1)*1000));continue}
          throw new Error("API returned non-JSON response (status "+resp.status+")");
        }
        if(!resp.ok){
          const msg=res.message||res.error||("HTTP "+resp.status);
          if(resp.status===401||resp.status===403)throw new Error("Autenticação falhou ("+resp.status+"): "+msg);
          if(!isWrite&&resp.status>=500&&attempt<maxRetries){await new Promise(r=>setTimeout(r,(attempt+1)*1000));continue}
          throw new Error(msg);
        }
        return res;
      }catch(e){
        clearTimeout(timeoutId);
        if(e.name==="AbortError")throw new Error("Timeout após 20s em "+endpoint);
        if(e.message&&e.message.includes("Autenticação"))throw e;
        if(isWrite)throw e;
        if(attempt>=maxRetries)throw e;
        await new Promise(r=>setTimeout(r,(attempt+1)*1000));
      }
    }
  }

  async function scoreAndProcessReservations(){
    state.uping=true;state.umsg="A calcular riscos...";render();
    const results={res:[],avail:{},logs:[]};
    let filesDone=0;
    for(const pf of pendingFiles){
      filesDone++;
      state.umsg=`A processar ${filesDone}/${pendingFiles.length}: ${pf.name||pf.type}`;
      render();
      try{
        if(pf.type==="mews-reservations"){results.res=results.res.concat(pf.data)}
        else if(pf.type==="mews-availability"){results.avail[pf.prop]=pf.data}
        else if(pf.type==="reservation"){
          const wb=XLSX.read(pf.buf,{cellDates:true});
          const{prop,res,err,total,active}=parseRes(wb);
          if(err){results.logs.push(`${pf.name}: ${err}`);continue}
          const ids=new Set(results.res.map(r=>r.id));
          let added=0;
          for(const r of res){if(!ids.has(r.id)){results.res.push(r);ids.add(r.id);added++}}
          results.logs.push(`${prop||"?"}: ${added} reservas`)
        }else if(pf.type==="availability"){
          const wb=XLSX.read(pf.buf,{cellDates:true});
          const{prop,data}=parseAvail(wb);
          results.avail[prop]=data;
          results.logs.push(`Avail ${prop}: ${Object.keys(data).length} dias`)
        }
      }catch(e){results.logs.push(`${pf.name||pf.type}: ${e.message}`)}
    }

    // Compute average ADR per property
    const propAdrSum={},propAdrCnt={};
    results.res.forEach(r=>{
      if(r.adr>0){propAdrSum[r.prop]=(propAdrSum[r.prop]||0)+r.adr;propAdrCnt[r.prop]=(propAdrCnt[r.prop]||0)+1}
    });
    const propAvgAdrs={};
    Object.keys(propAdrSum).forEach(p=>{propAvgAdrs[p]=propAdrCnt[p]>0?Math.round(propAdrSum[p]/propAdrCnt[p]):0});

    // Compute guest active bookings
    const guestBookCnt={};
    results.res.forEach(r=>{const gid=r.email||r.guest;if(gid)guestBookCnt[gid]=(guestBookCnt[gid]||0)+1});
    results.res.forEach(r=>{r.propAvgAdr=propAvgAdrs[r.prop]||0;const gid=r.email||r.guest;r.guestActiveBookings=guestBookCnt[gid]||1});

    // Score via backend — the 27-signal model lives in api/score.js
    state.umsg="A pontuar reservas no servidor...";render();
    let scored;
    try{
      const scoreResp=await scoreReservationsViaBackend(results.res);
      const byId={};scoreResp.results.forEach(x=>{byId[x.id]=x});
      scored=results.res.map(r=>{
        const risk=byId[r.id]||{score:0,level:"LOW",override:"",prob:0,factors:[]};
        const nt=nationalityTier(r.nationality);
        const riskRev=Math.round(r.total*risk.prob/100);
        return{...r,score:risk.score,level:risk.level,override:risk.override,prob:risk.prob,factors:risk.factors||[],riskRev,natTier:nt,offer:offerTemplate(risk.level,r.daysUntil,r.nights)};
      });
      data.modelVersion=scoreResp.model_version;
      data.scoredAt=scoreResp.scored_at;
    }catch(e){
      addLog("ERRO backend scoring: "+e.message);
      throw e;
    }

    buildPropertyShorthand(scored);

    // Compute overbooking
    const ob=computeOverbooking(scored,results.avail);

    data={reservations:scored,availability:results.avail,overbooking:ob.overbooking,obMap:ob.obMap,log:data.log.concat(results.logs),generated:new Date().toISOString(),calibratedWeights:data.calibratedWeights,weatherCache:data.weatherCache,serviceId:data.serviceId,serviceIds:data.serviceIds,propKeyByName:data.propKeyByName||{}};
    state.phase="dashboard";
    state.uping=false;
    state.umsg="";
    pendingFiles=[];
    saveCacheToLocalStorage();
    render();
  }

  // ─── CACHE PERSISTENTE (localStorage) ───
  // Persiste o último fetch Mews para que recarregar a página não obrigue
  // a importar tudo outra vez. TTL de 60 minutos; após isso mostra-se
  // um banner a pedir refresh. A serialização strip fields pesados e só
  // inclui o essencial para o dashboard renderizar.
  const CACHE_KEY="nexo.cache.v1";
  const CACHE_TTL_MS=60*60*1000; // 60 minutos

  function saveCacheToLocalStorage(){
    try{
      const slim={
        reservations:data.reservations,
        availability:data.availability,
        overbooking:data.overbooking,
        obMap:data.obMap,
        generated:data.generated,
        serviceId:data.serviceId,
        serviceIds:data.serviceIds,
        propKeyByName:data.propKeyByName,
        cachedAt:Date.now()
      };
      localStorage.setItem(CACHE_KEY,JSON.stringify(slim));
    }catch(e){
      console.warn("nexo cache save falhou:",e.message);
    }
  }

  function loadCacheFromLocalStorage(){
    try{
      const raw=localStorage.getItem(CACHE_KEY);
      if(!raw)return null;
      const cached=JSON.parse(raw);
      if(!cached||!cached.cachedAt)return null;
      const age=Date.now()-cached.cachedAt;
      if(age>CACHE_TTL_MS*24)return null; // limite duro 24h — depois disso nunca usar
      return cached;
    }catch(e){
      return null;
    }
  }

  function clearCache(){
    try{localStorage.removeItem(CACHE_KEY)}catch(e){}
  }

  function restoreFromCache(){
    const cached=loadCacheFromLocalStorage();
    if(!cached)return false;
    data.reservations=cached.reservations||[];
    data.availability=cached.availability||{};
    data.overbooking=cached.overbooking||[];
    data.obMap=cached.obMap||{};
    data.generated=cached.generated;
    data.serviceId=cached.serviceId;
    data.serviceIds=cached.serviceIds||{};
    data.propKeyByName=cached.propKeyByName||{};
    data.cachedAt=cached.cachedAt;
    buildPropertyShorthand(data.reservations);
    state.phase="dashboard";
    return true;
  }

  function computeOverbooking(scored,availData){
    const ob=[];
    const dnArr=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    const cutoff=new Date(Date.now()+90*864e5).toISOString().split("T")[0];
    const dayOcc={};
    scored.forEach(r=>{
      let d=new Date(r.arrival+"T12:00:00");
      const dep=new Date(r.departure+"T12:00:00");
      while(d<dep){
        const ds=d.toISOString().split("T")[0];
        const key=r.prop+"|"+ds;
        if(!dayOcc[key])dayOcc[key]={total:0,high:[],adrs:[]};
        dayOcc[key].total++;
        if(r.adr>0)dayOcc[key].adrs.push(r.adr);
        if(r.level==="HIGH")dayOcc[key].high.push(r);
        d.setDate(d.getDate()+1)
      }
    });
    properties.forEach(prop=>{
      const avail=availData[prop]||{};
      const allDays=new Set([...Object.keys(avail),...Object.keys(dayOcc).filter(k=>k.startsWith(prop+"|")).map(k=>k.split("|")[1])]);
      allDays.forEach(ds=>{
        if(ds<today||ds>cutoff)return;
        const key=prop+"|"+ds;
        const dd=dayOcc[key]||{total:0,high:[],adrs:[]};
        const av=avail[ds];
        const hi=dd.high;
        if(hi.length<2)return;
        let occPct=0;
        let capacity=0;
        if(av&&av.spaces>0){occPct=av.occPct||0;capacity=av.spaces}
        const resvOccPct=dd.total>0&&capacity>0?Math.round(dd.total/capacity*1000)/10:0;
        if(resvOccPct>occPct)occPct=resvOccPct;
        const avgRate=dd.adrs.length>0?Math.round(dd.adrs.reduce((s,v)=>s+v,0)/dd.adrs.length):(av?.avgRate||100);
        if((occPct>=70&&hi.length>=2)||hi.length>=3){
          const n=Math.min(Math.max(1,Math.floor(hi.length*.4)),3);
          const adj=Math.max(1,n-(hi.some(r=>r.daysUntil>7)?1:0));
          const hiGuests=hi.sort((a,b)=>b.score-a.score).slice(0,5).map(r=>r.guest.split(" ").pop());
          const fr=av?(av.rooms||[]).filter(rt=>rt.avail<=1):[]; // rooms near full capacity
          const avgProb=hi.length>0?hi.reduce((s,r)=>s+(r.prob||0),0)/hi.length/100:0;
          const combinedProb=Math.min(0.95,1-Math.pow(1-avgProb,adj));
          const walkCost=avgRate*2.5;
          const extraRev=avgRate*adj;
          const ev=Math.round(combinedProb*extraRev-(1-combinedProb)*walkCost);
          ob.push({date:ds,prop,occPct,nHigh:hi.length,ob:adj,rooms:fr.slice(0,adj).map(rt=>({type:rt.type,rate:rt.rate,categoryId:rt.categoryId})),roomsStr:fr.slice(0,adj).map(rt=>rt.type.split(" - ").pop().replace("Apartment","Apt")).join(", ")||"Qualquer tipo",avgRate,dow:dnArr[new Date(ds+"T12:00:00").getDay()],hiGuests:hiGuests.join(", "),week:Math.ceil((new Date(ds+"T12:00:00").getDate())/7),month:new Date(ds+"T12:00:00").toLocaleString("pt",{month:"short"}),ev,combinedProb:Math.round(combinedProb*100),walkCost:Math.round(walkCost),categoryIds:[...new Set(fr.slice(0,adj).map(rt=>rt.categoryId).filter(Boolean))]})
        }
      })
    });
    ob.sort((a,b)=>a.date.localeCompare(b.date));
    const obMap={};
    ob.forEach(o=>{
      const key=o.prop+"|"+o.date;
      const hiOnDay=scored.filter(r=>r.prop===o.prop&&r.level==="HIGH"&&r.arrival<=o.date&&r.departure>o.date);
      const hiRoomIds=hiOnDay.map(r=>r.room);
      obMap[key]={ob:o.ob,rooms:o.rooms,rate:o.avgRate,hiRooms:hiRoomIds,hiGuests:hiOnDay.slice(0,3).map(r=>r.guest.split(" ").pop())}
    });
    return{overbooking:ob,obMap};
  }

  // ─── STATE ACCESSORS ───
  function getFilteredReservations(){return state.prop==="ALL"?data.reservations:data.reservations.filter(x=>x.prop===state.prop)}
  function getFilteredOverbooking(){return state.prop==="ALL"?data.overbooking:data.overbooking.filter(x=>x.prop===state.prop)}
  function getDays(){const a=[];for(let i=0;i<state.viewDays;i++){const d=new Date(state.vs+"T12:00:00");d.setDate(d.getDate()+i);a.push(d.toISOString().split("T")[0])}return a}
  function getRows(){const ps=state.prop==="ALL"?properties:[state.prop];const r=[];ps.forEach(p=>{const pr=data.reservations.filter(x=>x.prop===p);const rm=new Map();pr.forEach(x=>{const k=x.room||"?";if(!rm.has(k))rm.set(k,[]);rm.get(k).push(x)});[...rm.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([room,rr])=>r.push({prop:p,room,res:rr}))});return r}

  // ─── ACTIONS ───
  function addLog(msg){data.log.push(`[${new Date().toLocaleTimeString()}] ${msg}`);console.log("nexo:",msg)}

  const _notesDone=new Set();

  const _obInFlight=new Set();
  async function openForSale(obIndex){
    const o=data.overbooking[obIndex];
    if(!o)return;
    const obKey=o.prop+"|"+o.date;
    if(_obInFlight.has(obKey)){addLog("Overbooking já em progresso para "+obKey);return}
    if(!confirm("PRODUÇÃO: Abrir +"+o.ob+" quarto(s) à venda em "+fmt(o.date)+" ("+o.prop+")?\n\nEsta ação altera disponibilidade real no Mews."))return;
    _obInFlight.add(obKey);
    const btn=document.getElementById("ob-btn-"+obIndex);
    if(btn){btn.disabled=true;btn.textContent="A abrir...";btn.style.opacity="0.6"}
    try{
      const svcId=data.serviceIds[o.prop]||data.serviceId;
      if(!svcId)throw new Error("ServiceId não encontrado para "+o.prop);
      // Resolve property key from the enterprise name (stored at fetch time) — no more global mutation.
      const propKey=data.propKeyByName?.[o.prop]||null;
      const catIds=(o.categoryIds||[]).slice();
      if(!catIds.length){
        const av=data.availability[o.prop]?.[o.date]||data.availability[o.date];
        if(av&&av.rooms)catIds.push(...av.rooms.map(r=>r.categoryId).filter(Boolean));
      }
      if(!catIds.length)throw new Error("Sem categorias disponíveis");
      const dateStart=o.date+"T23:00:00Z";
      const dateEnd=o.date+"T23:00:00Z";
      // Distribute o.ob rooms across available categories: round-robin so total matches UI promise.
      const updates=[];
      const perCat={};
      for(let i=0;i<o.ob;i++){
        const catId=catIds[i%catIds.length];
        perCat[catId]=(perCat[catId]||0)+1;
      }
      for(const [catId,count] of Object.entries(perCat)){
        updates.push({
          ResourceCategoryId:catId,
          FirstTimeUnitStartUtc:dateStart,
          LastTimeUnitStartUtc:dateEnd,
          UnitCountAdjustment:{Value:count}
        });
      }
      // Single batched call — atomic at the Mews level.
      await callMewsProxy("services/updateAvailability",{
        ServiceId:svcId,
        AvailabilityUpdates:updates
      },{property:propKey});
      _obInFlight.delete(obKey);
      addLog(`WRITE Overbooking: +${o.ob} em ${fmt(o.date)} (${o.prop})`);
      if(btn){btn.textContent="✓ Aberto à venda";btn.style.background="#8B9A00";btn.style.color="#fff";btn.style.borderColor="#8B9A00";btn.style.opacity="1"}
    }catch(e){
      _obInFlight.delete(obKey);
      addLog(`WRITE Overbooking falhou: ${e.message}`);
      if(btn){btn.textContent="✗ "+e.message.slice(0,30);btn.style.background="#FF3B30";btn.style.color="#fff";btn.style.borderColor="#FF3B30";btn.style.opacity="1";btn.disabled=false}
    }
  }

  async function bulkAddNotes(){
    if(!confirm("Adicionar nota em todas as "+data.reservations.filter(r=>r.level==="HIGH").length+" reservas de alto risco?"))return;
    state.uping=true;state.umsg="Adicionando notas...";render();
    const hi=data.reservations.filter(r=>r.level==="HIGH");
    let ok=0,fail=0;
    for(const r of hi){
      const success=await addNote(r.id,r.guest,r.score,r.prob,r.level,r.factors||[]);
      if(success)ok++;else fail++;
      state.umsg=`Notas: ${ok+fail}/${hi.length}...`;
      render()
    }
    state.uping=false;
    state.umsg=`${ok} notas adicionadas${fail?", "+fail+" falharam":""}`;
    render()
  }

  async function bulkAddTasks(){
    const hi=data.reservations.filter(r=>r.level==="HIGH"&&r.daysUntil>0&&r.daysUntil<=14);
    if(!confirm("Criar task para "+hi.length+" reservas de alto risco nos próximos 14 dias?"))return;

    for(const r of hi){

      if(success)ok++;else fail++;
      state.umsg=`Tasks: ${ok+fail}/${hi.length}...`;
      render()
    }
    state.uping=false;
    state.umsg=`${ok} tasks criadas${fail?", "+fail+" falharam":""}`;
    render()
  }

uest)}</td><td>${esc(r.prop)}</td><td>${fmt(r.arrival)} (${r.daysUntil}d)</td><td><span class="badge h">${r.prob}%</span></td><td>€${r.total}</td></tr>`).join("")}</table>`}<h2>Overbooking</h2><p>${data.overbooking.length} dias com oportunidade | €${Math.round(data.overbooking.reduce((s,o)=>s+o.ob*o.avgRate,0)/1000)}K potencial</p><div style="margin-top:40px;text-align:center;color:#bbb;font-size:10px">nexo v1.0</div></body></html>`;

  // ─── MODEL TAB ───
  // Pure-SVG charts (no libs). Line chart for AUC/Brier timelines,
  // horizontal bars for feature importances, scatter + perfect-calibration
  // line for the reliability diagram.

  function svgLine(points,W,H,pad,color,domain){
    // points: [{x, y}], domain: {xMin,xMax,yMin,yMax}
    if(points.length<2)return "";
    const {xMin,xMax,yMin,yMax}=domain;
    const sx=v=>pad+((v-xMin)/(xMax-xMin||1))*(W-2*pad);
    const sy=v=>H-pad-((v-yMin)/(yMax-yMin||1))*(H-2*pad);
    let d=`M${sx(points[0].x)} ${sy(points[0].y)}`;
    for(let i=1;i<points.length;i++)d+=` L${sx(points[i].x)} ${sy(points[i].y)}`;
    let h=`<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    points.forEach(p=>{h+=`<circle cx="${sx(p.x)}" cy="${sy(p.y)}" r="3" fill="${color}"/>`});
    return h;
  }

  function renderModelTimelineChart(history,key,label,color,domain){
    if(!history||history.length<2){
      return `<div style="padding:40px;text-align:center;color:var(--ink-3);font-family:var(--font-mono);font-size:10px;letter-spacing:1px">Insuficiente — precisa de ≥2 runs</div>`;
    }
    const W=520,H=160,pad=32;
    // Reverse so oldest is leftmost, newest rightmost
    const rows=[...history].reverse();
    const points=rows.map((r,i)=>({x:i,y:r[key]||0}));
    const xMin=0,xMax=rows.length-1;
    const dom={xMin,xMax,...domain};
    let h=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-width:520px">`;
    // Grid lines
    const yTicks=4;
    for(let i=0;i<=yTicks;i++){
      const v=domain.yMin+(domain.yMax-domain.yMin)*(i/yTicks);
      const y=H-pad-((v-domain.yMin)/(domain.yMax-domain.yMin||1))*(H-2*pad);
      h+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--rule)" stroke-width="1" stroke-dasharray="2,3"/>`;
      h+=`<text x="${pad-6}" y="${y+3}" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--ink-3)" text-anchor="end">${v.toFixed(2)}</text>`;
    }
    // Line
    h+=svgLine(points,W,H,pad,color,dom);
    // X axis labels (first and last date)
    const firstDate=rows[0].evaluated_at?rows[0].evaluated_at.slice(5,10):"—";
    const lastDate=rows[rows.length-1].evaluated_at?rows[rows.length-1].evaluated_at.slice(5,10):"—";
    h+=`<text x="${pad}" y="${H-8}" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--ink-3)">${esc(firstDate)}</text>`;
    h+=`<text x="${W-pad}" y="${H-8}" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--ink-3)" text-anchor="end">${esc(lastDate)}</text>`;
    // Title
    h+=`<text x="${pad}" y="18" font-family="Fraunces,serif" font-size="14" font-weight="500" fill="var(--ink)">${esc(label)}</text>`;
    h+=`</svg>`;
    return h;
  }

  function renderReliabilityDiagram(buckets){
    if(!buckets||buckets.length===0){
      return `<div style="padding:40px;text-align:center;color:var(--ink-3);font-family:var(--font-mono);font-size:10px;letter-spacing:1px">Sem dados — aguarda o primeiro treino</div>`;
    }
    const W=360,H=280,pad=36;
    const sx=v=>pad+v*(W-2*pad);
    const sy=v=>H-pad-v*(H-2*pad);
    let h=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-width:360px">`;
    // Perfect-calibration diagonal
    h+=`<line x1="${sx(0)}" y1="${sy(0)}" x2="${sx(1)}" y2="${sy(1)}" stroke="var(--rule)" stroke-width="1" stroke-dasharray="3,3"/>`;
    // Axes
    h+=`<line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="var(--ink)" stroke-width="1"/>`;
    h+=`<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="var(--ink)" stroke-width="1"/>`;
    // Grid ticks
    [0,0.25,0.5,0.75,1].forEach(t=>{
      h+=`<text x="${sx(t)}" y="${H-pad+14}" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--ink-3)" text-anchor="middle">${t}</text>`;
      h+=`<text x="${pad-6}" y="${sy(t)+3}" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--ink-3)" text-anchor="end">${t}</text>`;
    });
    // Points — size by count, radius 3-10
    const maxCount=Math.max(...buckets.map(b=>b.count||0),1);
    buckets.forEach(b=>{
      if(!b.count)return;
      const r=3+7*(b.count/maxCount);
      const cx=sx(b.avg_pred);
      const cy=sy(b.actual_rate);
      h+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--accent)" fill-opacity="0.6" stroke="var(--accent-ink)" stroke-width="1.5"/>`;
    });
    // Axis labels
    h+=`<text x="${W/2}" y="${H-4}" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--ink-3)" text-anchor="middle">Previsto</text>`;
    h+=`<text x="10" y="${H/2}" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--ink-3)" text-anchor="middle" transform="rotate(-90 10 ${H/2})">Real</text>`;
    h+=`</svg>`;
    return h;
  }

  function renderFeatureImportances(importances){
    if(!importances||importances.length===0){
      return `<div style="padding:40px;text-align:center;color:var(--ink-3);font-family:var(--font-mono);font-size:10px;letter-spacing:1px">Sem modelo treinado ainda</div>`;
    }
    const top=importances.slice(0,12);
    const maxAbs=Math.max(...top.map(f=>f.abs_coef),0.001);
    let h=`<div style="display:flex;flex-direction:column;gap:6px;padding:8px 0">`;
    top.forEach(f=>{
      const w=(f.abs_coef/maxAbs)*100;
      const positive=f.coef>=0;
      const color=positive?"var(--red)":"var(--green)";
      h+=`<div style="display:grid;grid-template-columns:90px 1fr 60px;gap:10px;align-items:center;font-size:11px">`;
      h+=`<span style="font-family:JetBrains Mono,monospace;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px">${esc(f.name)}</span>`;
      h+=`<div style="background:var(--rule);height:10px;position:relative"><div style="background:${color};height:100%;width:${w}%"></div></div>`;
      h+=`<span style="font-family:JetBrains Mono,monospace;color:${color};text-align:right;font-variant-numeric:tabular-nums">${(f.coef>=0?"+":"")+f.coef.toFixed(3)}</span>`;
      h+=`</div>`;
    });
    h+=`</div>`;
    return h;
  }

  function renderModel(){
    const m=state.modelMetrics;
    let h=`<div class="tbl" style="max-width:1200px">`;

    // Title + retrain button
    h+=`<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--ink)">`;
    h+=`<div><div style="font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--accent-ink);margin-bottom:4px">MODEL DASHBOARD</div><h2 style="font-family:Fraunces,serif;font-size:34px;font-weight:500;color:var(--ink);letter-spacing:-1px;line-height:.95">Estado do modelo</h2></div>`;
    h+=`<div style="display:flex;gap:8px">`;
    h+=`<button class="btn" data-action="backfill" ${state.backfilling?"disabled":""} style="padding:8px 16px">${state.backfilling?"A importar...":"Importar histórico Mews"}</button>`;
    h+=`<button class="btn api" data-action="retrain" ${state.retraining?"disabled":""} style="padding:8px 16px">${state.retraining?"A treinar...":"Forçar retreino"}</button>`;
    h+=`</div>`;
    h+=`</div>`;

    // Backfill result panel — always visible if there's a recent backfill,
    // even before the model is trained. This is critical UX: without it,
    // the user clicks "Importar" and has no idea what happened.
    if(state.lastBackfill){
      const lb=state.lastBackfill;
      h+=`<div style="border:1px solid var(--ink);background:var(--paper-2);padding:18px 22px;margin-bottom:24px">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">`;
      h+=`<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--accent-ink);text-transform:uppercase;letter-spacing:2px">Último backfill</div>`;
      h+=`<div style="font-family:Fraunces,serif;font-size:28px;font-weight:500;color:var(--ink)">${lb.totalImported||0}<span style="font-size:13px;color:var(--ink-3);margin-left:6px">reservas importadas</span></div>`;
      h+=`</div>`;
      h+=`<table style="width:100%;border-collapse:collapse;font-family:JetBrains Mono,monospace;font-size:10.5px">`;
      h+=`<tr style="border-bottom:1px solid var(--rule);color:var(--ink-3);text-transform:uppercase;letter-spacing:1px"><th style="text-align:left;padding:6px 8px">Propriedade</th><th style="text-align:right;padding:6px 8px">Mews total</th><th style="text-align:right;padding:6px 8px">Em range</th><th style="text-align:right;padding:6px 8px">Importadas</th><th style="text-align:right;padding:6px 8px">Cancel</th><th style="text-align:right;padding:6px 8px">Stayed</th><th style="text-align:left;padding:6px 8px">Status</th><th style="text-align:right;padding:6px 8px">Tempo</th></tr>`;
      (lb.properties||[]).forEach(p=>{
        const statusColor=p.status==="ok"?"var(--green)":p.status==="loading"?"var(--accent-ink)":p.status==="empty"?"var(--orange)":"var(--red)";
        h+=`<tr style="border-bottom:1px solid var(--rule)">`;
        h+=`<td style="padding:6px 8px;color:var(--ink)">${esc(p.label||p.key)}</td>`;
        h+=`<td style="padding:6px 8px;text-align:right;color:var(--ink-2)">${p.fetched_from_mews||"—"}</td>`;
        h+=`<td style="padding:6px 8px;text-align:right;color:var(--ink-2)">${p.fetched_in_date_range||"—"}</td>`;
        h+=`<td style="padding:6px 8px;text-align:right;color:var(--ink);font-weight:600">${p.imported||0}</td>`;
        h+=`<td style="padding:6px 8px;text-align:right;color:var(--red)">${(p.by_outcome||{}).cancelled||0}</td>`;
        h+=`<td style="padding:6px 8px;text-align:right;color:var(--green)">${(p.by_outcome||{}).stayed||0}</td>`;
        h+=`<td style="padding:6px 8px;color:${statusColor};text-transform:uppercase;letter-spacing:.5px">${esc(p.status||"?")}${p.message?` · ${esc(String(p.message).slice(0,40))}`:""}</td>`;
        h+=`<td style="padding:6px 8px;text-align:right;color:var(--ink-3)">${p.duration_ms?Math.round(p.duration_ms/1000)+"s":"—"}</td>`;
        h+=`</tr>`;
        // Debug row for empty results
        if(p.status==="empty"&&p.debug){
          h+=`<tr style="background:var(--paper)"><td colspan="8" style="padding:4px 12px;font-size:10px;color:var(--ink-3);font-style:italic">debug: total fetched ${p.debug.total_fetched_from_mews}, range [${p.debug.date_filter_start}, ${p.debug.date_filter_end}]`;
          if(p.debug.sample_state_counts)h+=`, states ${JSON.stringify(p.debug.sample_state_counts)}`;
          if(p.debug.sample_earliest_created)h+=`, earliest ${(p.debug.sample_earliest_created||"").slice(0,10)}, latest ${(p.debug.sample_latest_created||"").slice(0,10)}`;
          h+=`</td></tr>`;
        }
      });
      h+=`</table>`;
      // Train result
      if(lb.trainResult){
        const tr=lb.trainResult;
        h+=`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--rule);font-family:JetBrains Mono,monospace;font-size:11px">`;
        if(tr.status==="ok"){
          h+=`<span style="color:var(--green);font-weight:600">TRAIN OK</span>`;
          h+=` · AUC ${tr.metrics?.auc?.toFixed(4)||"?"} · Brier ${tr.metrics?.brier?.toFixed(4)||"?"} · ${tr.promoted?"<span style='color:var(--accent-ink);font-weight:600'>PROMOVIDO</span>":"<span style='color:var(--ink-3)'>não promovido</span>"} · ${tr.samples_train||0}/${tr.samples_test||0} samples`;
        }else{
          h+=`<span style="color:var(--orange)">TRAIN ${esc(tr.status||"?")}</span> · ${esc(tr.reason||tr.error||"")}`;
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    }

    if(state.modelLoading){
      h+=`<div style="padding:80px;text-align:center;color:var(--ink-3);font-family:JetBrains Mono,monospace;font-size:11px;letter-spacing:1px">A CARREGAR MÉTRICAS...</div>`;
      h+=`</div>`;
      return h;
    }

    if(!m){
      h+=`<div style="padding:80px;text-align:center;color:var(--ink-3);font-family:JetBrains Mono,monospace;font-size:11px;letter-spacing:1px">SEM MODELO TREINADO — IMPORTA HISTÓRICO OU CLICA EM FORÇAR RETREINO</div>`;
      h+=`</div>`;
      return h;
    }

    // Active model summary card
    const active=m.active;
    const js=m.journal_stats;
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border:1px solid var(--ink);margin-bottom:28px">`;
    const kpiStyle=`padding:20px 22px;border-right:1px solid var(--rule)`;
    const lastStyle=`padding:20px 22px`;
    if(active){
      h+=`<div style="${kpiStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:10px">Modelo Activo</div><div style="font-family:Fraunces,serif;font-size:32px;font-weight:500;line-height:1;letter-spacing:-1px">${active.auc?(active.auc*100).toFixed(1):"—"}<span style="font-size:14px">% AUC</span></div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-top:8px">${esc(active.version||"—")}</div></div>`;
      h+=`<div style="${kpiStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:10px">Brier Score</div><div style="font-family:Fraunces,serif;font-size:32px;font-weight:500;line-height:1;letter-spacing:-1px">${active.brier?active.brier.toFixed(3):"—"}</div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-top:8px">menor é melhor</div></div>`;
      h+=`<div style="${kpiStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:10px">Calibração</div><div style="font-family:Fraunces,serif;font-size:32px;font-weight:500;line-height:1;letter-spacing:-1px">${active.calibration_error?(active.calibration_error*100).toFixed(1):"—"}<span style="font-size:14px">% erro</span></div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-top:8px">ECE 10 buckets</div></div>`;
      h+=`<div style="${lastStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:10px">Amostras de Treino</div><div style="font-family:Fraunces,serif;font-size:32px;font-weight:500;line-height:1;letter-spacing:-1px">${active.training_samples?active.training_samples.toLocaleString("pt"):"—"}</div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-top:8px">${esc((active.training_window_start||"").slice(5))}–${esc((active.training_window_end||"").slice(5))}</div></div>`;
    }else{
      h+=`<div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--ink-3);font-family:JetBrains Mono,monospace;font-size:11px;letter-spacing:1.5px">SEM MODELO APRENDIDO ACTIVO — A USAR HAND-TUNED V1 (COLD START)</div>`;
    }
    h+=`</div>`;

    // Journal stats row
    if(js){
      h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px">`;
      const jStyle=`border:1px solid var(--rule);padding:14px 16px;background:var(--paper)`;
      h+=`<div style="${jStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px">Rows no Journal</div><div style="font-family:Fraunces,serif;font-size:24px;font-weight:500;margin-top:4px">${(js.total_rows||0).toLocaleString("pt")}</div></div>`;
      h+=`<div style="${jStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px">Com Outcome</div><div style="font-family:Fraunces,serif;font-size:24px;font-weight:500;margin-top:4px">${(js.rows_with_outcome||0).toLocaleString("pt")}</div></div>`;
      h+=`<div style="${jStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px">Taxa Cancelação</div><div style="font-family:Fraunces,serif;font-size:24px;font-weight:500;margin-top:4px">${js.positive_rate?(js.positive_rate*100).toFixed(1)+"%":"—"}</div></div>`;
      h+=`<div style="${jStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px">Último Snapshot</div><div style="font-family:Fraunces,serif;font-size:24px;font-weight:500;margin-top:4px">${esc(js.last_snapshot_date||"—")}</div></div>`;
      h+=`</div>`;
    }

    // Two charts side by side: AUC timeline + Brier timeline
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px">`;
    h+=`<div style="border:1px solid var(--ink);padding:16px;background:var(--paper)">${renderModelTimelineChart(m.history,"auc","AUC ao longo do tempo","var(--accent-ink)",{yMin:0.5,yMax:1})}</div>`;
    h+=`<div style="border:1px solid var(--ink);padding:16px;background:var(--paper)">${renderModelTimelineChart(m.history,"brier","Brier ao longo do tempo","var(--ink)",{yMin:0,yMax:0.3})}</div>`;
    h+=`</div>`;

    // Reliability diagram + feature importances
    h+=`<div style="display:grid;grid-template-columns:380px 1fr;gap:20px;margin-bottom:28px">`;
    h+=`<div style="border:1px solid var(--ink);padding:16px;background:var(--paper)"><div style="font-family:Fraunces,serif;font-size:14px;font-weight:500;margin-bottom:8px">Reliability diagram</div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-bottom:12px">Se o modelo diz X%, cancelam de facto X%?</div>${renderReliabilityDiagram(m.latest_buckets)}</div>`;
    h+=`<div style="border:1px solid var(--ink);padding:16px;background:var(--paper)"><div style="font-family:Fraunces,serif;font-size:14px;font-weight:500;margin-bottom:8px">Feature importances</div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-bottom:12px">Coeficientes do modelo activo · vermelho = aumenta risco · verde = reduz</div>${renderFeatureImportances(m.feature_importances)}</div>`;
    h+=`</div>`;

    // Retrospective — "Como estou a acertar?" + table of recent closed predictions
    if(m.accuracy_stats||(m.recent_closed&&m.recent_closed.length>0)){
      const as=m.accuracy_stats;
      h+=`<div style="border:1px solid var(--ink);background:var(--paper);padding:20px;margin-bottom:28px">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--rule)">`;
      h+=`<div><div style="font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--accent-ink)">RETROSPECTIVE</div><div style="font-family:Fraunces,serif;font-size:22px;font-weight:500;color:var(--ink);margin-top:2px">Como é que o modelo tem andado a acertar</div></div>`;
      if(as)h+=`<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3)">${as.sample} predições fechadas</div>`;
      h+=`</div>`;
      if(as){
        h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--rule);margin-bottom:20px">`;
        const kpiStyle="padding:16px 20px;border-right:1px solid var(--rule)";
        const lastStyle="padding:16px 20px";
        h+=`<div style="${kpiStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px">Acurácia</div><div style="font-family:Fraunces,serif;font-size:28px;font-weight:500;line-height:1">${(as.accuracy*100).toFixed(1)}<span style="font-size:13px">%</span></div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-top:6px">acertos / total</div></div>`;
        h+=`<div style="${kpiStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px">Precisão</div><div style="font-family:Fraunces,serif;font-size:28px;font-weight:500;line-height:1">${as.precision===null?"—":(as.precision*100).toFixed(1)+"<span style='font-size:13px'>%</span>"}</div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-top:6px">dos que disse \"cancel\"</div></div>`;
        h+=`<div style="${kpiStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px">Recall</div><div style="font-family:Fraunces,serif;font-size:28px;font-weight:500;line-height:1">${as.recall===null?"—":(as.recall*100).toFixed(1)+"<span style='font-size:13px'>%</span>"}</div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);margin-top:6px">das que cancelaram</div></div>`;
        h+=`<div style="${lastStyle}"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px">Erros</div><div style="font-family:JetBrains Mono,monospace;font-size:13px;line-height:1.4"><span style="color:var(--red)">${as.false_positives}</span> falsos +<br><span style="color:var(--orange)">${as.false_negatives}</span> falsos −</div></div>`;
        h+=`</div>`;
      }
      if(m.recent_closed&&m.recent_closed.length>0){
        h+=`<div style="max-height:340px;overflow-y:auto">`;
        h+=`<table style="width:100%;border-collapse:collapse;font-size:11px">`;
        h+=`<tr style="border-bottom:1px solid var(--ink);color:var(--ink-3);font-family:JetBrains Mono,monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.2px"><th style="text-align:left;padding:8px">Hóspede</th><th style="text-align:left;padding:8px">Prop</th><th style="text-align:left;padding:8px">Chegada</th><th style="text-align:right;padding:8px">Modelo disse</th><th style="text-align:left;padding:8px;padding-left:16px">Realidade</th><th style="text-align:center;padding:8px">✓/✗</th></tr>`;
        m.recent_closed.slice(0,30).forEach(r=>{
          const probPct=Math.round((r.predicted_prob||0)*100);
          const probColor=probPct>=50?"var(--red)":"var(--green)";
          const outcomeColor=r.outcome==="cancelled"||r.outcome==="no_show"?"var(--red)":"var(--green)";
          const outcomeLabel=r.outcome==="cancelled"?"Cancelou":r.outcome==="stayed"?"Ficou":r.outcome==="no_show"?"No-show":esc(r.outcome||"—");
          const correctIcon=r.correct?"<span style='color:var(--green);font-weight:700'>✓</span>":"<span style='color:var(--red);font-weight:700'>✗</span>";
          h+=`<tr style="border-bottom:1px solid var(--rule)">`;
          h+=`<td style="padding:8px;color:var(--ink);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.guest||"—")}</td>`;
          h+=`<td style="padding:8px;color:var(--ink-3);font-family:JetBrains Mono,monospace;font-size:9px">${esc((r.prop||"").slice(0,12))}</td>`;
          h+=`<td style="padding:8px;color:var(--ink-3);font-family:JetBrains Mono,monospace;font-size:10px">${esc((r.arrival||"").slice(5,10)||"—")}</td>`;
          h+=`<td style="padding:8px;text-align:right;color:${probColor};font-weight:600;font-family:JetBrains Mono,monospace">${probPct}%</td>`;
          h+=`<td style="padding:8px;padding-left:16px;color:${outcomeColor};font-weight:600">${outcomeLabel}</td>`;
          h+=`<td style="padding:8px;text-align:center;font-size:14px">${correctIcon}</td>`;
          h+=`</tr>`;
        });
        h+=`</table></div>`;
      }
      h+=`</div>`;
    }

    h+=`</div>`;
    return h;
  }

  function renderUpload(){
    let h=`<div class="up-zone">`;
    h+=`<div class="kicker">Cancellation Intelligence · Est. 2026</div>`;
    h+=`<h1 class="headline">The shield<br>against <em>empty nights</em>.</h1>`;
    h+=`<div class="dek">Um motor de 27 sinais que lê cada reserva da tua Mews e dá-te o número exato de quartos a reabrir antes de o hóspede cancelar. Sem suposições. Sem relatórios estáticos.</div>`;
    h+=`<div class="api-section"><h3>Conectar à Mews</h3><div class="msg">Carrega automaticamente todas as reservas, disponibilidade e histórico via Mews Connector API. Leitura apenas até autorizares explicitamente cada escrita.</div><button class="api-btn" onclick="nexo.fetchFromMews()" ${state.uping?'disabled':''}>${state.uping?esc(state.umsg):'Carregar dados'}</button>${state.umsg&&!state.uping?`<div class="msg ${state.umsg.includes("Erro")?"err":"ok"}" style="margin-top:14px">${esc(state.umsg)}</div>`:''}</div>`;
    if(data.log.length){h+=`<div style="margin-top:20px;text-align:left;background:var(--paper-2);border:1px solid var(--rule);padding:16px;font-family:var(--font-mono);font-size:10.5px;max-height:140px;overflow-y:auto">`;data.log.forEach(l=>{h+=`<div style="color:${l.includes("Erro")?"var(--red)":"var(--green)"};margin-bottom:4px">${esc(l)}</div>`});h+=`</div>`}
    h+=`</div>`;
    return h
  }

  // ─── DELEGATION HELPERS ───
  // These wrappers receive only the reservation ID (safe, from data-* attr)
  // and look up the live reservation object server-side. Guest names and other
  // untrusted fields never flow through the DOM string path.
  async function addNoteById(resvId){
    const r=data.reservations.find(x=>x.id===resvId);
    if(!r)return false;
    return addNote(r.id,r.guest,r.score,r.prob,r.level,r.factors||[]);
  }
  async function addTaskById(resvId){
    const r=data.reservations.find(x=>x.id===resvId);
    if(!r)return false;
    return addTask(r.id,r.guest,r.score,r.prob,r.arrival,r.offer||"Oferecer upgrade");
  }

  // ─── MODEL DASHBOARD ACTIONS ───
  async function loadModelMetrics(){
    if(state.modelLoading)return;
    state.modelLoading=true;render();
    try{
      const resp=await fetch("/api/model",{method:"GET",headers:{"Accept":"application/json"}});
      if(!resp.ok){
        const txt=await resp.text().catch(()=>"");
        throw new Error("Falha a carregar métricas ("+resp.status+"): "+txt.slice(0,160));
      }
      state.modelMetrics=await resp.json();
    }catch(e){
      addLog("Métricas: "+e.message);
      state.modelMetrics=null;
    }finally{
      state.modelLoading=false;render();
    }
  }

  async function retrainModel(){
    if(state.retraining)return;
    if(!confirm("Forçar retreino do modelo agora?\n\nIsto lê as predições fechadas dos últimos 12 meses, ajusta uma nova regressão logística, e substitui o modelo activo se o AUC melhorar."))return;
    state.retraining=true;render();
    try{
      const resp=await fetch("/api/model",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
      const result=await resp.json().catch(()=>({}));
      if(!resp.ok){
        throw new Error(result.message||result.error||("HTTP "+resp.status));
      }
      if(result.status==="skipped"){
        addLog("Retreino: skipped — "+(result.reason||"sem dados"));
      }else{
        addLog("Retreino: "+result.status+(result.promoted?" (promovido)":" (não promovido)")+" AUC="+(result.metrics?.auc?.toFixed(4)||"?"));
      }
      // Reload metrics after training
      await loadModelMetrics();
    }catch(e){
      addLog("Retreino falhou: "+e.message);
      alert("Retreino falhou: "+e.message);
    }finally{
      state.retraining=false;render();
    }
  }

  async function backfillHistory(){
    if(state.backfilling)return;
    if(!confirm("Importar histórico da Mews?\n\nVai puxar reservas Processed e Canceled desde 2025-01-01 das 4 propriedades, UMA DE CADA VEZ. Cada propriedade leva ~30-60 segundos. Depois treina o modelo automaticamente."))return;
    state.backfilling=true;
    state.lastBackfill={startedAt:new Date().toISOString(),properties:[],totalImported:0,trainResult:null};
    render();
    // HQ excluído — é portfolio que agrega todas as outras, confunde e dá 504
    const propKeys=["alegria","sbi","sbii"];
    const propLabels={alegria:"Alegria",sbi:"Santa Barbara I",sbii:"Santa Barbara II"};
    let totalImported=0;
    try{
      for(let i=0;i<propKeys.length;i++){
        const key=propKeys[i];
        state.umsg=`A importar ${propLabels[key]} (${i+1}/${propKeys.length})...`;
        render();
        const t0=Date.now();
        let entry={key,label:propLabels[key],status:"loading"};
        state.lastBackfill.properties.push(entry);
        try{
          const resp=await fetch("/api/backfill",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({property:key,startDate:"2025-01-01"})
          });
          const result=await resp.json().catch(()=>({raw:"non-json response"}));
          const p=(result.properties&&result.properties[0])||result;
          entry.duration_ms=Date.now()-t0;
          entry.http_status=resp.status;
          entry.raw=p;
          if(!resp.ok){
            entry.status="error";
            entry.message=result.message||result.error||`HTTP ${resp.status}`;
          }else if(p.status==="skipped"){
            entry.status="skipped";
            entry.message=p.reason||"sem token";
          }else if((p.imported||0)>0){
            entry.status="ok";
            entry.imported=p.imported;
            entry.fetched_from_mews=p.fetched_from_mews;
            entry.fetched_in_date_range=p.fetched_in_date_range;
            entry.by_outcome=p.by_outcome||{};
            totalImported+=p.imported;
          }else{
            entry.status="empty";
            entry.message=p.note||"0 reservas";
            entry.debug=p.debug||null;
          }
          addLog(`Backfill ${propLabels[key]}: ${entry.status} — imported=${entry.imported||0}`);
        }catch(err){
          entry.status="error";
          entry.message=err.message;
          entry.duration_ms=Date.now()-t0;
          addLog(`Backfill ${propLabels[key]}: ERRO — ${err.message}`);
        }
        // Trigger re-render so the partial results appear in the UI
        render();
      }
      state.lastBackfill.totalImported=totalImported;
      state.lastBackfill.finishedAt=new Date().toISOString();
      addLog(`Backfill total: ${totalImported} reservas importadas`);
      if(totalImported>100){
        addLog("A treinar modelo inicial...");
        state.umsg="A treinar modelo...";render();
        const tr=await retrainModelSilent();
        state.lastBackfill.trainResult=tr;
      }else{
        state.lastBackfill.trainResult={status:"skipped",reason:"<100 outcomes imported"};
      }
      await loadModelMetrics();
    }catch(e){
      addLog("Backfill falhou: "+e.message);
      state.lastBackfill.error=e.message;
    }finally{
      state.backfilling=false;state.umsg="";render();
    }
  }

  async function retrainModelSilent(){
    try{
      const resp=await fetch("/api/model",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
      const result=await resp.json().catch(()=>({}));
      if(result.status==="ok"){
        addLog(`Modelo: ${result.metrics?.auc?.toFixed(4)||"?"} AUC, ${result.promoted?"PROMOVIDO":"não promovido"} (amostras: ${result.samples_train}/${result.samples_test})`);
      }else{
        addLog("Treino: "+(result.reason||result.status));
      }
      return result;
    }catch(e){
      addLog("Treino silencioso falhou: "+e.message);
      return {status:"error",error:e.message};
    }
  }

  // ─── PUBLIC API ───
  return{
    render,fetchFromMews,scoreAndProcessReservations,
    addNote,addTask,addNoteById,addTaskById,openForSale,bulkAddNotes,bulkAddTasks,generateWeeklyReport,
    loadModelMetrics,retrainModel,backfillHistory,restoreFromCache,
    clearCacheAndReload:()=>{clearCache();data.reservations=[];data.availability={};data.overbooking=[];state.phase="upload";state.sel=null;render()},
    selectProperty:p=>{state.prop=p;state.sel=null;render()},
    selectTab:t=>{state.tab=t;if(t==="modelo"&&!state.modelMetrics&&!state.modelLoading)loadModelMetrics();else render()},
    setViewDays:d=>{state.viewDays=d;render()},
    prevDays:()=>{const d=new Date(state.vs+"T12:00:00");d.setDate(d.getDate()-state.viewDays);state.vs=d.toISOString().split("T")[0];render()},
    nextDays:()=>{const d=new Date(state.vs+"T12:00:00");d.setDate(d.getDate()+state.viewDays);state.vs=d.toISOString().split("T")[0];render()},
    goToday:()=>{const d=new Date();d.setDate(d.getDate()-1);state.vs=d.toISOString().split("T")[0];render()},
    selectReservation:id=>{state.sel=data.reservations.find(r=>r.id===id)||null;render()},
    clearSelection:()=>{state.sel=null;render()}
  }
})();

window.addEventListener('DOMContentLoaded',()=>{
  // Try to restore the last Mews fetch from localStorage before first render.
  // If it's fresh (<24h), skip the upload screen and go straight to dashboard.
  // The user can click "Atualizar dados" in the header to force a refresh.
  nexo.restoreFromCache();
  nexo.render();
  // Event delegation for data-action buttons (replaces inline onclick with untrusted data)
  document.addEventListener('click',e=>{
    const el=e.target.closest('[data-action]');
    if(!el)return;
    const action=el.dataset.action;
    if(action==='clear-selection')nexo.clearSelection();
    else if(action==='add-note')nexo.addNoteById(el.dataset.resvId);
    else if(action==='add-task')nexo.addTaskById(el.dataset.resvId);
    else if(action==='retrain')nexo.retrainModel();
    else if(action==='backfill')nexo.backfillHistory();
    else if(action==='clear-cache')nexo.clearCacheAndReload();
  });
});
</script>
</body>
</html>
