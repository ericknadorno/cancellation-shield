<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nexo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#F4F5F9;color:#000;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#F4F5F9}::-webkit-scrollbar-thumb{background:#D2D2D7;border-radius:3px}

/* Header — nexo top bar */
.hdr{background:#fff;border-bottom:1px solid #E5E5EA;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{width:32px;height:32px;flex-shrink:0}
.logo h1{font-size:15px;font-weight:900;letter-spacing:-.3px;color:#000;text-transform:lowercase}.logo small{font-size:10px;color:#86868B;font-weight:500;display:block;margin-top:1px;text-transform:uppercase;letter-spacing:1px}
.btns{display:flex;gap:6px;align-items:center}
.btn{padding:6px 14px;border-radius:980px;border:1px solid #E5E5EA;background:#fff;color:#000;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.btn:hover{background:#F4F5F9;border-color:#D2D2D7}
.btn.on{border-color:#FF83DA;background:#FFF0FB;color:#000}
.btn.api{border-color:#FF83DA80;color:#FF83DA;background:#fff}.btn.api:hover{background:#FFF0FB}
.btn.act{border-color:#FF3B3040;color:#FF3B30}.btn.act:hover{background:#fef2f1}
.btn.grn{border-color:#34C75940;color:#0b8440}.btn.grn:hover{background:#f0faf4}

/* Status bar */
.status-bar{padding:8px 20px;background:#fff;border-bottom:1px solid #E5E5EA;font-size:11px;color:#86868B;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px;background:#F4F5F9}
.kpi{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #E5E5EA}
.kpi label{font-size:10px;color:#86868B;font-weight:700;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.kpi b{font-size:26px;font-weight:900;line-height:1.1;display:block;letter-spacing:-.5px}.kpi small{font-size:11px;color:#86868B;display:block;margin-top:4px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid #E5E5EA;background:#fff;padding:0 20px;gap:0}
.tab{padding:12px 16px;background:0;border:none;border-bottom:2px solid transparent;color:#86868B;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.tab:hover{color:#000}.tab.on{border-bottom-color:#FF83DA;color:#000;font-weight:700}
.nav{display:flex;align-items:center;gap:6px;margin-left:auto;padding:8px 0}
.nbtn{background:#fff;border:1px solid #E5E5EA;color:#86868B;padding:5px 10px;border-radius:980px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;transition:all .15s}
.nbtn:hover{background:#F4F5F9}.nbtn.on{background:#000;color:#fff;border-color:#000}

/* Layout */
.content{display:flex;min-height:calc(100vh - 220px)}.main{flex:1;overflow:hidden}

/* Timeline */
.tl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 220px);background:#F4F5F9}
.tl{display:inline-flex;min-width:100%}
.tl-lbl{flex-shrink:0;position:sticky;left:0;z-index:10;background:#fff;border-right:1px solid #E5E5EA}
.tl-r{display:flex;align-items:center;padding:0 8px;border-bottom:1px solid #f0f0f2;font-size:11px}
.tl-c{border-bottom:1px solid #f0f0f2;display:flex;align-items:center;justify-content:center;transition:opacity .1s}
.tl-c:hover{opacity:1!important}.tl-c.res{cursor:pointer}
.legend{display:flex;gap:16px;padding:10px 20px;border-top:1px solid #E5E5EA;font-size:11px;background:#fff}
.legend span{display:flex;align-items:center;gap:5px;color:#86868B;font-weight:600}.legend i{width:10px;height:10px;border-radius:50%;display:inline-block;font-style:normal}

/* Tables */
.tbl{padding:20px;overflow-y:auto;max-height:calc(100vh - 220px)}
.tbl table{width:100%;background:#fff;border:1px solid #E5E5EA;border-collapse:collapse;overflow:hidden;border-radius:12px}
.tbl th{padding:10px 12px;border-bottom:1px solid #E5E5EA;font-size:10px;font-weight:700;color:#86868B;text-align:left;background:#fff;text-transform:uppercase;letter-spacing:1px}
.tbl td{padding:8px 12px;border-bottom:1px solid #f0f0f2;font-size:13px;color:#000}
.tbl tr:hover{background:#FFF0FB}.tbl tr{cursor:pointer;transition:background .1s}

/* Panel — detail sidebar */
.panel{width:360px;border-left:1px solid #E5E5EA;background:#fff;overflow-y:auto;max-height:calc(100vh - 220px);flex-shrink:0}
.panel h2{font-size:16px;font-weight:900;color:#000;letter-spacing:-.3px}.panel h3{font-size:11px;color:#86868B;font-weight:500;margin-top:2px}
.panel .risk{margin:14px 16px;padding:18px;border-radius:12px}
.panel .sc{font-size:30px;font-weight:900;letter-spacing:-.5px}
.panel .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f2;font-size:13px}
.panel .row label{color:#86868B;font-weight:400}.panel .row span{color:#000;font-weight:500;text-align:right;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel .section-title{font-size:10px;font-weight:700;color:#86868B;padding:14px 0 6px;text-transform:uppercase;letter-spacing:1px}

/* Upload — connect page */
.up-zone{max-width:520px;margin:80px auto;padding:30px;text-align:center}
.api-section{background:#fff;border:1px solid #E5E5EA;border-radius:12px;padding:28px;margin-bottom:24px}
.api-section h3{font-size:14px;font-weight:900;color:#000;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:center}
.api-section .msg{font-size:13px;color:#86868B;line-height:1.6;margin-bottom:16px}
.api-btn{padding:12px 24px;background:#FF83DA;color:#000;border:none;border-radius:980px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.api-btn:hover{background:#ff6bd0}.api-btn:disabled{opacity:.4;cursor:not-allowed}
.msg{margin-top:12px;font-size:12px}.msg.err{color:#FF3B30}.msg.ok{color:#34C759}.msg.info{color:#FF83DA}

/* Misc */
.prob-bar{display:inline-block;height:6px;border-radius:3px;margin-right:5px;vertical-align:middle}
.ob-card{background:#fff;border:1px solid #E5E5EA;border-radius:12px;padding:18px;transition:all .15s}
.ob-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.action-btn{display:block;width:100%;padding:10px;margin-bottom:8px;border-radius:980px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:1px solid;transition:all .15s;text-decoration:none;box-sizing:border-box;text-transform:uppercase;letter-spacing:.5px}
.action-btn:hover{opacity:.85}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// nexo v1.0 — cancellation intelligence for hotels
// 27-signal risk model · EV overbooking · Mews PMS integration
// ═══════════════════════════════════════════════════

// ─── NAMESPACE ───
const nexo=(function(){
  // Global state
  let state={prop:"ALL",tab:"timeline",sel:null,viewDays:30,phase:"upload",uping:false,umsg:""};
  let data={reservations:[],availability:{},overbooking:[],obMap:{},log:[],calibratedWeights:null,weatherCache:{},serviceId:null,serviceIds:{}};
  let pendingFiles=[];
  let propShorthand={};
  let properties=[];

  state.vs=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split("T")[0]})();

  // ─── CONSTANTS ───
  const BDC_MO={Alegria:[39.2,29.2,31.2,22.2,33.3,32,32,29.4,29.2,49,40.7,33.3],"SB I":[11.3,25.3,18.3,37.4,41.5,47.4,34.6,37.6,45.1,50,57.1,34.5],"SB II":[9.7,26.5,27.9,31.9,33,30.1,31.5,30.8,38.3,40.5,29.2,46.1]};
  const NAT_HIGH=["india","angola","mozambique","united arab emirates","saudi arabia","nigeria","greece","türkiye","turkey","morocco"];
  const NAT_MED=["brazil","serbia","singapore","korea","finland","israel","taiwan","romania"];
  const NAT_LOW=["belgium","switzerland","latvia","mexico","sweden","netherlands","ukraine","france","czech republic","norway"];
  const CANCEL_PROB_SCALE=0.08;
  const CANCEL_PROB_MIDPOINT=35;
  const SIGMOID_MAX=95;
  const SIGMOID_MIN=3;

  // ─── UTILITIES ───
  const fmt=d=>{if(!d)return"";const p=d.split("-");return p[2]+"/"+p[1]};
  const dayName=d=>["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][new Date(d+"T12:00:00").getDay()];
  const riskColor=l=>l==="HIGH"?"#FF3B30":l==="MEDIUM"?"#FF9500":"#34C759";
  const overbookingColor=o=>o==="NR+Paid"?"#000":o&&o.includes("Safe")?"#34C759":null;
  const reservationColor=r=>overbookingColor(r.override)||riskColor(r.level);
  const probColor=p=>p>=70?"#FF3B30":p>=40?"#FF9500":p>=15?"#000":"#34C759";
  const today=new Date().toISOString().split("T")[0];

  function buildPropertyShorthand(reservations){
    properties=[...new Set(reservations.map(r=>r.prop).filter(Boolean))].sort();
    propShorthand={};
    const used=new Set();
    properties.forEach(p=>{
      const clean=p.replace(/\s*\(.*?\)\s*/g,"").trim();
      const words=clean.split(/\s+/).filter(w=>w.length>0);
      let abbr;
      if(words.length===0)abbr=p.replace(/[^A-Za-z0-9]/g,"").slice(0,3).toUpperCase();
      else if(words.length===1)abbr=words[0].slice(0,3).toUpperCase();
      else abbr=words.slice(0,3).map(w=>w[0]).join("").toUpperCase();
      if(abbr.length>4)abbr=abbr.slice(0,4);
      if(used.has(abbr)){let i=1;while(used.has(abbr+i))i++;abbr=abbr.slice(0,3)+i}
      used.add(abbr);
      propShorthand[p]=abbr;
    });
  }

  // ─── SCORING MODEL (27 signals) ───
  const isNonRefundable=r=>{const l=(r||"").toLowerCase();return l.includes("nr ")||l.startsWith("nr")||l.includes("non-ref")||l.includes("non-refundable")||l.includes("early bird")};
  const scoreRate=r=>{const l=(r||"").toLowerCase();if(l.includes("flex 3")||l.includes("fully flexible"))return 62;if(l.includes("standard")&&l.includes("breakfast"))return 50;if(l.includes("flex 5"))return 48;if(l.includes("semi-flex"))return 38;if(l.includes("standard")&&l.includes("booking"))return 32;if(l.includes("standard"))return 35;if(l.includes("flex")&&(l.includes("ota")||l.includes("pku")))return 55;if(l.includes("best flex")||l.includes("best rate"))return 45;if(l.includes("half board"))return 30;if(l.includes("bed and breakfast")||l.includes("b&b"))return 28;if(l.includes("black friday"))return 35;if(l.includes("friends")||l.includes("family"))return 5;if(l.includes("welcome"))return 3;if(isNonRefundable(r))return 3;if(l.includes("long"))return 10;if(l.includes("superior"))return 20;if(l.includes("test")||l.includes("aut ")||l.includes("solution"))return 30;return 28};
  const scoreChannel=s=>{const l=(s||"").toLowerCase();if(l.includes("telephone"))return 85;if(l.includes("a-hotels")||l.includes("american express"))return 82;if(l.includes("booking.com"))return 38;if(l.includes("booking engine"))return 32;if(l.includes("channel"))return 35;if(l.includes("in person"))return 30;if(l.includes("message")||l.includes("email"))return 25;if(l.includes("hotels.com"))return 18;if(l.includes("airbnb"))return 14;if(l.includes("expedia"))return 17;if(l==="connector"||l.includes("connector"))return 55;if(l==="distributor"||l.includes("distributor"))return 50;if(l==="commander"||l.includes("commander"))return 20;return 25};
  const scoreLeadTime=d=>{if(!d&&d!==0)return 20;if(d<0)return 5;if(d<=1)return 15;if(d<=3)return 30;if(d<=7)return 40;if(d<=14)return 48;if(d<=30)return 55;if(d<=60)return 65;if(d<=90)return 72;return 80};
  const scoreSeason=m=>{if(!m)return 25;const b=BDC_MO["Alegria"]||[30,30,30,30,30,30,30,30,30,30,30,30];const i=(m-3+12)%12;return Math.round((b[i]||30)*.7)};
  const scoreLOS=n=>{if(!n||n<=0)return 20;if(n===1)return 30;if(n<=2)return 25;if(n<=4)return 20;if(n<=7)return 28;if(n<=14)return 55;return 70};
  const scorePayment=p=>{const s=(p||"").toLowerCase().trim();if(s==="charged"||s==="paid"||s==="success")return 2;if(s==="partial")return 15;if(s==="fail"||s==="failed")return 50;return 45};
  const scoreADR=a=>{if(!a||a<=0)return 25;if(a<80)return 10;if(a<120)return 12;if(a<180)return 18;if(a<250)return 30;if(a<400)return 45;if(a<1000)return 55;return 40};
  const scoreNationality=nat=>{const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return 10;if(NAT_MED.some(x=>n.includes(x)))return 4;if(NAT_LOW.some(x=>n.includes(x)))return-5;return 0};
  const nationalityTier=nat=>{const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return"HIGH";if(NAT_LOW.some(x=>n.includes(x)))return"LOW";return""};
  const scoreRepeat=(ps,pc)=>{if(ps>=3)return-25;if(ps>=1)return-15;if(pc>=2)return 20;if(pc>=1)return 10;return 0};
  const scoreCard=h=>h?-5:8;
  const scoreModified=w=>w?-5:3;
  const scoreDOW=a=>{if(!a)return 0;const d=new Date(a+"T12:00:00").getDay();if(d===5||d===6)return 5;if(d===0)return 3;return 0};
  const scorePersons=(c,ch)=>{if(ch)return-8;if(c>=3)return-3;if(c===1)return 5;return 0};
  const scoreAgency=h=>h?8:0;
  const scoreOtaEmail=(h,e)=>{if(h)return 12;if(e&&(e.includes("@guest.booking.com")||e.includes("@relay.")))return 15;return 0};
  const scoreNatMissing=n=>(!n||n==="")?5:0;
  const scoreBookingHour=h=>{if(h===null||h===undefined)return 50;if(h>=0&&h<=5)return 78;if(h>=22)return 65;if(h>=6&&h<=9)return 38;return 50};
  const scoreModCount=c=>{if(!c||c===0)return 35;if(c===1)return 55;if(c===2)return 68;return Math.min(80,68+c*4)};
  const scoreADRvsAvg=(a,avg)=>{if(!avg||!a||avg===0)return 50;const r=a/avg;if(r<0.6)return 75;if(r<0.8)return 62;if(r>1.4)return 30;if(r>1.1)return 40;return 50};
  const scoreBookPayGap=g=>{if(g===null||g===undefined)return 50;if(g<=0)return 28;if(g<=1)return 38;if(g<=3)return 50;if(g<=7)return 62;return 75};
  const scoreMultiBooking=c=>{if(!c||c<=1)return 45;if(c===2)return 65;return Math.min(82,65+c*5)};
  const scoreWeather=code=>{if(!code)return 50;if(code>=200&&code<300)return 72;if(code>=500&&code<600)return 65;if(code>=600&&code<700)return 68;if(code===800)return 32;if(code>=801&&code<=802)return 40;return 50};

  function cancelProbability(score){
    if(score<=0)return SIGMOID_MIN;
    if(score>=80)return SIGMOID_MAX;
    const p=SIGMOID_MAX/(1+Math.exp(-CANCEL_PROB_SCALE*(score-CANCEL_PROB_MIDPOINT)));
    return Math.max(SIGMOID_MIN,Math.min(SIGMOID_MAX,Math.round(p)));
  }

  function extractRiskFactors(r){
    const factors=[];
    if(r.previousCancels>0)factors.push("Cancelou antes");
    if(r.previousStays>0)factors.push("Repetente");
    if(!r.hasCreditCard&&r.paymentStatus!=="charged")factors.push("Sem cartão");
    if(r.hasOtaEmail)factors.push("Email OTA");
    if(r.hasTravelAgency)factors.push("Agência");
    if(r.hasChildren)factors.push("Família");
    if(r.wasModified)factors.push("Modificada");
    if(scoreRate(r.rate)>=35)factors.push("Rate flexível");
    if(scoreChannel(r.source)>=35)factors.push("Canal arriscado");
    if(r.leadTimeDays>30)factors.push("Antecedência "+r.leadTimeDays+"d");
    if(r.nights>7)factors.push("Estadia longa");
    if(scorePayment(r.payment)>=30)factors.push("Sem pagamento");
    if(r.bookingHour!==null&&(r.bookingHour>=22||r.bookingHour<=5))factors.push("Reserva noturna");
    if(r.guestActiveBookings>=2)factors.push("Multi-reserva");
    if(r.weatherCode&&r.weatherCode>=500)factors.push("Mau tempo");
    return factors;
  }

  function computeRisk(r, calW){
    const rate=r.rate||"",pay=(r.paymentStatus||r.payment||"").toLowerCase().trim();
    const w=calW||data.calibratedWeights||null;
    if(isNonRefundable(rate)&&(pay==="charged"||pay==="success"||pay==="paid"))return{score:2,level:"LOW",override:"NR+Paid",prob:3};
    if(r.previousStays>=2&&isNonRefundable(rate))return{score:3,level:"LOW",override:"Repeat+NR",prob:4};
    if(r.hasParking)return{score:3,level:"LOW",override:"Safe:Parking",prob:3};
    if(r.hasVoucher)return{score:4,level:"LOW",override:"Safe:Voucher",prob:5};
    if(r.guestCheckedIn)return{score:3,level:"LOW",override:"Safe:GuestCheckedIn",prob:3};
    if(r.hasPet)return{score:5,level:"LOW",override:"Safe:Pet",prob:5};
    if(r.previousStays>=3)return{score:5,level:"LOW",override:"Safe:Loyal",prob:5};
    const dw={pay:0.15,rate:0.14,lt:0.13,chan:0.12,los:0.06,adr:0.05,repeat:0.08,card:0.06,mod:0.06,sea:0.04,persons:0.03,dow:0.04,otaEmail:0.03,nat:0.04,natMiss:0.03,agency:0.03,noContact:0.03,solo:0.02,bookHour:0.03,modCount:0.04,adrVsAvg:0.03,bookPayGap:0.04,multiBook:0.03,weather:0.02};
    const W=w||dw;
    let s=0;
    s+=(W.pay||dw.pay)*scorePayment(pay);
    s+=(W.rate||dw.rate)*scoreRate(rate);
    s+=(W.lt||dw.lt)*scoreLeadTime(r.daysUntil);
    s+=(W.chan||dw.chan)*scoreChannel(r.source);
    s+=(W.los||dw.los)*scoreLOS(r.nights);
    s+=(W.adr||dw.adr)*scoreADR(r.adr);
    s+=(W.repeat||dw.repeat)*scoreRepeat(r.previousStays||0,r.previousCancels||0);
    s+=(W.card||dw.card)*scoreCard(r.hasCreditCard);
    s+=(W.mod||dw.mod)*scoreModified(r.wasModified);
    s+=(W.sea||dw.sea)*scoreSeason(r.arrMonth);
    s+=(W.persons||dw.persons)*scorePersons(r.persons,r.hasChildren);
    s+=(W.dow||dw.dow)*scoreDOW(r.arrival);
    s+=(W.otaEmail||dw.otaEmail)*scoreOtaEmail(r.hasOtaEmail,r.email);
    s+=(W.nat||dw.nat)*scoreNationality(r.nationality);
    s+=(W.natMiss||dw.natMiss)*scoreNatMissing(r.nationality);
    s+=(W.agency||dw.agency)*scoreAgency(r.hasTravelAgency);
    s+=(W.noContact||dw.noContact)*(r.hasNoContact?55:5);
    s+=(W.solo||dw.solo)*(r.isSolo?35:15);
    s+=(W.bookHour||dw.bookHour)*scoreBookingHour(r.bookingHour);
    s+=(W.modCount||dw.modCount)*scoreModCount(r.modificationCount||0);
    s+=(W.adrVsAvg||dw.adrVsAvg)*scoreADRvsAvg(r.adr,r.propAvgAdr);
    s+=(W.bookPayGap||dw.bookPayGap)*scoreBookPayGap(r.bookPayGapDays);
    s+=(W.multiBook||dw.multiBook)*scoreMultiBooking(r.guestActiveBookings);
    s+=(W.weather||dw.weather)*scoreWeather(r.weatherCode);
    if(r.isRelay)s+=15;
    if(r.isGenius)s-=3;
    if(r.lateArrival)s+=3;
    let ov="";
    if(isNonRefundable(rate)&&pay!=="charged"&&pay!=="success"&&pay!=="paid"){s+=10;ov="NR:noPay"}
    s=Math.max(0,Math.min(Math.round(s),100));
    const prob=cancelProbability(s);
    return{score:s,level:s>=38?"HIGH":s>=18?"MEDIUM":"LOW",override:ov,prob};
  }

  function offerTemplate(lv,d,n){if(lv==="HIGH"){if(n>=8)return"Welcome+mid-stay+late c-out";if(d>14)return"Early c-in+late c-out";if(d>7)return"Early c-in+upgrade";if(d>3)return"Crédito/datas alt.";return"Contacto urgente"}if(lv==="MEDIUM")return d>14?"Guia bairro":"Info check-in";return"-"}

  function waMsg(lv,guest,prop,arrival,nights,ofr){
    const fn=(guest||"").split(" ")[0]||"Guest";
    const dt=arrival||"";
    if(lv==="HIGH")return encodeURIComponent(`Olá ${fn}! 👋\n\nSomos a equipa do ${prop}. Estamos a preparar tudo para a sua chegada no dia ${dt} (${nights} noites).\n\n🎁 Temos uma oferta especial para si: ${ofr}\n\nPodemos ajudar com alguma coisa antes da sua estadia? Estamos aqui para o que precisar!\n\nEquipa ${prop} 🏠`);
    return encodeURIComponent(`Olá ${fn}! 👋\n\nA equipa do ${prop} está entusiasmada com a sua visita no dia ${dt}!\n\nSe precisar de informações sobre check-in, transporte ou dicas locais, estamos aqui para ajudar. 😊\n\nEquipa ${prop} 🏠`);
  }

  async function scoreAndProcessReservations(){
    state.uping=true;state.umsg="A calcular riscos...";render();
    const results={res:[],avail:{},logs:[]};
    let filesDone=0;
    for(const pf of pendingFiles){
      filesDone++;
      state.umsg=`A processar ${filesDone}/${pendingFiles.length}: ${pf.name||pf.type}`;
      render();
      try{
        if(pf.type==="mews-reservations"){results.res=results.res.concat(pf.data)}
        else if(pf.type==="mews-availability"){results.avail[pf.prop]=pf.data}
        else if(pf.type==="reservation"){
          const wb=XLSX.read(pf.buf,{cellDates:true});
          const{prop,res,err,total,active}=parseRes(wb);
          if(err){results.logs.push(`${pf.name}: ${err}`);continue}
          const ids=new Set(results.res.map(r=>r.id));
          let added=0;
          for(const r of res){if(!ids.has(r.id)){results.res.push(r);ids.add(r.id);added++}}
          results.logs.push(`${prop||"?"}: ${added} reservas`)
        }else if(pf.type==="availability"){
          const wb=XLSX.read(pf.buf,{cellDates:true});
          const{prop,data}=parseAvail(wb);
          results.avail[prop]=data;
          results.logs.push(`Avail ${prop}: ${Object.keys(data).length} dias`)
        }
      }catch(e){results.logs.push(`${pf.name||pf.type}: ${e.message}`)}
    }

    // Compute average ADR per property
    const propAdrSum={},propAdrCnt={};
    results.res.forEach(r=>{
      if(r.adr>0){propAdrSum[r.prop]=(propAdrSum[r.prop]||0)+r.adr;propAdrCnt[r.prop]=(propAdrCnt[r.prop]||0)+1}
    });
    const propAvgAdrs={};
    Object.keys(propAdrSum).forEach(p=>{propAvgAdrs[p]=propAdrCnt[p]>0?Math.round(propAdrSum[p]/propAdrCnt[p]):0});

    // Compute guest active bookings
    const guestBookCnt={};
    results.res.forEach(r=>{const gid=r.email||r.guest;if(gid)guestBookCnt[gid]=(guestBookCnt[gid]||0)+1});
    results.res.forEach(r=>{r.propAvgAdr=propAvgAdrs[r.prop]||0;const gid=r.email||r.guest;r.guestActiveBookings=guestBookCnt[gid]||1});

    // Score and compute risk factors
    const scored=results.res.map(r=>{
      const{score,level,override,prob}=computeRisk(r);
      const factors=extractRiskFactors(r);
      const nt=nationalityTier(r.nationality);
      const riskRev=Math.round(r.total*prob/100);
      return{...r,score,level,override,prob,factors,riskRev,natTier:nt,offer:offerTemplate(level,r.daysUntil,r.nights)};
    });

    buildPropertyShorthand(scored);

    // Compute overbooking
    const ob=computeOverbooking(scored,results.avail);

    data={reservations:scored,availability:results.avail,overbooking:ob.overbooking,obMap:ob.obMap,log:data.log.concat(results.logs),generated:new Date().toISOString(),calibratedWeights:data.calibratedWeights,weatherCache:data.weatherCache,serviceId:data.serviceId,serviceIds:data.serviceIds};
    state.phase="dashboard";
    state.uping=false;
    state.umsg="";
    pendingFiles=[];
    render();
  }

  function computeOverbooking(scored,availData){
    const ob=[];
    const dnArr=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    const cutoff=new Date(Date.now()+90*864e5).toISOString().split("T")[0];
    const dayOcc={};
    scored.forEach(r=>{
      let d=new Date(r.arrival+"T12:00:00");
      const dep=new Date(r.departure+"T12:00:00");
      while(d<dep){
        const ds=d.toISOString().split("T")[0];
        const key=r.prop+"|"+ds;
        if(!dayOcc[key])dayOcc[key]={total:0,high:[],adrs:[]};
        dayOcc[key].total++;
        if(r.adr>0)dayOcc[key].adrs.push(r.adr);
        if(r.level==="HIGH")dayOcc[key].high.push(r);
        d.setDate(d.getDate()+1)
      }
    });
    properties.forEach(prop=>{
      const avail=availData[prop]||{};
      const allDays=new Set([...Object.keys(avail),...Object.keys(dayOcc).filter(k=>k.startsWith(prop+"|")).map(k=>k.split("|")[1])]);
      allDays.forEach(ds=>{
        if(ds<today||ds>cutoff)return;
        const key=prop+"|"+ds;
        const dd=dayOcc[key]||{total:0,high:[],adrs:[]};
        const av=avail[ds];
        const hi=dd.high;
        if(hi.length<2)return;
        let occPct=0;
        let capacity=0;
        if(av&&av.spaces>0){occPct=av.occPct||0;capacity=av.spaces}
        const resvOccPct=dd.total>0&&capacity>0?Math.round(dd.total/capacity*1000)/10:0;
        if(resvOccPct>occPct)occPct=resvOccPct;
        const avgRate=dd.adrs.length>0?Math.round(dd.adrs.reduce((s,v)=>s+v,0)/dd.adrs.length):(av?.avgRate||100);
        if((occPct>=70&&hi.length>=2)||hi.length>=3){
          const n=Math.min(Math.max(1,Math.floor(hi.length*.4)),3);
          const adj=Math.max(1,n-(hi.some(r=>r.daysUntil>7)?1:0));
          const hiGuests=hi.sort((a,b)=>b.score-a.score).slice(0,5).map(r=>r.guest.split(" ").pop());
          const fr=av?(av.rooms||[]).filter(rt=>rt.avail<=1):[]; // rooms near full capacity
          const avgProb=hi.length>0?hi.reduce((s,r)=>s+(r.prob||0),0)/hi.length/100:0;
          const combinedProb=Math.min(0.95,1-Math.pow(1-avgProb,adj));
          const walkCost=avgRate*2.5;
          const extraRev=avgRate*adj;
          const ev=Math.round(combinedProb*extraRev-(1-combinedProb)*walkCost);
          ob.push({date:ds,prop,occPct,nHigh:hi.length,ob:adj,rooms:fr.slice(0,adj).map(rt=>({type:rt.type,rate:rt.rate,categoryId:rt.categoryId})),roomsStr:fr.slice(0,adj).map(rt=>rt.type.split(" - ").pop().replace("Apartment","Apt")).join(", ")||"Qualquer tipo",avgRate,dow:dnArr[new Date(ds+"T12:00:00").getDay()],hiGuests:hiGuests.join(", "),week:Math.ceil((new Date(ds+"T12:00:00").getDate())/7),month:new Date(ds+"T12:00:00").toLocaleString("pt",{month:"short"}),ev,combinedProb:Math.round(combinedProb*100),walkCost:Math.round(walkCost),categoryIds:[...new Set(fr.slice(0,adj).map(rt=>rt.categoryId).filter(Boolean))]})
        }
      })
    });
    ob.sort((a,b)=>a.date.localeCompare(b.date));
    const obMap={};
    ob.forEach(o=>{
      const key=o.prop+"|"+o.date;
      const hiOnDay=scored.filter(r=>r.prop===o.prop&&r.level==="HIGH"&&r.arrival<=o.date&&r.departure>o.date);
      const hiRoomIds=hiOnDay.map(r=>r.room);
      obMap[key]={ob:o.ob,rooms:o.rooms,rate:o.avgRate,hiRooms:hiRoomIds,hiGuests:hiOnDay.slice(0,3).map(r=>r.guest.split(" ").pop())}
    });
    return{overbooking:ob,obMap};
  }

  function getDays(){const a=[];for(let i=0;i<state.viewDays;i++){const d=new Date(state.vs+"T12:00:00");d.setDate(d.getDate()+i);a.push(d.toISOString().split("T")[0])}return a}

  async function addNote(resvId,guestName,score,prob,level,factors){
    const btn=document.getElementById("note-btn-"+resvId);
    if(btn){btn.disabled=true;btn.textContent="A adicionar nota...";btn.style.opacity="0.6"}
    try{
      const text=`nexo — Risco ${level} (${prob}%)\nFactores: ${factors.join(", ")}\nGerado: ${new Date().toLocaleString("pt")}`;
      await callMewsProxy("serviceOrderNotes/add",{ServiceOrderNotes:[{ServiceOrderId:resvId,Text:text,Type:"General"}]});
      addLog(`Nota: ${guestName} (${level})`);
      if(btn){btn.textContent="✓ Nota adicionada";btn.style.background="#34C759";btn.style.color="#fff";btn.style.borderColor="#34C759";btn.style.opacity="1"}
      return true
    }catch(e){
      addLog(`Nota falhou: ${e.message}`);
      if(btn){btn.textContent="✗ Erro: "+e.message.slice(0,40);btn.style.background="#FF3B30";btn.style.color="#fff";btn.style.borderColor="#FF3B30";btn.style.opacity="1";btn.disabled=false}
      return false
    }
  }

  async function addTask(resvId,guestName,score,prob,arrival,ofr){
    const btn=document.getElementById("task-btn-"+resvId);
    if(btn){btn.disabled=true;btn.textContent="A criar task...";btn.style.opacity="0.6"}
    try{
      const deadline=new Date(arrival+"T10:00:00Z");
      if(deadline<new Date())deadline.setTime(Date.now()+86400000);
      const name=`nexo: Contactar ${guestName} (${prob}% risco)`;
      const desc=`nexo detectou risco ${prob}% de cancelamento.\nChegada: ${arrival}\nSugestão: ${ofr}`;
      await callMewsProxy("tasks/add",{Name:name.slice(0,100),Description:desc,DeadlineUtc:deadline.toISOString(),ServiceOrderId:resvId});
      addLog(`Task: ${guestName}`);
      if(btn){btn.textContent="✓ Task criada";btn.style.background="#34C759";btn.style.color="#fff";btn.style.borderColor="#34C759";btn.style.opacity="1"}
      return true
    }catch(e){
      addLog(`Task falhou: ${e.message}`);
      if(btn){btn.textContent="✗ Erro: "+e.message.slice(0,40);btn.style.background="#FF3B30";btn.style.color="#fff";btn.style.borderColor="#FF3B30";btn.style.opacity="1";btn.disabled=false}
      return false
    }
  }

  async function openForSale(obIndex){
    const o=data.overbooking[obIndex];
    if(!o)return;
    const btn=document.getElementById("ob-btn-"+obIndex);
    if(btn){btn.disabled=true;btn.textContent="A abrir...";btn.style.opacity="0.6"}
    try{
      const svcId=data.serviceIds[o.prop]||data.serviceId;
      if(!svcId)throw new Error("ServiceId não encontrado para "+o.prop);
      // Set activeProperty for this call based on prop name
      const propEntry=Object.entries(data.serviceIds).find(([k])=>k===o.prop);
      if(propEntry){const propKeyMap={};Object.keys(data.serviceIds).forEach(name=>{const lc=name.toLowerCase();if(lc.includes("hq")||lc.includes("portfolio"))propKeyMap[name]="hq";else if(lc.includes("alegria"))propKeyMap[name]="alegria";else if(lc.includes("santa")&&lc.includes("ii"))propKeyMap[name]="sbii";else if(lc.includes("santa"))propKeyMap[name]="sbi"});activeProperty=propKeyMap[o.prop]||null}
      const catIds=o.categoryIds||[];
      if(!catIds.length){
        const av=data.availability[o.prop]?.[o.date]||data.availability[o.date];
        if(av&&av.rooms)catIds.push(...av.rooms.map(r=>r.categoryId).filter(Boolean));
      }
      if(!catIds.length)throw new Error("Sem categorias disponíveis");
      const dateStart=o.date+"T23:00:00Z";
      const dateEnd=o.date+"T23:00:00Z";
      let ok=0;
      for(const catId of catIds){
        await callMewsProxy("services/updateAvailability",{
          ServiceId:svcId,
          AvailabilityUpdates:[{
            ResourceCategoryId:catId,
            FirstTimeUnitStartUtc:dateStart,
            LastTimeUnitStartUtc:dateEnd,
            UnitCountAdjustment:{Value:1}
          }]
        });
        ok++;
      }
      activeProperty=null;
      addLog(`Overbooking: +${ok} em ${fmt(o.date)} (${o.prop})`);
      if(btn){btn.textContent="✓ Aberto à venda";btn.style.background="#8B9A00";btn.style.color="#fff";btn.style.borderColor="#8B9A00";btn.style.opacity="1"}
    }catch(e){
      activeProperty=null;
      addLog(`Overbooking falhou: ${e.message}`);
      if(btn){btn.textContent="✗ "+e.message.slice(0,30);btn.style.background="#FF3B30";btn.style.color="#fff";btn.style.borderColor="#FF3B30";btn.style.opacity="1";btn.disabled=false}
    }
  }

  async function bulkAddNotes(){
    if(!confirm("Adicionar nota em todas as "+data.reservations.filter(r=>r.level==="HIGH").length+" reservas de alto risco?"))return;
    state.uping=true;state.umsg="Adicionando notas...";render();
    const hi=data.reservations.filter(r=>r.level==="HIGH");
    let ok=0,fail=0;
    for(const r of hi){
      const success=await addNote(r.id,r.guest,r.score,r.prob,r.level,r.factors||[]);
      if(success)ok++;else fail++;
      state.umsg=`Notas: ${ok+fail}/${hi.length}...`;
      render()
    }
    state.uping=false;
    state.umsg=`${ok} notas adicionadas${fail?", "+fail+" falharam":""}`;
    render()
  }

  async function bulkAddTasks(){
    const hi=data.reservations.filter(r=>r.level==="HIGH"&&r.daysUntil>0&&r.daysUntil<=14);
    if(!confirm("Criar task para "+hi.length+" reservas de alto risco nos próximos 14 dias?"))return;
    state.uping=true;state.umsg="Criando tasks...";render();
    let ok=0,fail=0;
    for(const r of hi){
      const success=await addTask(r.id,r.guest,r.score,r.prob,r.arrival,r.offer||"Oferecer upgrade");
      if(success)ok++;else fail++;
      state.umsg=`Tasks: ${ok+fail}/${hi.length}...`;
      render()
    }
    state.uping=false;
    state.umsg=`${ok} tasks criadas${fail?", "+fail+" falharam":""}`;
    render()
  }

        if(!r){
          if(obDay&&obDay.rooms.length>0){const rowCat=(row.res[0]&&row.res[0].roomType)||"";const matchesOB=obDay.rooms.some(rt=>rowCat.includes(rt.type.split(" - ").pop().trim().split(" ")[0]));if(matchesOB){h+=`<div class="tl-c" style="height:${rH}px;background:#E8FF5B20;border:1px dashed #E8FF5B90;border-radius:3px;cursor:pointer" title="Abrir à venda" onclick="nexo.selectTab('overbooking')"><span style="font-size:8px;color:#8B9A00;font-weight:800">+1</span></div>`;return}}
          h+=`<div class="tl-c" style="height:${rH}px;background:${iW?"#f0f0f5":"#fafafa"}"></div>`;return
        }
        const isA=r.arrival===day,bg=reservationColor(r);
        const isObTarget=obDay&&r.level==="HIGH"&&obDay.hiRooms.includes(row.room);
        const obStyle=isObTarget?"box-shadow:inset 0 0 0 2px #E8FF5B;":"";
        h+=`<div class="tl-c res" style="height:${rH}px;background:${bg};opacity:${isA?1:.65};${isA?"border-radius:4px 0 0 4px;":""}${obStyle}" onclick="nexo.selectReservation('${r.id}')" title="${r.guest} — ${r.prob}%">${isA&&cW>=30?`<span style="font-size:8px;color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3);padding:0 2px;overflow:hidden;white-space:nowrap">${(r.guest.split(" ").pop()||"").slice(0,5)}</span>`:""}</div>`
      });
      h+=`</div>`
    });
    h+=`</div></div><div class="legend"><span><i style="background:#FF3B30"></i>Alto risco</span><span><i style="background:#FF9500"></i>Médio</span><span><i style="background:#34C759"></i>Baixo</span><span><i style="background:#000"></i>NR+Pago</span><span><i style="background:#E8FF5B;border:1px dashed #8B9A00"></i>Overbooking</span></div></div>`;
    return h
  }

  function renderOverbooking(ob,obRev){
    let h=`<div class="tbl">`;
    if(!ob.length){h+=`<div style="padding:60px;text-align:center"><div style="font-size:40px;margin-bottom:12px">✓</div><div style="font-size:16px;font-weight:900;color:#000;margin-bottom:6px">Sem oportunidades de overbooking</div><div style="font-size:13px;color:#86868B">Neste momento não há dias com reservas de alto risco suficientes.</div></div>`}else{
      const obByProp={};ob.forEach(o=>{if(!obByProp[o.prop])obByProp[o.prop]={nights:0,rev:0};obByProp[o.prop].nights+=o.ob;obByProp[o.prop].rev+=o.ob*o.avgRate});
      h+=`<div style="display:grid;grid-template-columns:repeat(${Math.min(properties.length,4)},1fr);gap:12px;margin-bottom:20px">`;
      properties.forEach(p=>{const d=obByProp[p]||{nights:0,rev:0};h+=`<div style="background:#fff;border:1px solid ${d.nights>0?"#E8FF5B":"#E5E5EA"};border-radius:12px;padding:16px;text-align:center"><div style="font-size:10px;color:#86868B;font-weight:700;letter-spacing:1px;text-transform:uppercase">${p}</div><div style="font-size:28px;font-weight:900;color:${d.nights>0?"#8B9A00":"#D2D2D7"};margin:4px 0">+${d.nights}</div><div style="font-size:11px;color:#86868B">€${Math.round(d.rev).toLocaleString()} potencial</div></div>`});
      h+=`</div>`;
      h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">`;
      ob.forEach((o,idx)=>{
        const confColor=o.combinedProb>=70?"#FF3B30":o.combinedProb>=50?"#FF9500":"#000";
        h+=`<div class="ob-card"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px"><div><div style="font-size:18px;font-weight:900;color:#000">${fmt(o.date)}</div><div style="font-size:12px;color:#86868B;margin-top:2px">${o.dow} · ${o.prop}</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:900;color:#8B9A00">+${o.ob}</div><div style="font-size:10px;color:#86868B">quarto${o.ob>1?"s":""}</div></div></div>`;
        h+=`<div style="display:flex;gap:10px;margin-bottom:12px"><div style="flex:1;background:#F4F5F9;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:9px;color:#86868B;font-weight:700;letter-spacing:1px">CONFIANÇA</div><div style="font-size:16px;font-weight:900;color:${confColor}">${o.combinedProb}%</div></div><div style="flex:1;background:#F4F5F9;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:9px;color:#86868B;font-weight:700;letter-spacing:1px">RECEITA</div><div style="font-size:16px;font-weight:900;color:#34C759">€${o.avgRate*o.ob}</div></div></div>`;
        h+=`<div style="font-size:11px;color:#999;margin-bottom:10px"><span style="font-weight:600;color:#000">${o.roomsStr}</span></div>`;
        h+=`<button id="ob-btn-${idx}" onclick="nexo.openForSale(${idx})" class="action-btn" style="background:#E8FF5B;color:#000;border-color:#8B9A00;font-size:11px;padding:8px">Abrir à venda (+${o.ob})</button>`;
        h+=`</div>`
      });
      h+=`</div>`;
      h+=`<div style="margin-top:16px;padding:14px;background:#fff;border-radius:12px;border:1px solid #E5E5EA;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#86868B">${ob.length} dias · ${ob.reduce((s,o)=>s+o.ob,0)} quartos extra</span><span style="font-size:16px;font-weight:900;color:#8B9A00">€${Math.round(obRev).toLocaleString()} receita potencial</span></div>`
    }
    h+=`</div>`;
    return h
  }

  function renderRetention(ret){
    let h=`<div class="tbl">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:14px;font-weight:900;color:#000">${ret.length} reservas para contactar</div><div style="display:flex;gap:6px"><button class="btn act" onclick="nexo.bulkAddNotes()" ${state.uping?'disabled':''} style="font-size:10px;padding:5px 10px">Notas Mews</button><button class="btn" onclick="nexo.bulkAddTasks()" ${state.uping?'disabled':''} style="font-size:10px;padding:5px 10px;border-color:#FF950040;color:#FF9500">Tasks Mews</button></div></div>`;
    h+=`<table><tr><th>#</th><th>Confiança</th><th>Hóspede</th><th>Chegada</th><th>Dias</th><th>€ em Risco</th><th>Ação</th></tr>`;
    ret.forEach((r,i)=>{
      const pc=probColor(r.prob);
      const wl=r.phone?waLink(r.phone,waMsg(r.level,r.guest,r.prop,r.arrival,r.nights,r.offer)):"";
      h+=`<tr onclick="nexo.selectReservation('${r.id}')"><td style="color:#D2D2D7">${i+1}</td><td><span class="prob-bar" style="width:${Math.max(6,r.prob*.5)}px;background:${pc}"></span><span style="font-weight:700;color:${pc}">${r.prob}%</span></td><td style="color:#000;font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.guest}</td><td style="color:#86868B">${fmt(r.arrival)}</td><td style="color:${r.daysUntil<=7?"#FF3B30":"#86868B"};font-weight:${r.daysUntil<=7?700:400}">${r.daysUntil}d</td><td style="color:#FF3B30;font-weight:700">€${r.riskRev||0}</td><td>${wl?`<a href="${wl}" target="_blank" onclick="event.stopPropagation()" style="background:#34C759;color:#fff;padding:4px 10px;border-radius:980px;font-size:10px;font-weight:700;text-decoration:none">WhatsApp</a>`:`<span style="color:#D2D2D7;font-size:10px">sem tel.</span>`}</td></tr>`
    });
    h+=`</table></div>`;
    return h
  }

  function renderPeriods(){
    let h=`<div class="tbl">`;
    const byMo={};
    data.reservations.forEach(r=>{
      const mo=r.arrival?r.arrival.slice(0,7):"?";
      if(!byMo[mo])byMo[mo]={total:0,hi:0,me:0,lo:0,rev:0,riskRev:0};
      byMo[mo].total++;
      if(r.level==="HIGH")byMo[mo].hi++;else if(r.level==="MEDIUM")byMo[mo].me++;else byMo[mo].lo++;
      byMo[mo].rev+=r.total||0;
      byMo[mo].riskRev+=r.riskRev||0
    });
    const months=Object.entries(byMo).sort((a,b)=>a[0].localeCompare(b[0]));
    h+=`<div style="font-size:14px;font-weight:900;color:#000;margin-bottom:16px">Visão por Mês</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">`;
    months.forEach(([mo,d])=>{
      const hiPct=d.total>0?Math.round(d.hi/d.total*100):0;
      const riskLevel=hiPct>=30?"#FF3B30":hiPct>=15?"#FF9500":"#34C759";
      const monthName=new Date(mo+"-15").toLocaleString("pt",{month:"long",year:"numeric"});
      h+=`<div class="period-card"><div style="font-size:14px;font-weight:900;color:#000;text-transform:capitalize;margin-bottom:10px">${monthName}</div><div style="display:flex;gap:8px;margin-bottom:10px"><div style="flex:1"><div style="font-size:10px;color:#86868B;font-weight:700">Total</div><div style="font-size:18px;font-weight:900;color:#000">${d.total}</div></div><div style="flex:1"><div style="font-size:10px;color:#86868B;font-weight:700">Alto Risco</div><div style="font-size:18px;font-weight:900;color:${riskLevel}">${d.hi}</div></div></div><div style="background:#F4F5F9;border-radius:8px;padding:10px"><div style="font-size:10px;color:#86868B;font-weight:700;margin-bottom:4px">Receita em Risco</div><div style="font-size:14px;font-weight:900;color:#FF3B30">€${Math.round(d.riskRev/1000)}K</div></div></div>`
    });
    h+=`</div></div>`;
    return h
  }

  function renderUpload(){
    let h=`<div class="up-zone">`;
    h+=`<svg viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg" style="width:280px;height:75px;margin-bottom:20px"><defs><linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E7A4C2"/><stop offset="100%" stop-color="#F04FA0"/></linearGradient><clipPath id="fc"><rect x="5" y="5" width="150" height="150" rx="28"/></clipPath></defs><rect x="5" y="5" width="150" height="150" rx="28" fill="url(#fbg)"/><g clip-path="url(#fc)" fill="#000"><path d="M42 116V44h34l54 54v18h-18L68 72v44H42z"/><circle cx="110" cy="57" r="14"/></g><text x="180" y="115" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="110" fill="#000" letter-spacing="-3">NEXO</text></svg>`;
    h+=`<div style="font-size:13px;color:#86868B;margin-bottom:32px;margin-top:-8px">Inteligência de cancelamentos para o seu hotel</div>`;
    h+=`<div class="api-section"><h3>Conectar à Mews</h3><div class="msg">Carrega automaticamente todas as reservas, disponibilidade e histórico via Mews API.</div><button class="api-btn" onclick="nexo.fetchFromMews()" ${state.uping?'disabled':''}>${state.uping?state.umsg:'Carregar dados'}</button>${state.umsg&&!state.uping?`<div class="msg ${state.umsg.includes("Erro")?"err":"ok"}" style="margin-top:10px">${state.umsg}</div>`:''}</div>`;
    if(data.log.length){h+=`<div style="margin-top:20px;text-align:left;background:#fff;border-radius:12px;border:1px solid #E5E5EA;padding:12px;font-size:11px;max-height:120px;overflow-y:auto">`;data.log.forEach(l=>{h+=`<div style="color:${l.includes("Erro")?"#FF3B30":"#34C759"};margin-bottom:3px">${l}</div>`});h+=`</div>`}
    h+=`</div>`;
    return h
  }

  // ─── PUBLIC API ───
  return{
    render,fetchFromMews,scoreAndProcessReservations,
    addNote,addTask,openForSale,bulkAddNotes,bulkAddTasks,generateWeeklyReport,
    selectProperty:p=>{state.prop=p;state.sel=null;render()},
    selectTab:t=>{state.tab=t;render()},
    setViewDays:d=>{state.viewDays=d;render()},
    prevDays:()=>{const d=new Date(state.vs+"T12:00:00");d.setDate(d.getDate()-state.viewDays);state.vs=d.toISOString().split("T")[0];render()},
    nextDays:()=>{const d=new Date(state.vs+"T12:00:00");d.setDate(d.getDate()+state.viewDays);state.vs=d.toISOString().split("T")[0];render()},
    goToday:()=>{const d=new Date();d.setDate(d.getDate()-1);state.vs=d.toISOString().split("T")[0];render()},
    selectReservation:id=>{state.sel=data.reservations.find(r=>r.id===id)||null;render()},
    clearSelection:()=>{state.sel=null;render()}
  }
})();

window.addEventListener('DOMContentLoaded',()=>nexo.render());
</script>
</body>
</html>
