<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancellation Shield</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fff;color:#1a1a1a;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f5f5f5}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Header — matches Commander top bar */
.hdr{background:#fff;border-bottom:1px solid #e8e8e8;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo i{width:32px;height:32px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;font-style:normal}
.logo h1{font-size:14px;font-weight:700;letter-spacing:-.2px;color:#1a1a1a}.logo small{font-size:10px;color:#999;font-weight:400;display:block;margin-top:1px}
.btns{display:flex;gap:6px;align-items:center}
.btn{padding:6px 14px;border-radius:4px;border:1px solid #e0e0e0;background:#fff;color:#1a1a1a;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{background:#f5f5f5;border-color:#ccc}
.btn.on{border-color:#2246C6;background:#EEF1FB;color:#2246C6}
.btn.api{border-color:#2246C640;color:#2246C6;background:#fff}.btn.api:hover{background:#EEF1FB}
.btn.act{border-color:#e8453040;color:#e84530}.btn.act:hover{background:#fef2f1}
.btn.grn{border-color:#0b844040;color:#0b8440}.btn.grn:hover{background:#f0faf4}

/* Status bar */
.status-bar{padding:8px 20px;background:#fafafa;border-bottom:1px solid #e8e8e8;font-size:11px;color:#999;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%}

/* KPIs — matches Commander card grid */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px;background:#fff}
.kpi{background:#fff;border-radius:8px;padding:16px 18px;border:1px solid #e8e8e8}
.kpi label{font-size:11px;color:#999;font-weight:500;display:block;margin-bottom:4px}
.kpi b{font-size:26px;font-weight:800;line-height:1.1;display:block;letter-spacing:-.5px}.kpi small{font-size:11px;color:#bbb;display:block;margin-top:2px}

/* Tabs — matches Commander tab style */
.tabs{display:flex;border-bottom:1px solid #e8e8e8;background:#fff;padding:0 20px;gap:0}
.tab{padding:12px 16px;background:0;border:none;border-bottom:2px solid transparent;color:#999;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.tab:hover{color:#1a1a1a}.tab.on{border-bottom-color:#2246C6;color:#1a1a1a;font-weight:600}
.nav{display:flex;align-items:center;gap:6px;margin-left:auto;padding:8px 0}
.nbtn{background:#fff;border:1px solid #e0e0e0;color:#666;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;transition:all .15s}
.nbtn:hover{background:#f5f5f5}.nbtn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* Layout */
.content{display:flex;min-height:calc(100vh - 220px)}.main{flex:1;overflow:hidden}

/* Timeline — matches Commander timeline */
.tl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 220px)}
.tl{display:inline-flex;min-width:100%}
.tl-lbl{flex-shrink:0;position:sticky;left:0;z-index:10;background:#fff;border-right:1px solid #e8e8e8}
.tl-r{display:flex;align-items:center;padding:0 8px;border-bottom:1px solid #f0f0f0;font-size:11px}
.tl-c{border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:center;transition:opacity .1s}
.tl-c:hover{opacity:1!important}.tl-c.res{cursor:pointer}
.legend{display:flex;gap:16px;padding:10px 20px;border-top:1px solid #e8e8e8;font-size:11px;background:#fff}
.legend span{display:flex;align-items:center;gap:5px;color:#999;font-weight:500}.legend i{width:10px;height:10px;border-radius:50%;display:inline-block;font-style:normal}

/* Tables — matches Commander table style */
.tbl{padding:20px;overflow-y:auto;max-height:calc(100vh - 220px)}
.tbl table{width:100%;background:#fff;border:1px solid #e8e8e8;border-collapse:collapse;overflow:hidden;border-radius:0}
.tbl th{padding:10px 12px;border-bottom:1px solid #e8e8e8;font-size:11px;font-weight:600;color:#999;text-align:left;background:#fafafa}
.tbl td{padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;color:#1a1a1a}
.tbl tr:hover{background:#f8f9ff}.tbl tr{cursor:pointer;transition:background .1s}

/* Panel — detail sidebar */
.panel{width:360px;border-left:1px solid #e8e8e8;background:#fff;overflow-y:auto;max-height:calc(100vh - 220px);flex-shrink:0}
.panel h2{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-.2px}.panel h3{font-size:11px;color:#999;font-weight:400;margin-top:2px}
.panel .risk{margin:14px 16px;padding:18px;border-radius:8px}
.panel .sc{font-size:30px;font-weight:800;letter-spacing:-.5px}
.panel .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.panel .row label{color:#999;font-weight:400}.panel .row span{color:#1a1a1a;font-weight:500;text-align:right;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel .section-title{font-size:11px;font-weight:600;color:#999;padding:14px 0 6px}

/* Upload — connect page */
.up-zone{max-width:520px;margin:80px auto;padding:30px;text-align:center}
.api-section{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:28px;margin-bottom:24px}
.api-section h3{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:center}
.api-section .msg{font-size:13px;color:#999;line-height:1.6;margin-bottom:16px}
.api-btn{padding:12px 24px;background:#2246C6;color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:all .15s}
.api-btn:hover{background:#1a3aa8}.api-btn:disabled{opacity:.4;cursor:not-allowed}
.api-status{font-size:11px;color:#999;padding:10px;background:#fafafa;border-radius:4px;margin-top:10px}
.up-box{border:2px dashed #ddd;border-radius:8px;padding:24px 16px;cursor:pointer;transition:all .2s;text-align:center;background:#fff}
.up-box:hover{border-color:#2246C6;background:#f8f9ff}.up-box.ok{border-color:#0b8440;background:#f0faf4}
.up-btn{margin-top:20px;padding:12px 32px;background:#2246C6;color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.up-btn:hover{background:#1a3aa8}.up-btn:disabled{opacity:.4;cursor:not-allowed}
.msg{margin-top:12px;font-size:12px}.msg.err{color:#e84530}.msg.ok{color:#0b8440}.msg.info{color:#2246C6}

/* Misc */
.prob-bar{display:inline-block;height:6px;border-radius:3px;margin-right:5px;vertical-align:middle}
.nat-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;margin-left:4px;font-weight:600}
.ob-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:18px;transition:all .15s}
.ob-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.period-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:16px}
.action-btn{display:block;width:100%;padding:10px;margin-bottom:8px;border-radius:4px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-align:center;border:1px solid;transition:all .15s;text-decoration:none;box-sizing:border-box}
.action-btn:hover{opacity:.85}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// CANCELLATION SHIELD v13.0 — CLEAN REDESIGN
// 27 signals · auto-calibration · EV overbooking
// Same engine, new experience
// ═══════════════════════════════════════════════════

let SH={};
let PS=[];
function buildPS(reservations){PS=[...new Set(reservations.map(r=>r.prop).filter(Boolean))].sort();SH={};const used=new Set();PS.forEach(p=>{const clean=p.replace(/\s*\(.*?\)\s*/g,"").trim();const words=clean.split(/\s+/).filter(w=>w.length>0);let abbr;if(words.length===0)abbr=p.replace(/[^A-Za-z0-9]/g,"").slice(0,3).toUpperCase();else if(words.length===1)abbr=words[0].slice(0,3).toUpperCase();else abbr=words.slice(0,3).map(w=>w[0]).join("").toUpperCase();if(abbr.length>4)abbr=abbr.slice(0,4);if(used.has(abbr)){let i=1;while(used.has(abbr+i))i++;abbr=abbr.slice(0,3)+i}used.add(abbr);SH[p]=abbr})}
const fmt=d=>{if(!d)return"";const p=d.split("-");return p[2]+"/"+p[1]};
const dn=d=>["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][new Date(d+"T12:00:00").getDay()];
const rc=l=>l==="HIGH"?"#FF3B30":l==="MEDIUM"?"#FF9500":"#34C759";
const oc=o=>o==="NR+Paid"?"#000":o&&o.includes("Safe")?"#34C759":null;
const cb=r=>oc(r.override)||rc(r.level);
const today=new Date().toISOString().split("T")[0];

// ─── BOOKING.COM BENCHMARKS (2657 reservations) ───
const BDC_LT={Alegria:{1:6.6,3:0,7:1.9,14:26.9,30:38.6,60:42.5,90:69.1,999:67.7},"SB I":{1:8.4,3:2.6,7:9.5,14:31.7,30:46.7,60:51,90:54.5,999:51},"SB II":{1:1.2,3:0,7:10.1,14:20.5,30:40.3,60:46.8,90:64.6,999:55.6}};
const BDC_MO={Alegria:[39.2,29.2,31.2,22.2,33.3,32,32,29.4,29.2,49,40.7,33.3],"SB I":[11.3,25.3,18.3,37.4,41.5,47.4,34.6,37.6,45.1,50,57.1,34.5],"SB II":[9.7,26.5,27.9,31.9,33,30.1,31.5,30.8,38.3,40.5,29.2,46.1]};
const NAT_HIGH=["india","angola","mozambique","united arab emirates","saudi arabia","nigeria","greece","türkiye","turkey","morocco"];
const NAT_MED=["brazil","serbia","singapore","korea","finland","israel","taiwan","romania"];
const NAT_LOW=["belgium","switzerland","latvia","mexico","sweden","netherlands","ukraine","france","czech republic","norway"];

function cancelProb(score){
  if(score<=0)return 3;if(score>=80)return 95;
  const p=95/(1+Math.exp(-0.08*(score-35)));
  return Math.max(3,Math.min(95,Math.round(p)));
}
function probColor(p){return p>=70?"#FF3B30":p>=40?"#FF9500":p>=15?"#000":"#34C759"}

// ─── SCORING MODEL (27 signals) ───
function isNR(r){const l=(r||"").toLowerCase();return l.includes("nr ")||l.startsWith("nr")||l.includes("non-ref")||l.includes("non-refundable")||l.includes("early bird")}
function sRate(r){const l=(r||"").toLowerCase();if(l.includes("flex 3")||l.includes("fully flexible"))return 62;if(l.includes("standard")&&l.includes("breakfast"))return 50;if(l.includes("flex 5"))return 48;if(l.includes("semi-flex"))return 38;if(l.includes("standard")&&l.includes("booking"))return 32;if(l.includes("standard"))return 35;if(l.includes("flex")&&(l.includes("ota")||l.includes("pku")))return 55;if(l.includes("best flex")||l.includes("best rate"))return 45;if(l.includes("half board"))return 30;if(l.includes("bed and breakfast")||l.includes("b&b"))return 28;if(l.includes("black friday"))return 35;if(l.includes("friends")||l.includes("family"))return 5;if(l.includes("welcome"))return 3;if(isNR(r))return 3;if(l.includes("long"))return 10;if(l.includes("superior"))return 20;if(l.includes("test")||l.includes("aut ")||l.includes("solution"))return 30;return 28}
function sChan(s){const l=(s||"").toLowerCase();if(l.includes("telephone"))return 85;if(l.includes("a-hotels")||l.includes("american express"))return 82;if(l.includes("booking.com"))return 38;if(l.includes("booking engine"))return 32;if(l.includes("channel"))return 35;if(l.includes("in person"))return 30;if(l.includes("message")||l.includes("email"))return 25;if(l.includes("hotels.com"))return 18;if(l.includes("airbnb"))return 14;if(l.includes("expedia"))return 17;if(l==="connector"||l.includes("connector"))return 55;if(l==="distributor"||l.includes("distributor"))return 50;if(l==="commander"||l.includes("commander"))return 20;return 25}
function sLT(d,p){if(!d&&d!==0)return 20;if(d<0)return 5;if(d<=1)return 15;if(d<=3)return 30;if(d<=7)return 40;if(d<=14)return 48;if(d<=30)return 55;if(d<=60)return 65;if(d<=90)return 72;return 80}
function sSea(m,p){if(!m)return 25;const b=BDC_MO[p]||Object.values(BDC_MO)[0]||[30,30,30,30,30,30,30,30,30,30,30,30];const i=(m-3+12)%12;return Math.round((b[i]||30)*.7)}
function sLOS(n){if(!n||n<=0)return 20;if(n===1)return 30;if(n<=2)return 25;if(n<=4)return 20;if(n<=7)return 28;if(n<=14)return 55;return 70}
function sPay(p){const s=(p||"").toLowerCase().trim();if(s==="charged"||s==="paid"||s==="success")return 2;if(s==="partial")return 15;if(s==="fail"||s==="failed")return 50;return 45}
function sADR(a){if(!a||a<=0)return 25;if(a<80)return 10;if(a<120)return 12;if(a<180)return 18;if(a<250)return 30;if(a<400)return 45;if(a<1000)return 55;return 40}
function sNat(nat){const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return 10;if(NAT_MED.some(x=>n.includes(x)))return 4;if(NAT_LOW.some(x=>n.includes(x)))return-5;return 0}
function natTier(nat){const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return"HIGH";if(NAT_LOW.some(x=>n.includes(x)))return"LOW";return""}
function sRepeat(ps,pc){if(ps>=3)return-25;if(ps>=1)return-15;if(pc>=2)return 20;if(pc>=1)return 10;return 0}
function sCard(h){return h?-5:8}
function sMod(w){return w?-5:3}
function sDow(a){if(!a)return 0;const d=new Date(a+"T12:00:00").getDay();if(d===5||d===6)return 5;if(d===0)return 3;return 0}
function sPersons(c,ch){if(ch)return-8;if(c>=3)return-3;if(c===1)return 5;return 0}
function sAgency(h){return h?8:0}
function sOtaEmail(h,e){if(h)return 12;if(e&&(e.includes("@guest.booking.com")||e.includes("@relay.")))return 15;return 0}
function sNatMissing(n){return(!n||n==="")?5:0}
function sBookingHour(h){if(h===null||h===undefined)return 50;if(h>=0&&h<=5)return 78;if(h>=22)return 65;if(h>=6&&h<=9)return 38;return 50}
function sModCount(c){if(!c||c===0)return 35;if(c===1)return 55;if(c===2)return 68;return Math.min(80,68+c*4)}
function sADRvsAvg(a,avg){if(!avg||!a||avg===0)return 50;const r=a/avg;if(r<0.6)return 75;if(r<0.8)return 62;if(r>1.4)return 30;if(r>1.1)return 40;return 50}
function sBookPayGap(g){if(g===null||g===undefined)return 50;if(g<=0)return 28;if(g<=1)return 38;if(g<=3)return 50;if(g<=7)return 62;return 75}
function sMultiBooking(c){if(!c||c<=1)return 45;if(c===2)return 65;return Math.min(82,65+c*5)}
function sWeather(code){if(!code)return 50;if(code>=200&&code<300)return 72;if(code>=500&&code<600)return 65;if(code>=600&&code<700)return 68;if(code===800)return 32;if(code>=801&&code<=802)return 40;return 50}

function computeRisk(r, calW){
  const rate=r.rate||"",pay=(r.paymentStatus||r.payment||"").toLowerCase().trim();
  const w = calW || D.calibratedWeights || null;
  if(isNR(rate)&&(pay==="charged"||pay==="success"||pay==="paid"))return{score:2,level:"LOW",override:"NR+Paid",prob:3};
  if(r.previousStays>=2&&isNR(rate))return{score:3,level:"LOW",override:"Repeat+NR",prob:4};
  if(r.hasParking)return{score:3,level:"LOW",override:"Safe:Parking",prob:3};
  if(r.hasVoucher)return{score:4,level:"LOW",override:"Safe:Voucher",prob:5};
  if(r.guestCheckedIn)return{score:3,level:"LOW",override:"Safe:GuestCheckedIn",prob:3};
  if(r.hasPet)return{score:5,level:"LOW",override:"Safe:Pet",prob:5};
  if(r.previousStays>=3)return{score:5,level:"LOW",override:"Safe:Loyal",prob:5};
  const dw={pay:0.15,rate:0.14,lt:0.13,chan:0.12,los:0.06,adr:0.05,repeat:0.08,card:0.06,mod:0.06,sea:0.04,persons:0.03,dow:0.04,otaEmail:0.03,nat:0.04,natMiss:0.03,agency:0.03,noContact:0.03,solo:0.02,bookHour:0.03,modCount:0.04,adrVsAvg:0.03,bookPayGap:0.04,multiBook:0.03,weather:0.02};
  const W=w||dw;
  let s=0;
  s+=(W.pay||dw.pay)*sPay(pay);s+=(W.rate||dw.rate)*sRate(rate);s+=(W.lt||dw.lt)*sLT(r.daysUntil,r.prop);s+=(W.chan||dw.chan)*sChan(r.source);s+=(W.los||dw.los)*sLOS(r.nights);s+=(W.adr||dw.adr)*sADR(r.adr);
  s+=(W.repeat||dw.repeat)*sRepeat(r.previousStays||0,r.previousCancels||0);s+=(W.card||dw.card)*sCard(r.hasCreditCard);s+=(W.mod||dw.mod)*sMod(r.wasModified);
  s+=(W.sea||dw.sea)*sSea(r.arrMonth,r.prop);s+=(W.persons||dw.persons)*sPersons(r.persons,r.hasChildren);s+=(W.dow||dw.dow)*sDow(r.arrival);s+=(W.otaEmail||dw.otaEmail)*sOtaEmail(r.hasOtaEmail,r.email);s+=(W.nat||dw.nat)*sNat(r.nationality);s+=(W.natMiss||dw.natMiss)*sNatMissing(r.nationality);s+=(W.agency||dw.agency)*sAgency(r.hasTravelAgency);
  s+=(W.noContact||dw.noContact)*(r.hasNoContact?55:5);s+=(W.solo||dw.solo)*(r.isSolo?35:15);
  s+=(W.bookHour||dw.bookHour)*sBookingHour(r.bookingHour);s+=(W.modCount||dw.modCount)*sModCount(r.modificationCount||0);s+=(W.adrVsAvg||dw.adrVsAvg)*sADRvsAvg(r.adr,r.propAvgAdr);s+=(W.bookPayGap||dw.bookPayGap)*sBookPayGap(r.bookPayGapDays);s+=(W.multiBook||dw.multiBook)*sMultiBooking(r.guestActiveBookings);s+=(W.weather||dw.weather)*sWeather(r.weatherCode);
  if(r.isRelay)s+=15;if(r.isGenius)s-=3;if(r.lateArrival)s+=3;
  let ov="";if(isNR(rate)&&pay!=="charged"&&pay!=="success"&&pay!=="paid"){s+=10;ov="NR:noPay"}
  s=Math.max(0,Math.min(Math.round(s),100));
  const prob=cancelProb(s);
  return{score:s,level:s>=38?"HIGH":s>=18?"MEDIUM":"LOW",override:ov,prob};
}
function tmpl(lv,d,n){if(lv==="HIGH"){if(n>=8)return"7A";if(d>14)return n>=5?"1B":"1A";if(d>7)return"2A/2B";if(d>3)return"3A/3B";return"3A"}if(lv==="MEDIUM")return d>14?"4A":"5A";return"-"}
function offer(lv,d,n){if(lv==="HIGH"){if(n>=8)return"Welcome+mid-stay+late c-out";if(d>14)return"Early c-in+late c-out";if(d>7)return"Early c-in+upgrade";if(d>3)return"Crédito/datas alt.";return"Contacto urgente"}if(lv==="MEDIUM")return d>14?"Guia bairro":"Info check-in";return"-"}
function chan(src,lv){const s=(src||"").toLowerCase();if(s.includes("booking.com"))return"BDC Extranet";if(s.includes("airbnb"))return"Airbnb";if(s.includes("expedia")||s.includes("hotels.com"))return"Expedia";return lv==="HIGH"?"WhatsApp":"Email"}

function waMsg(lv,guest,prop,arrival,nights,ofr){
  const fn=(guest||"").split(" ")[0]||"Guest";const dt=arrival||"";
  if(lv==="HIGH")return encodeURIComponent(`Olá ${fn}! 👋\n\nSomos a equipa do ${prop}. Estamos a preparar tudo para a sua chegada no dia ${dt} (${nights} noites).\n\n🎁 Temos uma oferta especial para si: ${ofr}\n\nPodemos ajudar com alguma coisa antes da sua estadia? Estamos aqui para o que precisar!\n\nEquipa ${prop} 🏠`);
  return encodeURIComponent(`Olá ${fn}! 👋\n\nA equipa do ${prop} está entusiasmada com a sua visita no dia ${dt}!\n\nSe precisar de informações sobre check-in, transporte ou dicas locais, estamos aqui para ajudar. 😊\n\nEquipa ${prop} 🏠`);
}
function waLink(phone,msg){if(!phone)return"";const clean=phone.replace(/[^0-9+]/g,"").replace(/^\+/,"");return"https://wa.me/"+clean+"?text="+msg}

function detectProp(wb){const ps=wb.Sheets["Parameters"];if(!ps)return"";const d=XLSX.utils.sheet_to_json(ps,{header:1});for(const r of d){const k=String(r[0]||""),v=String(r[1]||"");if(k.includes("Enterprise")&&v.trim())return v.trim()}return""}

  for(const pf of pendingFiles){filesDone++;st.umsg=`A processar ${filesDone}/${pendingFiles.length}: ${pf.name}`;render();try{const wb=XLSX.read(pf.buf,{cellDates:true});if(pf.type==="reservation"){const{prop,res,err,total,active}=parseRes(wb);if(err){results.logs.push(`${pf.name}: ${err}`);continue}const ids=new Set(results.res.map(r=>r.id));let added=0;for(const r of res){if(!ids.has(r.id)){results.res.push(r);ids.add(r.id);added++}}results.logs.push(`${prop||"?"}: ${added} reservas`)}else if(pf.type==="availability"){const{prop,data}=parseAvail(wb);results.avail[prop]=data;results.logs.push(`Avail ${prop}: ${Object.keys(data).length} dias`)}}catch(e){results.logs.push(`${pf.name}: ${e.message}`)}}

  const propAvgAdrs={};Object.keys(propAdrSum).forEach(p=>{propAvgAdrs[p]=propAdrCnt[p]>0?Math.round(propAdrSum[p]/propAdrCnt[p]):0});
  const guestBookCnt={};results.res.forEach(r=>{const gid=r.email||r.guest;if(gid)guestBookCnt[gid]=(guestBookCnt[gid]||0)+1});
  results.res.forEach(r=>{r.propAvgAdr=propAvgAdrs[r.prop]||0;const gid=r.email||r.guest;r.guestActiveBookings=guestBookCnt[gid]||1});
  const scored=results.res.map(r=>{const{score,level,override,prob}=computeRisk(r);const factors=[];if(r.previousCancels>0)factors.push("Cancelou antes");if(r.previousStays>0)factors.push("Repetente");if(!r.hasCreditCard&&r.paymentStatus!=="charged")factors.push("Sem cartão");if(r.hasOtaEmail)factors.push("Email OTA");if(r.hasTravelAgency)factors.push("Agência");if(r.hasChildren)factors.push("Família");if(r.wasModified)factors.push("Modificada");if(sRate(r.rate)>=35)factors.push("Rate flexível");if(sChan(r.source)>=35)factors.push("Canal arriscado");if(r.leadTimeDays>30)factors.push("Antecedência "+r.leadTimeDays+"d");if(r.nights>7)factors.push("Estadia longa");if(sPay(r.payment)>=30)factors.push("Sem pagamento");if(r.bookingHour!==null&&(r.bookingHour>=22||r.bookingHour<=5))factors.push("Reserva noturna");if(r.guestActiveBookings>=2)factors.push("Multi-reserva");if(r.weatherCode&&r.weatherCode>=500)factors.push("Mau tempo");const nt=natTier(r.nationality);const riskRev=Math.round(r.total*prob/100);return{...r,score,level,override,prob,factors,riskRev,natTier:nt,template:tmpl(level,r.daysUntil,r.nights),offer:offer(level,r.daysUntil,r.nights),channel:chan(r.source,level)}});
  buildPS(scored);const ob=[];const dnArr=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];const cutoff=new Date(Date.now()+90*864e5).toISOString().split("T")[0];const dayOcc={};scored.forEach(r=>{let d=new Date(r.arrival+"T12:00:00");const dep=new Date(r.departure+"T12:00:00");while(d<dep){const ds=d.toISOString().split("T")[0];const key=r.prop+"|"+ds;if(!dayOcc[key])dayOcc[key]={total:0,high:[],adrs:[]};dayOcc[key].total++;if(r.adr>0)dayOcc[key].adrs.push(r.adr);if(r.level==="HIGH")dayOcc[key].high.push(r);d.setDate(d.getDate()+1)}});
  PS.forEach(prop=>{const avail=results.avail[prop]||{};const allDays=new Set([...Object.keys(avail),...Object.keys(dayOcc).filter(k=>k.startsWith(prop+"|")).map(k=>k.split("|")[1])]);allDays.forEach(ds=>{if(ds<today||ds>cutoff)return;const key=prop+"|"+ds;const dd=dayOcc[key]||{total:0,high:[],adrs:[]};const av=avail[ds];const hi=dd.high;if(hi.length<2)return;let occPct=0;let capacity=0;if(av&&av.spaces>0){occPct=av.occPct||0;capacity=av.spaces}const resvOccPct=dd.total>0&&capacity>0?Math.round(dd.total/capacity*1000)/10:0;if(resvOccPct>occPct)occPct=resvOccPct;const avgRate=dd.adrs.length>0?Math.round(dd.adrs.reduce((s,v)=>s+v,0)/dd.adrs.length):(av?.avgRate||100);if((occPct>=70&&hi.length>=2)||hi.length>=3){const n=Math.min(Math.max(1,Math.floor(hi.length*.4)),3);const adj=Math.max(1,n-(hi.some(r=>r.daysUntil>7)?1:0));const hiGuests=hi.sort((a,b)=>b.score-a.score).slice(0,5).map(r=>r.guest.split(" ").pop());const fr=av?(av.rooms||[]).filter(rt=>rt.avail===0&&rt.rate>0):[];const avgProb=hi.length>0?hi.reduce((s,r)=>s+(r.prob||0),0)/hi.length/100:0;const combinedProb=Math.min(0.95,1-Math.pow(1-avgProb,adj));const walkCost=avgRate*2.5;const extraRev=avgRate*adj;const ev=Math.round(combinedProb*extraRev-(1-combinedProb)*walkCost);ob.push({date:ds,prop,occPct,nHigh:hi.length,ob:adj,rooms:fr.slice(0,adj).map(rt=>({type:rt.type,rate:rt.rate})),roomsStr:fr.slice(0,adj).map(rt=>rt.type.split(" - ").pop().replace("Apartment","Apt")).join(", ")||"Qualquer tipo",avgRate,dow:dnArr[new Date(ds+"T12:00:00").getDay()],hiGuests:hiGuests.join(", "),week:Math.ceil((new Date(ds+"T12:00:00").getDate())/7),month:new Date(ds+"T12:00:00").toLocaleString("pt",{month:"short"}),ev,combinedProb:Math.round(combinedProb*100),walkCost:Math.round(walkCost)})}})});ob.sort((a,b)=>a.date.localeCompare(b.date));

  D={reservations:scored,availability:results.avail,overbooking:ob,obMap,log:results.logs,generated:new Date().toISOString(),calibratedWeights:D.calibratedWeights,weatherCache:D.weatherCache};st.phase="dashboard";st.uping=false;st.umsg="";pendingFiles=[];render();
}

async function addShieldNote(resvId,guestName,score,prob,level,factors){try{const text=`Cancellation Shield — Risco ${level} (${prob}%)\nFactores: ${factors.join(", ")}\nGerado: ${new Date().toLocaleString("pt")}`;await callMewsProxy("serviceOrderNotes/add",{ServiceOrderNotes:[{ServiceOrderId:resvId,Text:text,Type:"General"}]});addLog(`Nota: ${guestName} (${level})`);return true}catch(e){addLog(`Nota falhou: ${e.message}`);return false}}
async function addShieldTask(resvId,guestName,score,prob,arrival,ofr){try{const deadline=new Date(arrival+"T10:00:00Z");if(deadline<new Date())deadline.setTime(Date.now()+86400000);const name=`Shield: Contactar ${guestName} (${prob}% risco)`;const desc=`Cancellation Shield detectou risco ${prob}% de cancelamento.\nChegada: ${arrival}\nSugestão: ${ofr}`;await callMewsProxy("tasks/add",{Tasks:[{Name:name.slice(0,100),Description:desc,DeadlineUtc:deadline.toISOString(),ServiceOrderId:resvId}]});addLog(`Task: ${guestName}`);return true}catch(e){addLog(`Task falhou: ${e.message}`);return false}}

async function bulkAddTasks(){const hi=D.reservations.filter(r=>r.level==="HIGH"&&r.daysUntil>0&&r.daysUntil<=14);if(!confirm("Criar task para "+hi.length+" reservas de alto risco nos próximos 14 dias?"))return;st.uping=true;st.umsg="Criando tasks...";render();let ok=0,fail=0;for(const r of hi){const success=await addShieldTask(r.id,r.guest,r.score,r.prob,r.arrival,r.offer||"Oferecer upgrade");if(success)ok++;else fail++;st.umsg=`Tasks: ${ok+fail}/${hi.length}...`;render()}st.uping=false;st.umsg=`${ok} tasks criadas${fail?", "+fail+" falharam":""}`;render()}

      ob.forEach(o=>{
        const confColor=o.combinedProb>=70?"#FF3B30":o.combinedProb>=50?"#FF9500":"#000";
        h+=`<div class="ob-card"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px"><div><div style="font-size:18px;font-weight:800;color:#000">${fmt(o.date)}</div><div style="font-size:12px;color:#999;margin-top:2px">${o.dow} · ${o.prop}</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:900;color:#2246C6">+${o.ob}</div><div style="font-size:10px;color:#999">quarto${o.ob>1?"s":""}</div></div></div>`;
        h+=`<div style="display:flex;gap:10px;margin-bottom:12px"><div style="flex:1;background:#F4F5F9;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:9px;color:#999;font-weight:600">CONFIANÇA</div><div style="font-size:16px;font-weight:800;color:${confColor}">${o.combinedProb}%</div></div><div style="flex:1;background:#F4F5F9;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:9px;color:#999;font-weight:600">RECEITA</div><div style="font-size:16px;font-weight:800;color:#34C759">€${o.avgRate*o.ob}</div></div></div>`;
        h+=`<div style="font-size:11px;color:#999"><span style="font-weight:600;color:#000">${o.roomsStr}</span></div>`;
        h+=`</div>`;
      });
      h+=`</div>`;
      const totalEV=ob.reduce((s,o)=>s+o.ev,0);
      h+=`<div style="margin-top:16px;padding:14px;background:#fff;border-radius:8px;border:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#999">${ob.length} dias · ${ob.reduce((s,o)=>s+o.ob,0)} quartos extra</span><span style="font-size:16px;font-weight:800;color:#2246C6">€${Math.round(obRev).toLocaleString()} receita potencial</span></div>`}
    h+=`</div>`}

  // ─── RETENTION/AÇÕES TAB ───
  if(st.tab==="retention"){
    h+=`<div class="tbl">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:14px;font-weight:700;color:#000">${ret.length} reservas para contactar</div><div style="display:flex;gap:6px"><button class="btn act" onclick="bulkAddNotes()" ${st.uping?'disabled':''} style="font-size:10px;padding:5px 10px">Notas Mews</button><button class="btn" onclick="bulkAddTasks()" ${st.uping?'disabled':''} style="font-size:10px;padding:5px 10px;border-color:#FF950040;color:#FF9500">Tasks Mews</button></div></div>`;
    h+=`<table><tr><th>#</th><th>Confiança</th><th>Hóspede</th><th>Chegada</th><th>Dias</th><th>€ em Risco</th><th>Ação</th></tr>`;
    ret.forEach((r,i)=>{const pc=probColor(r.prob);const wl=r.phone?waLink(r.phone,waMsg(r.level,r.guest,r.prop,r.arrival,r.nights,r.offer)):"";
    h+=`<tr onclick="sel('${r.id}')"><td style="color:#bbb">${i+1}</td><td><span class="prob-bar" style="width:${Math.max(6,r.prob*.5)}px;background:${pc}"></span><span style="font-weight:700;color:${pc}">${r.prob}%</span></td><td style="color:#000;font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.guest}</td><td style="color:#999">${fmt(r.arrival)}</td><td style="color:${r.daysUntil<=7?"#FF3B30":"#86868B"};font-weight:${r.daysUntil<=7?700:400}">${r.daysUntil}d</td><td style="color:#FF3B30;font-weight:700">€${r.riskRev||0}</td><td>${wl?`<a href="${wl}" target="_blank" onclick="event.stopPropagation()" style="background:#34C759;color:#fff;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;text-decoration:none">WhatsApp</a>`:`<span style="color:#bbb;font-size:10px">sem tel.</span>`}</td></tr>`});
    h+=`</table></div>`}

  // ─── PERÍODOS TAB (Simplified) ───
  if(st.tab==="periods"){
    h+=`<div class="tbl">`;
    const byMo={};D.reservations.forEach(r=>{const mo=r.arrival?r.arrival.slice(0,7):"?";if(!byMo[mo])byMo[mo]={total:0,hi:0,me:0,lo:0,rev:0,riskRev:0};byMo[mo].total++;if(r.level==="HIGH")byMo[mo].hi++;else if(r.level==="MEDIUM")byMo[mo].me++;else byMo[mo].lo++;byMo[mo].rev+=r.total||0;byMo[mo].riskRev+=r.riskRev||0});
    const months=Object.entries(byMo).sort((a,b)=>a[0].localeCompare(b[0]));
    h+=`<div style="font-size:14px;font-weight:700;color:#000;margin-bottom:16px">Visão por Mês</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">`;
    months.forEach(([mo,d])=>{
      const hiPct=d.total>0?Math.round(d.hi/d.total*100):0;
      const riskLevel=hiPct>=30?"#FF3B30":hiPct>=15?"#FF9500":"#34C759";
      const monthName=new Date(mo+"-15").toLocaleString("pt",{month:"long",year:"numeric"});
      h+=`<div class="period-card"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px"><div style="font-size:13px;font-weight:700;color:#000;text-transform:capitalize">${monthName}</div><div style="font-size:11px;font-weight:700;color:${riskLevel}">${hiPct}% risco</div></div>`;
      h+=`<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:10px;background:#f0f0f2">`;
      if(d.total>0){h+=`<div style="width:${d.hi/d.total*100}%;background:#FF3B30"></div><div style="width:${d.me/d.total*100}%;background:#FF9500"></div><div style="width:${d.lo/d.total*100}%;background:#34C759"></div>`}
      h+=`</div>`;
      h+=`<div style="display:flex;justify-content:space-between;font-size:11px;color:#999"><span>${d.total} reservas</span><span style="color:#FF3B30;font-weight:600">€${Math.round(d.riskRev/1000)}K em risco</span></div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`}

  h+=`</div>`;

  // ─── DETAIL PANEL (simplified: 3 sections) ───
  if(sel){const bg=rc(sel.level);const pc=probColor(sel.prob||0);
    h+=`<div class="panel"><div style="padding:16px 18px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:start"><div><h2>${sel.guest}</h2><h3>${sel.prop} · ${sel.room}</h3></div><button onclick="csel()" style="background:0;border:0;color:#bbb;font-size:18px;cursor:pointer">✕</button></div>`;
    // Risk summary
    h+=`<div class="risk" style="background:${bg}10;border:1px solid ${bg}20"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:11px;color:#999;font-weight:600">Probabilidade de cancelar</span></div><span class="sc" style="color:${bg}">${sel.prob||0}%</span></div><div style="background:#E5E5EA;border-radius:4px;height:6px;overflow:hidden;margin-top:8px"><div style="width:${sel.prob||0}%;height:100%;background:${pc};border-radius:4px"></div></div><div style="margin-top:8px;font-size:11px;color:#999">€${sel.riskRev||0} em risco de €${sel.total} total</div></div>`;
    // Section: Reserva
    h+=`<div style="padding:0 18px"><div class="section-title">Reserva</div>`;
    [{l:"Chegada",v:fmt(sel.arrival)+" ("+sel.daysUntil+"d)"},{l:"Saída",v:fmt(sel.departure)},{l:"Noites",v:sel.nights},{l:"Quarto",v:sel.roomType||sel.room},{l:"Rate",v:sel.rate},{l:"ADR",v:"€"+sel.adr},{l:"Total",v:"€"+sel.total},{l:"Canal",v:sel.source}].forEach(d=>{h+=`<div class="row"><label>${d.l}</label><span>${d.v}</span></div>`});
    // Section: Hóspede
    h+=`<div class="section-title">Hóspede</div>`;
    [{l:"Nacionalidade",v:sel.nationality||"—"},{l:"Email",v:sel.email||"—"},{l:"Telefone",v:sel.phone||"—"},{l:"Repetente",v:sel.previousStays>0?sel.previousStays+" estadias":"Novo"},{l:"Pagamento",v:sel.paymentStatus==="charged"?"Pago":sel.paymentStatus||"Pendente"}].forEach(d=>{h+=`<div class="row"><label>${d.l}</label><span>${d.v}</span></div>`});
    // Factors (simplified labels)
    if(sel.factors&&sel.factors.length){h+=`<div class="section-title">Porquê este risco</div><div style="display:flex;flex-wrap:wrap;gap:4px;padding-bottom:12px">`;sel.factors.forEach(f=>{h+=`<span style="display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;background:#FF3B3010;color:#FF3B30;font-weight:500">${f}</span>`});h+=`</div>`}
    // Section: Ações
    if(sel.level==="HIGH"||sel.level==="MEDIUM"){
      h+=`<div class="section-title">Ações</div>`;
      if(sel.phone){const wl=waLink(sel.phone,waMsg(sel.level,sel.guest,sel.prop,sel.arrival,sel.nights,sel.offer));h+=`<a href="${wl}" target="_blank" class="action-btn" style="background:#34C759;color:#fff;border-color:#34C759">Enviar WhatsApp</a>`}
      h+=`<button onclick="addShieldNote('${sel.id}','${sel.guest.replace(/'/g,"\\'")}',${sel.score},${sel.prob},'${sel.level}',${JSON.stringify(sel.factors||[]).replace(/"/g,'&quot;')})" class="action-btn" style="background:#fff;color:#000;border-color:#E5E5EA">Adicionar nota na Mews</button>`;
      h+=`<button onclick="addShieldTask('${sel.id}','${sel.guest.replace(/'/g,"\\'")}',${sel.score},${sel.prob},'${sel.arrival}','${(sel.offer||"").replace(/'/g,"\\'")}')" class="action-btn" style="background:#fff;color:#000;border-color:#E5E5EA">Criar task para equipa</button>`;
    }
    h+=`</div></div>`}
  h+=`</div>`;app.innerHTML=h;
}

function rupload(){
  const rC=pendingFiles.filter(f=>f.type==="reservation").length;
  const aC=pendingFiles.filter(f=>f.type==="availability").length;
  let h=`<div class="hdr"><div class="logo"><i>CS</i><div><h1>Cancellation Shield</h1><small>Hotel Operations</small></div></div></div>`;
  h+=`<div class="up-zone">`;
  h+=`<div style="font-size:36px;margin-bottom:16px">🛡️</div>`;
  h+=`<div style="font-size:22px;font-weight:800;color:#000;margin-bottom:6px">Cancellation Shield</div>`;
  h+=`<div style="font-size:13px;color:#999;margin-bottom:32px">Previsão inteligente de cancelamentos para o seu hotel</div>`;
  h+=`<div class="api-section"><h3>Carregar dados ao vivo</h3><div class="msg">Liga à Mews API e carrega automaticamente todas as reservas, disponibilidade e histórico.</div><button class="api-btn" onclick="fetchFromMews()" ${st.uping?'disabled':''}>${st.uping?st.umsg:'Conectar à Mews'}</button>${st.umsg&&!st.uping?`<div class="msg ${st.umsg.includes("Erro")?"err":"ok"}" style="margin-top:10px">${st.umsg}</div>`:''}</div>`;
  h+=`<div style="text-align:center;margin:24px 0;color:#ccc;font-size:11px;font-weight:600;letter-spacing:1px">OU CARREGAR FICHEIROS</div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  h+=`<label class="up-box${rC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${rC?"✓":"📋"}</div><div style="font-size:12px;font-weight:600;color:#000">Reservation Report</div><div style="font-size:10px;color:#999;margin-top:4px">${rC?rC+" ficheiro(s)":"Mews .xlsx"}</div><input type="file" accept=".xlsx" multiple onchange="addFiles('reservation',event)" style="display:none"></label>`;
  h+=`<label class="up-box${aC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${aC?"✓":"📊"}</div><div style="font-size:12px;font-weight:600;color:#000">Availability Report</div><div style="font-size:10px;color:#999;margin-top:4px">${aC?aC+" ficheiro(s)":"Mews .xlsx"}</div><input type="file" accept=".xlsx" multiple onchange="addFiles('availability',event)" style="display:none"></label>`;
  h+=`</div>`;
  if(rC)h+=`<button class="up-btn" onclick="processFiles()" ${st.uping?'disabled':''}>Processar ${pendingFiles.length} ficheiro${pendingFiles.length>1?"s":""}</button>`;
  if(D.log.length){h+=`<div style="margin-top:20px;text-align:left;background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:12px;font-size:11px;max-height:120px;overflow-y:auto">`;D.log.forEach(l=>{h+=`<div style="color:${l.includes("Erro")?"#FF3B30":"#34C759"};margin-bottom:3px">${l}</div>`});h+=`</div>`}
  h+=`</div>`;return h;
}

function sp(p){st.prop=p;st.sel=null;render()}
function stab(t){st.tab=t;render()}
function sd(d){st.viewDays=d;render()}
function np(){const d=new Date(st.vs+"T12:00:00");d.setDate(d.getDate()-st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nn(){const d=new Date(st.vs+"T12:00:00");d.setDate(d.getDate()+st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nt(){const d=new Date();d.setDate(d.getDate()-1);st.vs=d.toISOString().split("T")[0];render()}
function sel(id){st.sel=D.reservations.find(r=>r.id===id)||null;render()}
function csel(){st.sel=null;render()}

render();
</script>
