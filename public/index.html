<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancellation Shield v7 — The Haus Group</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#0c0f1a;color:#c8d0e0;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#0c0f1a}::-webkit-scrollbar-thumb{background:#1e2545;border-radius:3px}
.hdr{background:#12162a;border-bottom:1px solid #1e2545;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}.logo i{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,#ef4444,#f59e0b,#22c55e);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;font-style:normal}
.logo h1{font-size:14px;font-weight:800;letter-spacing:1px;color:#f0f4ff}.logo small{font-size:9px;color:#4a5280;letter-spacing:2px;display:block}
.btns{display:flex;gap:4px}.btn{padding:5px 12px;border-radius:5px;border:1px solid #1e2545;background:#12162a;color:#4a5280;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn.on{border-color:#4f6ef7;background:#1e3a8a;color:#93b4ff}.btn.warn{border-color:#f59e0b30;color:#f59e0b}
.status{padding:6px 20px;background:#0e1125;border-bottom:1px solid #1e2545;font-size:9px;color:#4a5280;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.kpis{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #1e2545}
.kpi{padding:10px 12px;text-align:center}.kpi label{font-size:8px;color:#4a5280;font-weight:700;letter-spacing:1.5px;display:block;margin-bottom:2px}
.kpi b{font-size:22px;font-weight:900;line-height:1.1;display:block}.kpi small{font-size:9px;color:#3a4270;display:block;margin-top:1px}
.tabs{display:flex;border-bottom:1px solid #1e2545;background:#0e1125}
.tab{padding:8px 18px;background:0;border:none;border-bottom:2px solid transparent;color:#4a5280;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.tab.on{border-bottom-color:#4f6ef7;color:#93b4ff}
.nav{display:flex;align-items:center;gap:6px;padding:0 14px;margin-left:auto}
.nbtn{background:#1e2545;border:none;color:#7080b0;padding:3px 7px;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}
.nbtn.on{background:#1e3a8a;color:#93b4ff;border:1px solid #4f6ef7}
.content{display:flex}.main{flex:1;overflow:hidden}
.tl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 158px)}
.tl{display:inline-flex;min-width:100%}
.tl-lbl{flex-shrink:0;position:sticky;left:0;z-index:10;background:#0c0f1a}
.tl-r{display:flex;align-items:center;padding:0 6px;border-bottom:1px solid #12162a;border-right:1px solid #1e254540;font-size:9px}
.tl-c{border-bottom:1px solid #0e1125;display:flex;align-items:center;justify-content:center;transition:opacity .1s}
.tl-c:hover{opacity:1!important}.tl-c.res{cursor:pointer}
.tbl{padding:14px;overflow-y:auto;max-height:calc(100vh - 158px)}
.tbl table{width:100%;background:#12162a;border-radius:6px;border:1px solid #1e2545;border-collapse:collapse}
.tbl th{padding:6px 8px;border-bottom:1px solid #1e2545;font-size:8px;font-weight:800;color:#3a4270;letter-spacing:1px;text-align:left}
.tbl td{padding:4px 8px;border-bottom:1px solid #1e254530;font-size:10px}
.tbl tr:hover{background:rgba(79,110,247,.06)}
.tbl tr{cursor:pointer}
.legend{display:flex;gap:14px;padding:6px 12px;border-top:1px solid #1e2545;font-size:9px;position:sticky;left:0}
.legend span{display:flex;align-items:center;gap:4px;color:#4a5280}.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;font-style:normal}
.panel{width:340px;border-left:1px solid #1e2545;background:#12162a;overflow-y:auto;max-height:calc(100vh-158px);flex-shrink:0}
.panel h2{font-size:14px;font-weight:800;color:#f0f4ff}.panel h3{font-size:10px;color:#4a5280}
.panel .risk{margin:12px;padding:14px;border-radius:6px}
.panel .sc{font-size:26px;font-weight:900}.panel .lv{font-size:11px;margin-left:8px;font-weight:800}
.panel .ov{display:inline-block;font-size:8px;padding:2px 6px;border-radius:3px;background:#1e2545;color:#6a7aaa;margin-left:8px}
.panel .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e254520;font-size:10px}
.panel .row label{color:#4a5280}.panel .row span{color:#c8d0e0;font-weight:500;text-align:right;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ftag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:3px;background:#ef444418;color:#ef9090;border:1px solid #ef444420;margin:1px}
.up-zone{max-width:600px;margin:40px auto;padding:30px;text-align:center}
.up-box{border:2px dashed #1e2545;border-radius:12px;padding:20px;margin:8px 0;cursor:pointer;transition:all .2s}
.up-box:hover{border-color:#4f6ef7}.up-box.ok{border-color:#22c55e;background:#22c55e08}
.up-btn{margin-top:16px;padding:10px 24px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.up-btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#ef4444;font-size:10px;margin-top:12px}.ok-msg{color:#22c55e;font-size:10px;margin-top:12px}
</style>
</head>
<body>
<div id="app"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:16px"><div style="width:40px;height:40px;border:3px solid #1e2545;border-top:3px solid #4f6ef7;border-radius:50%;animation:sp 1s linear infinite"></div><div style="color:#4a5280;font-size:11px">A carregar...</div></div></div>
<style>@keyframes sp{to{transform:rotate(360deg)}}</style>
<script>
const SH={Alegria:"ALE","SB I":"SBI","SB II":"SBII"};
const PS=["Alegria","SB I","SB II"];
const fmt=d=>{if(!d)return"";const p=d.split("-");return p[2]+"/"+p[1]};
const dn=d=>["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][new Date(d).getDay()];
const rc=l=>l==="HIGH"?"#ef4444":l==="MEDIUM"?"#f59e0b":"#22c55e";
const oc=o=>o==="NR+Paid"?"#60a5fa":o&&o.includes("preCheckedIn")?"#4ade80":null;
const cb=r=>oc(r.override)||rc(r.level);
const today=new Date().toISOString().split("T")[0];

let D=null,pf={reservation:[],availability:[],duve:null};
let st={prop:"ALL",tab:"timeline",sel:null,viewDays:30,uping:false,umsg:""};
st.vs=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split("T")[0]})();

async function load(){try{const r=await fetch("/api/data");const d=await r.json();if(d.status==="no_data"){D=null}else{D=d}render()}catch(e){D=null;render()}}

async function upload(){
  st.uping=true;
  const all=[...pf.reservation,...pf.availability];
  if(pf.duve)all.push(pf.duve);
  let done=0;
  try{
    for(const item of all){
      done++;st.umsg=`A enviar ${done}/${all.length}: ${item.name}`;render();
      const r=await fetch("/api/upload",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({files:[{type:item.type,content:item.content,name:item.name}]})});
      const d=await r.json();
      if(d.status==="error"){st.umsg="Erro: "+(d.error||JSON.stringify(d));st.uping=false;render();return}
    }
    st.umsg="";pf={reservation:[],availability:[],duve:null};
    await load();
  }catch(e){st.umsg="Erro: "+String(e)}
  st.uping=false;render();
}

async function hf(type,e){
  const files=Array.from(e.target.files);
  for(const f of files){
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej('read error');r.readAsDataURL(f)});
    const item={name:f.name,content:b64,type:type};
    if(type==="duve")pf.duve=item;else pf[type]=[...pf[type],item];
  }
  render();
}
function gf(){return D?st.prop==="ALL"?D.reservations:D.reservations.filter(x=>x.prop===st.prop):[]}
function go(){return D?st.prop==="ALL"?D.overbooking:D.overbooking.filter(x=>x.prop===st.prop):[]}
function gd(){const a=[];for(let i=0;i<st.viewDays;i++){const d=new Date(st.vs);d.setDate(d.getDate()+i);a.push(d.toISOString().split("T")[0])}return a}
function gr(){if(!D)return[];const ps=st.prop==="ALL"?PS:[st.prop];const r=[];
ps.forEach(p=>{const pr=D.reservations.filter(x=>x.prop===p);const rm=new Map();
pr.forEach(x=>{const k=x.room||"?";if(!rm.has(k))rm.set(k,[]);rm.get(k).push(x)});
[...rm.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([room,rr])=>r.push({prop:p,room,res:rr}))});return r}

function render(){
  const app=document.getElementById("app");
  if(!D){app.innerHTML=rupload();return}
  const res=gf(),ob=go(),days=gd(),rows=gr(),sel=st.sel;
  const hi=res.filter(r=>r.level==="HIGH"),me=res.filter(r=>r.level==="MEDIUM"),lo=res.filter(r=>r.level==="LOW");
  const ret=res.filter(r=>r.level!=="LOW"&&r.daysUntil>0).sort((a,b)=>a.level===b.level?a.daysUntil-b.daysUntil:a.level==="HIGH"?-1:1);
  const cW=st.viewDays<=14?56:st.viewDays<=30?38:st.viewDays<=60?22:14;
  const rH=26,lW=110;
  let h="";
  // Header
  h+=`<div class="hdr"><div class="logo"><i>CS</i><div><h1>CANCELLATION SHIELD</h1><small>v7 — THE HAUS GROUP — ${(D.generated||"").split("T")[0]}</small></div></div><div class="btns">`;
  ["ALL",...PS].forEach(p=>{h+=`<button class="btn${st.prop===p?" on":""}" onclick="sp('${p}')">${p}</button>`});
  h+=`<button class="btn warn" onclick="D=null;render()" style="margin-left:12px">↑ Upload</button></div></div>`;
  // Status
  const bp=D.summary?.byProp||{};
  h+=`<div class="status"><div class="dot"></div>${D.summary?.total||0} reservas — ${bp.Alegria||0} ALE / ${bp["SB I"]||0} SBI / ${bp["SB II"]||0} SBII — ${(D.generated||"").replace("T"," ").slice(0,16)}</div>`;
  // KPIs
  h+=`<div class="kpis">`;
  [{l:"RESERVAS",v:res.length,c:"#f0f4ff"},{l:"HIGH RISK",v:hi.length,s:"€"+Math.round(hi.reduce((s,r)=>s+r.total,0)/1000)+"K",c:"#ef4444"},
   {l:"MEDIUM",v:me.length,s:"€"+Math.round(me.reduce((s,r)=>s+r.total,0)/1000)+"K",c:"#f59e0b"},
   {l:"LOW/SAFE",v:lo.length,s:lo.filter(r=>r.override).length+" overrides",c:"#22c55e"},
   {l:"RETENÇÃO",v:ret.length,s:"contactar",c:"#60a5fa"},
   {l:"OB DIAS",v:ob.length,s:ob.reduce((s,o)=>s+o.ob,0)+" unit-nights",c:"#a78bfa"},
   {l:"OB RECEITA",v:"€"+Math.round(ob.reduce((s,o)=>s+o.ob*o.avgRate,0)/1000)+"K",s:"potencial",c:"#c084fc"}
  ].forEach(k=>{h+=`<div class="kpi"><label>${k.l}</label><b style="color:${k.c}">${k.v}</b>${k.s?`<small>${k.s}</small>`:""}</div>`});
  h+=`</div>`;
  // Tabs
  h+=`<div class="tabs">`;
  [{id:"timeline",l:"▦ Timeline"},{id:"retention",l:"☎ Retenção"},{id:"overbooking",l:"⊕ Overbooking"}].forEach(t=>{
    h+=`<button class="tab${st.tab===t.id?" on":""}" onclick="stab('${t.id}')">${t.l}</button>`});
  h+=`<div class="nav"><button class="nbtn" onclick="np()">◀</button><button class="nbtn on" onclick="nt()">HOJE</button><button class="nbtn" onclick="nn()">▶</button>`;
  [14,30,60,90].forEach(d=>{h+=`<button class="nbtn${st.viewDays===d?" on":""}" onclick="sd(${d})">${d}d</button>`});
  h+=`</div></div><div class="content"><div class="main">`;

  if(st.tab==="timeline"){
    h+=`<div class="tl-wrap"><div class="tl"><div class="tl-lbl" style="width:${lW}px"><div style="height:28px;background:#12162a;border-bottom:1px solid #1e2545;border-right:1px solid #1e2545"></div>`;
    rows.forEach((row,i)=>{h+=`<div class="tl-r" style="height:${rH}px;background:${i%2===0?"#0c0f1a":"#0e1125"}"><span style="color:#3a4270;width:32px;font-size:8px;font-weight:700">${SH[row.prop]||""}</span><span style="color:#8090c0;font-weight:600">${row.room}</span></div>`});
    h+=`</div><div style="display:flex">`;
    days.forEach(day=>{const iT=day===today,iW=[0,6].includes(new Date(day).getDay());
      h+=`<div style="width:${cW}px;flex-shrink:0"><div style="height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${iT?"#1e3a8a":"#12162a"};border-bottom:1px solid #1e2545"><span style="font-size:7px;color:${iT?"#93b4ff":iW?"#4a5280":"#3a4270"};font-weight:600">${dn(day)}</span><span style="font-size:${cW>=38?10:8}px;color:${iT?"#fff":"#6070a0"};font-weight:700">${new Date(day).getDate()}</span></div>`;
      rows.forEach((row,ri)=>{const r=row.res.find(x=>x.arrival<=day&&x.departure>day);
        if(!r){h+=`<div class="tl-c" style="height:${rH}px;background:${iW?"#0b0e18":"#0c0f1a"}"></div>`;return}
        const isA=r.arrival===day,bg=cb(r);
        h+=`<div class="tl-c res" style="height:${rH}px;background:${bg};opacity:${isA?1:.7};${isA?"border-radius:3px 0 0 3px;":""}" onclick="sel('${r.id}')" title="${r.guest}|${r.level}(${r.score})|${r.rate}">${isA&&cW>=30?`<span style="font-size:7px;color:#fff;font-weight:800;text-shadow:0 1px 3px #000;overflow:hidden;white-space:nowrap;padding:0 2px">${(r.guest.split(" ").pop()||"").slice(0,5)}</span>`:""}</div>`});
      h+=`</div>`});
    h+=`</div></div>`;
    h+=`<div class="legend"><span><i style="background:#ef4444"></i>HIGH</span><span><i style="background:#f59e0b"></i>MEDIUM</span><span><i style="background:#22c55e"></i>LOW</span><span><i style="background:#60a5fa"></i>NR+Paid</span><span><i style="background:#4ade80"></i>Duve</span></div></div>`;
  }

  if(st.tab==="retention"){
    h+=`<div class="tbl"><div style="font-size:12px;font-weight:800;margin-bottom:10px;color:#f0f4ff">Contactar — ${ret.length} reservas</div><table><tr><th>#</th><th>SCORE</th><th>RISK</th><th>PROP</th><th>GUEST</th><th>ARRIVAL</th><th>N</th><th>DIAS</th><th>TMPL</th><th>CANAL</th><th>OFERTA</th></tr>`;
    ret.forEach((r,i)=>{
      h+=`<tr onclick="sel('${r.id}')"><td style="color:#4a5280">${i+1}</td><td style="font-weight:800;color:${rc(r.level)}">${r.score}</td><td style="font-weight:700;color:${rc(r.level)};font-size:9px">${r.level}</td><td style="color:#5a6a9a;font-size:9px">${SH[r.prop]||""}</td><td style="color:#c8d0e0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.guest}</td><td style="color:#6a7aaa">${fmt(r.arrival)}</td><td style="color:#6a7aaa">${r.nights}n</td><td style="color:${r.daysUntil<=7?"#ef4444":"#6a7aaa"};font-weight:${r.daysUntil<=7?800:400}">${r.daysUntil}d</td><td style="color:#4f6ef7;font-weight:700">${r.template}</td><td style="color:#a78bfa;font-size:9px">${r.channel||""}</td><td style="color:#4a5280;font-size:9px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.offer}</td></tr>`;
    });
    h+=`</table></div>`;
  }

  if(st.tab==="overbooking"){
    h+=`<div class="tbl"><div style="font-size:12px;font-weight:800;margin-bottom:4px;color:#f0f4ff">Overbooking — Apartamentos para vender</div><div style="font-size:9px;color:#4a5280;margin-bottom:12px">Ocup ≥70% + HIGH risk. Máx 40% das HIGH.</div>`;
    if(ob.length===0){h+=`<div style="padding:40px;text-align:center;color:#3a4270">Nenhuma oportunidade</div>`}
    else{h+=`<table><tr><th>DATA</th><th>DIA</th><th>PROP</th><th>OCUP</th><th>HIGH</th><th>OB</th><th>TIPO APT</th><th>RATE</th></tr>`;
    ob.forEach(o=>{h+=`<tr><td style="color:#c8d0e0;font-weight:700">${fmt(o.date)}</td><td style="color:#4a5280">${o.dow}</td><td style="color:#6a7aaa;font-size:9px">${SH[o.prop]||""}</td><td style="color:${o.occPct>=90?"#ef4444":"#f59e0b"};font-weight:800">${Math.round(o.occPct)}%</td><td style="color:#ef4444;font-weight:800">${o.nHigh}</td><td style="color:#a78bfa;font-weight:900;font-size:13px">+${o.ob}</td><td style="color:#5a6a9a;font-size:9px">${o.rooms}</td><td style="color:#22c55e;font-weight:700">€${o.avgRate}</td></tr>`});
    h+=`</table><div style="padding:8px;font-size:10px;color:#4a5280;display:flex;justify-content:space-between"><span>${ob.length} dias|${ob.reduce((s,o)=>s+o.ob,0)} nights</span><span style="color:#22c55e;font-weight:700">€${Math.round(ob.reduce((s,o)=>s+o.ob*o.avgRate,0)).toLocaleString()}</span></div>`}
    h+=`</div>`;
  }
  h+=`</div>`;

  if(sel){const bg=rc(sel.level);
    h+=`<div class="panel"><div style="padding:12px 14px;border-bottom:1px solid #1e2545;display:flex;justify-content:space-between;align-items:start"><div><h2>${sel.guest}</h2><h3>${sel.prop} — ${sel.room} — ${sel.roomType}</h3></div><button onclick="csel()" style="background:0;border:0;color:#4a5280;font-size:16px;cursor:pointer;font-family:inherit">✕</button></div>`;
    h+=`<div class="risk" style="background:${bg}18;border:1px solid ${bg}30"><span class="sc" style="color:${bg}">${sel.score}</span><span class="lv" style="color:${bg}">${sel.level}</span>${sel.override?`<span class="ov">${sel.override}</span>`:""}</div>`;
    h+=`<div style="padding:0 14px">`;
    [{l:"Arrival",v:fmt(sel.arrival)+" ("+sel.daysUntil+"d)"},{l:"Departure",v:fmt(sel.departure)},{l:"Noites",v:sel.nights},{l:"Rate",v:sel.rate},{l:"ADR",v:"€"+sel.adr},{l:"Total",v:"€"+sel.total},{l:"Canal",v:sel.source},{l:"Pagamento",v:sel.payment||"—"},{l:"Email",v:sel.email||"—"},{l:"Telefone",v:sel.phone||"—"},{l:"Template",v:sel.template},{l:"Contactar via",v:sel.channel||"—"},{l:"Oferta",v:sel.offer}].forEach(d=>{h+=`<div class="row"><label>${d.l}</label><span>${d.v}</span></div>`});
    h+=`</div>`;
    if(sel.factors&&sel.factors.length){h+=`<div style="padding:10px 14px"><div style="font-size:8px;font-weight:800;color:#3a4270;letter-spacing:1.5px;margin-bottom:6px">FACTORES DE RISCO</div>`;sel.factors.forEach(f=>{h+=`<span class="ftag">${f}</span>`});h+=`</div>`}
    h+=`</div>`;
  }
  h+=`</div>`;app.innerHTML=h;
}

function rupload(){
  const rC=pf.reservation.length,aC=pf.availability.length,dC=pf.duve?1:0;
  let h=`<div class="hdr"><div class="logo"><i>CS</i><div><h1>CANCELLATION SHIELD</h1><small>v7 — THE HAUS GROUP</small></div></div></div>`;
  h+=`<div class="up-zone"><div style="font-size:48px;margin-bottom:12px">🛡️</div><div style="font-size:18px;font-weight:800;color:#f0f4ff;margin-bottom:4px">Cancellation Shield v7</div><div style="font-size:11px;color:#4a5280;margin-bottom:24px">Upload dos ficheiros do Mews e Duve</div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">`;
  h+=`<label class="up-box${rC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${rC?"✅":"📋"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Reservation Report</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${rC?rC+" ficheiro(s)":"Mews .xlsx (vários)"}</div><input type="file" accept=".xlsx" multiple onchange="hf('reservation',event)" style="display:none"></label>`;
  h+=`<label class="up-box${aC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${aC?"✅":"📊"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Availability Report</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${aC?aC+" ficheiro(s)":"Mews .xlsx (1/prop)"}</div><input type="file" accept=".xlsx" multiple onchange="hf('availability',event)" style="display:none"></label>`;
  h+=`<label class="up-box${dC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${dC?"✅":"👤"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Duve Export</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${dC?"1 ficheiro":"CSV (opcional)"}</div><input type="file" accept=".csv" onchange="hf('duve',event)" style="display:none"></label>`;
  h+=`</div>`;
  h+=`<button class="up-btn" onclick="upload()" ${rC&&!st.uping?"":"disabled"}>${st.uping?"⏳ "+st.umsg:"🚀 Processar e Activar Dashboard"}</button>`;
  if(st.umsg&&!st.uping)h+=`<div class="${st.umsg.includes("Erro")?"err":"ok-msg"}">${st.umsg}</div>`;
  h+=`</div>`;return h;
}

function sp(p){st.prop=p;st.sel=null;render()}
function stab(t){st.tab=t;render()}
function sd(d){st.viewDays=d;render()}
function np(){const d=new Date(st.vs);d.setDate(d.getDate()-st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nn(){const d=new Date(st.vs);d.setDate(d.getDate()+st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nt(){const d=new Date();d.setDate(d.getDate()-1);st.vs=d.toISOString().split("T")[0];render()}
function sel(id){st.sel=D.reservations.find(r=>r.id===id)||null;render()}
function csel(){st.sel=null;render()}

load();
</script>
