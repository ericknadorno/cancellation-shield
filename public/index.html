<script>
// ═══════════════════════════════════════════════════
// CANCELLATION SHIELD v10.1 — ADVANCED PREDICTION MODEL
// 22 signals · smooth probability curve · real payment data
// Calibrated with Mews API historical analysis
// ═══════════════════════════════════════════════════

const SH={Alegria:"ALE","SB I":"SBI","SB II":"SBII"};
const PS=["Alegria","SB I","SB II"];
const fmt=d=>{if(!d)return"";const p=d.split("-");return p[2]+"/"+p[1]};
const dn=d=>["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][new Date(d+"T12:00:00").getDay()];
const rc=l=>l==="HIGH"?"#ef4444":l==="MEDIUM"?"#f59e0b":"#22c55e";
const oc=o=>o==="NR+Paid"?"#60a5fa":o&&o.includes("Safe")?"#4ade80":null;
const cb=r=>oc(r.override)||rc(r.level);
const today=new Date().toISOString().split("T")[0];

// ─── BOOKING.COM BENCHMARKS (2657 reservations) ───
const BDC_LT={Alegria:{1:6.6,3:0,7:1.9,14:26.9,30:38.6,60:42.5,90:69.1,999:67.7},"SB I":{1:8.4,3:2.6,7:9.5,14:31.7,30:46.7,60:51,90:54.5,999:51},"SB II":{1:1.2,3:0,7:10.1,14:20.5,30:40.3,60:46.8,90:64.6,999:55.6}};
const BDC_MO={Alegria:[39.2,29.2,31.2,22.2,33.3,32,32,29.4,29.2,49,40.7,33.3],"SB I":[11.3,25.3,18.3,37.4,41.5,47.4,34.6,37.6,45.1,50,57.1,34.5],"SB II":[9.7,26.5,27.9,31.9,33,30.1,31.5,30.8,38.3,40.5,29.2,46.1]};

// ─── NATIONALITY RISK TIERS (from 3859 res backtest) ───
const NAT_HIGH=["india","angola","mozambique","united arab emirates","saudi arabia","nigeria","greece","türkiye","turkey","morocco"];
const NAT_MED=["brazil","serbia","singapore","korea","finland","israel","taiwan","romania"];
const NAT_LOW=["belgium","switzerland","latvia","mexico","sweden","netherlands","ukraine","france","czech republic","norway"];

// ─── V10 SMOOTH PROBABILITY CURVE ───
function cancelProb(score){
  // Sigmoid-based smooth curve: 3% at score 0, 50% at score 35, 92% at score 70+
  if(score<=0)return 3;
  if(score>=80)return 95;
  // Smooth sigmoid: P = 95 / (1 + e^(-0.08*(score-35)))
  const p = 95 / (1 + Math.exp(-0.08 * (score - 35)));
  return Math.max(3, Math.min(95, Math.round(p)));
}
function probColor(p){return p>=70?"#ef4444":p>=40?"#f59e0b":p>=15?"#60a5fa":"#22c55e"}

// ─── V10 SCORING MODEL (22 signals) ───

// Signal 1: Rate type risk
function isNR(r){const l=(r||"").toLowerCase();return l.includes("nr ")||l.startsWith("nr")||l.includes("non-ref")||l.includes("non-refundable")||l.includes("early bird")}
function sRate(r){
  const l=(r||"").toLowerCase();
  // High cancel risk rates
  if(l.includes("flex 3")||l.includes("fully flexible"))return 62;
  if(l.includes("standard")&&l.includes("breakfast"))return 50;
  if(l.includes("flex 5"))return 48;
  if(l.includes("semi-flex"))return 38;
  if(l.includes("standard")&&l.includes("booking"))return 32;
  if(l.includes("standard"))return 35;
  if(l.includes("flex")&&(l.includes("ota")||l.includes("pku")))return 55;
  if(l.includes("best flex")||l.includes("best rate"))return 45;
  if(l.includes("half board"))return 30;
  if(l.includes("bed and breakfast")||l.includes("b&b"))return 28;
  if(l.includes("black friday"))return 35;
  // Low cancel risk rates
  if(l.includes("friends")||l.includes("family"))return 5;
  if(l.includes("welcome"))return 3;
  if(isNR(r))return 3;
  if(l.includes("long"))return 10;
  if(l.includes("superior"))return 20;
  // If rate name contains "test" or unknown demo rates, default medium
  if(l.includes("test")||l.includes("aut ")||l.includes("solution"))return 30;
  return 28;
}

// Signal 2: Channel/Source risk
function sChan(s){
  const l=(s||"").toLowerCase();
  if(l.includes("telephone"))return 85;
  if(l.includes("a-hotels")||l.includes("american express"))return 82;
  if(l.includes("booking engine sbii"))return 42;
  if(l.includes("booking.com"))return 38;
  if(l.includes("booking engine sbi"))return 32;
  if(l.includes("booking engine alegria")||l.includes("booking engine"))return 30;
  if(l.includes("channel"))return 35;
  if(l.includes("in person"))return 30;
  if(l.includes("message")||l.includes("email"))return 25;
  if(l.includes("hotels.com"))return 18;
  if(l.includes("airbnb"))return 14;
  if(l.includes("expedia"))return 17;
  // Mews API Origin-based scoring (from historical data: Connector=89% cancel, Commander=37%)
  if(l==="connector"||l.includes("connector"))return 55;
  if(l==="distributor"||l.includes("distributor"))return 50;
  if(l==="commander"||l.includes("commander"))return 20;
  return 25;
}

// Signal 3: Lead time risk (calibrated from real data: 0-1d=34%, 2-7d=76%, 60+d=86%)
function sLT(d,p){
  if(!d&&d!==0)return 20;
  if(d<0)return 5; // already arrived
  if(d<=1)return 15;
  if(d<=3)return 30;
  if(d<=7)return 40;
  if(d<=14)return 48;
  if(d<=30)return 55;
  if(d<=60)return 65;
  if(d<=90)return 72;
  return 80; // 90+ days = very high cancel risk
}

// Signal 4: Seasonality (keep existing BDC benchmarks)
function sSea(m,p){if(!m)return 25;const b=BDC_MO[p]||BDC_MO["SB II"];const i=(m-3+12)%12;return Math.round((b[i]||30)*.7)}

// Signal 5: Length of Stay risk
function sLOS(n){
  if(!n||n<=0)return 20;
  if(n===1)return 30; // 1 night = 53% cancel rate
  if(n<=2)return 25;
  if(n<=4)return 20;
  if(n<=7)return 28;
  if(n<=14)return 55;
  return 70; // very long stays = high risk
}

// Signal 6: Payment status risk (THE #1 predictor)
function sPay(p){
  const s=(p||"").toLowerCase().trim();
  if(s==="charged"||s==="paid"||s==="success")return 2;
  if(s==="partial")return 15;
  if(s==="fail"||s==="failed")return 50;
  return 45; // no payment = high risk
}

// Signal 7: ADR (price per night) risk
function sADR(a){
  if(!a||a<=0)return 25;
  if(a<80)return 10;
  if(a<120)return 12;
  if(a<180)return 18;
  if(a<250)return 30;
  if(a<400)return 45;
  if(a<1000)return 55;
  return 40; // extremely high ADR in demo can be test data
}

// Signal 8: Nationality risk (keep existing)
function sNat(nat){const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return 10;if(NAT_MED.some(x=>n.includes(x)))return 4;if(NAT_LOW.some(x=>n.includes(x)))return -5;return 0}
function natTier(nat){const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return"HIGH";if(NAT_LOW.some(x=>n.includes(x)))return"LOW";return""}

// Signal 9: Repeat guest (NEW - strongest protective signal)
function sRepeat(previousStays, previousCancels){
  if(previousStays>=3)return -25; // very loyal guest
  if(previousStays>=1)return -15; // returning guest
  if(previousCancels>=2)return 20; // serial canceller
  if(previousCancels>=1)return 10; // cancelled before
  return 0; // new guest, neutral
}

// Signal 10: Credit card on file (NEW)
function sCard(hasCard){
  return hasCard ? -5 : 8;
}

// Signal 11: Booking was modified (NEW - modifications = more committed)
function sMod(wasModified){
  return wasModified ? -5 : 3;
}

// Signal 12: Day of week of arrival (NEW)
function sDow(arrivalDate){
  if(!arrivalDate)return 0;
  const dow=new Date(arrivalDate+"T12:00:00").getDay();
  // Weekend arrivals (Fri=5, Sat=6) tend to be leisure = slightly higher cancel
  if(dow===5||dow===6)return 5;
  if(dow===0)return 3; // Sunday
  return 0; // weekday arrivals
}

// Signal 13: Guest count (NEW - families cancel less)
function sPersons(count, hasChildren){
  if(hasChildren)return -8; // families very committed
  if(count>=3)return -3; // groups tend to stay
  if(count===1)return 5; // solo = slightly higher risk
  return 0; // couple, neutral
}

// Signal 14: Travel agency (NEW)
function sAgency(hasTravelAgency){
  return hasTravelAgency ? 8 : 0; // agencies cancel more
}

// Signal 15: OTA email (NEW - from HasOtaEmail field)
function sOtaEmail(hasOtaEmail, email){
  if(hasOtaEmail)return 12;
  if(email&&(email.includes("@guest.booking.com")||email.includes("@relay.")))return 15;
  return 0;
}

// Signal 16: Nationality missing (NEW)
function sNatMissing(nat){
  return(!nat||nat==="")?5:0;
}

// ─── V11 NEW SIGNALS ───

// Signal 17: Booking hour (unusual hours = higher risk)
function sBookingHour(hour){
  if(hour===null||hour===undefined)return 50;
  if(hour>=0&&hour<=5)return 78;  // late night bookings = impulsive
  if(hour>=22)return 65;
  if(hour>=6&&hour<=9)return 38;  // morning = deliberate
  return 50;
}

// Signal 18: Modification count (more mods = uncertainty)
function sModCount(count){
  if(!count||count===0)return 35;
  if(count===1)return 55;
  if(count===2)return 68;
  return Math.min(80,68+count*4); // cap at 80
}

// Signal 19: ADR vs property average (below avg = less committed)
function sADRvsAvg(adr,avgAdr){
  if(!avgAdr||!adr||avgAdr===0)return 50;
  const ratio=adr/avgAdr;
  if(ratio<0.6)return 75;   // very cheap = high risk
  if(ratio<0.8)return 62;
  if(ratio>1.4)return 30;   // premium = committed
  if(ratio>1.1)return 40;
  return 50;
}

// Signal 20: Days between booking creation and first payment
function sBookPayGap(gap){
  if(gap===null||gap===undefined)return 50;
  if(gap<=0)return 28;  // paid same day = very committed
  if(gap<=1)return 38;
  if(gap<=3)return 50;
  if(gap<=7)return 62;
  return 75; // >7 days to pay = high risk
}

// Signal 21: Multiple active bookings by same guest
function sMultiBooking(count){
  if(!count||count<=1)return 45;
  if(count===2)return 65; // might cancel one
  return Math.min(82,65+count*5);
}

// Signal 22v11: Weather forecast for arrival date
function sWeather(code){
  if(!code)return 50;
  // OpenWeatherMap condition codes: 2xx=thunderstorm, 3xx=drizzle, 5xx=rain, 6xx=snow, 800=clear
  if(code>=200&&code<300)return 72;  // thunderstorm
  if(code>=500&&code<600)return 65;  // rain
  if(code>=600&&code<700)return 68;  // snow
  if(code===800)return 32;           // clear sky = committed
  if(code>=801&&code<=802)return 40; // few clouds
  return 50;
}

function computeRisk(r, calW){
  const rate=r.rate||"",pay=(r.paymentStatus||r.payment||"").toLowerCase().trim();
  // calW = calibrated weights object (optional, from auto-calibration)
  const w = calW || D.calibratedWeights || null;

  // ─── SAFE OVERRIDES (very high confidence of NOT cancelling) ───
  if(isNR(rate)&&(pay==="charged"||pay==="success"||pay==="paid"))return{score:2,level:"LOW",override:"NR+Paid",prob:3};
  if(r.previousStays>=2&&isNR(rate))return{score:3,level:"LOW",override:"Repeat+NR",prob:4};
  if(r.hasParking)return{score:3,level:"LOW",override:"Safe:Parking",prob:3};
  if(r.hasVoucher)return{score:4,level:"LOW",override:"Safe:Voucher",prob:5};
  if(r.guestCheckedIn)return{score:3,level:"LOW",override:"Safe:GuestCheckedIn",prob:3};
  if(r.hasPet)return{score:5,level:"LOW",override:"Safe:Pet",prob:5};
  if(r.previousStays>=3)return{score:5,level:"LOW",override:"Safe:Loyal",prob:5};

  // ─── WEIGHTED SCORE (27 signals — v11 calibrated) ───
  // Default weights used when no calibration data available
  const dw = {
    pay:0.15, rate:0.14, lt:0.13, chan:0.12, los:0.06, adr:0.05,
    repeat:0.08, card:0.06, mod:0.06,
    sea:0.04, persons:0.03, dow:0.04, otaEmail:0.03, nat:0.04, natMiss:0.03, agency:0.03,
    noContact:0.03, solo:0.02,
    // v11 new signals
    bookHour:0.03, modCount:0.04, adrVsAvg:0.03, bookPayGap:0.04, multiBook:0.03, weather:0.02
  };
  const W = w || dw;

  let s = 0;
  // Core signals
  s += (W.pay||dw.pay) * sPay(pay);
  s += (W.rate||dw.rate) * sRate(rate);
  s += (W.lt||dw.lt) * sLT(r.daysUntil,r.prop);
  s += (W.chan||dw.chan) * sChan(r.source);
  s += (W.los||dw.los) * sLOS(r.nights);
  s += (W.adr||dw.adr) * sADR(r.adr);

  // Behavioral signals
  s += (W.repeat||dw.repeat) * sRepeat(r.previousStays||0, r.previousCancels||0);
  s += (W.card||dw.card) * sCard(r.hasCreditCard);
  s += (W.mod||dw.mod) * sMod(r.wasModified);

  // Context signals
  s += (W.sea||dw.sea) * sSea(r.arrMonth,r.prop);
  s += (W.persons||dw.persons) * sPersons(r.persons, r.hasChildren);
  s += (W.dow||dw.dow) * sDow(r.arrival);
  s += (W.otaEmail||dw.otaEmail) * sOtaEmail(r.hasOtaEmail, r.email);
  s += (W.nat||dw.nat) * sNat(r.nationality);
  s += (W.natMiss||dw.natMiss) * sNatMissing(r.nationality);
  s += (W.agency||dw.agency) * sAgency(r.hasTravelAgency);

  // Binary boosters
  s += (W.noContact||dw.noContact) * (r.hasNoContact ? 55 : 5);
  s += (W.solo||dw.solo) * (r.isSolo ? 35 : 15);

  // ─── V11 NEW SIGNALS ───
  s += (W.bookHour||dw.bookHour) * sBookingHour(r.bookingHour);
  s += (W.modCount||dw.modCount) * sModCount(r.modificationCount||0);
  s += (W.adrVsAvg||dw.adrVsAvg) * sADRvsAvg(r.adr, r.propAvgAdr);
  s += (W.bookPayGap||dw.bookPayGap) * sBookPayGap(r.bookPayGapDays);
  s += (W.multiBook||dw.multiBook) * sMultiBooking(r.guestActiveBookings);
  s += (W.weather||dw.weather) * sWeather(r.weatherCode);

  // ─── INTELLIGENCE BOOSTERS ───
  if(r.isRelay)s+=15;
  if(r.isGenius)s-=3;
  if(r.lateArrival)s+=3;

  // ─── MODIFIERS ───
  let ov="";
  if(isNR(rate)&&pay!=="charged"&&pay!=="success"&&pay!=="paid"){s+=10;ov="NR:noPay"}

  s=Math.max(0,Math.min(Math.round(s),100));
  const prob=cancelProb(s);
  return{score:s,level:s>=38?"HIGH":s>=18?"MEDIUM":"LOW",override:ov,prob};
}

  for(const r of d){
    const k=String(r[0]||""),v=String(r[1]||"");

      if(v.includes("Alegria"))return"Alegria";
      if(v.includes("Barbara II"))return"SB II";

      rate:r.Rate||"",adr:Math.round(adr||0),total:Math.round(r["Total amount"]||0),
      source:r["Reservation source"]||"",payment:r["Automatic payment"]||"",

function parseAvail(wb){
  const prop=detectProp(wb);
  const os=wb.Sheets["Occupancy"];
  if(!os)return{prop,data:{}};
  const od=XLSX.utils.sheet_to_json(os,{header:1,cellDates:true});
  const as=wb.Sheets["Availability"]?XLSX.utils.sheet_to_json(wb.Sheets["Availability"],{header:1,cellDates:true}):null;
  const rs=wb.Sheets["Rate"]?XLSX.utils.sheet_to_json(wb.Sheets["Rate"],{header:1,cellDates:true}):null;
  const dates=(od[0]||[]).slice(2).filter(d=>d instanceof Date);
  const result={};
  dates.forEach((date,di)=>{
    const key=date.toISOString().split("T")[0];
    let tO=0,tS=0,tA=0,tR=0,rc=0;const rts=[];
    for(let ri=1;ri<od.length;ri++){
      if(od[ri][0]!=="Stay")continue;
      const rt=String(od[ri][1]||"").trim();
      const o=Number(od[ri][di+2])||0;
      const a=as?(Number(as[ri]?.[di+2])||0):0;
      const rate=rs?(Number(rs[ri]?.[di+2])||0):0;
      tO+=o;tS++;tA+=a;if(rate>0){tR+=rate;rc++}
      rts.push({type:rt,occ:o,avail:a,rate:Math.round(rate)});
    }
    result[key]={occ:tO,spaces:tS,avail:tA,avgRate:rc>0?Math.round(tR/rc):0,occPct:tS>0?Math.round(tO/tS*1000)/10:0,rooms:rts};
  });
  return{prop,data:result};
}

// ─── MEWS API INTEGRATION ───
async function callMewsProxy(endpoint,params){
  const maxRetries=2;
  for(let attempt=0;attempt<=maxRetries;attempt++){
    try{
      const resp=await fetch("/api/mews",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({endpoint,params})
      });
      const text=await resp.text();
      let data;
      try{data=JSON.parse(text)}catch(e){
        if(attempt<maxRetries){await new Promise(r=>setTimeout(r,(attempt+1)*1000));continue}
        throw new Error("API returned non-JSON response (status "+resp.status+")")
      }
      if(!resp.ok){
        const detailMsg=data.details?.Message||data.details?.message||(typeof data.details==="string"?data.details:"")||JSON.stringify(data.details||{}).slice(0,200);
        const msg=(data.error&&data.error!=="Mews API error"?data.error:detailMsg)||data.error||("HTTP "+resp.status);
        if(resp.status>=500&&attempt<maxRetries){await new Promise(r=>setTimeout(r,(attempt+1)*1000));continue}
        throw new Error(msg);
      }
      return data;
    }catch(e){
      if(attempt>=maxRetries)throw e;
      await new Promise(r=>setTimeout(r,(attempt+1)*1000));
    }
  }
}

async function fetchAllPages(endpoint,params,dataKey,maxPages=5){
  let allData=[];
  let cursor=null;
  let page=0;
  do{
    try{
      const p={...params,Limitation:{...params.Limitation,Cursor:cursor}};
      const result=await callMewsProxy(endpoint,p);
      const items=result[dataKey]||[];
      allData=allData.concat(items);
      cursor=result.Cursor||null;
    }catch(e){
      console.warn("SHIELD: Page "+(page+1)+" of "+endpoint+" failed: "+e.message+". Returning "+allData.length+" items collected so far.");
      break;
    }
    page++;
    if(page>=maxPages)break;
  }while(cursor);
  return allData;
}

function normPayment(mewsState){
  if(!mewsState)return"";
  const s=mewsState.toLowerCase();
  if(s==="charged"||s==="completed")return"success";
  if(s==="pending")return"";
  if(s==="failed"||s==="canceled")return"fail";
  return mewsState;
}

function mapMewsReservation(res,ratesMap,sourcesMap,resourcesMap,categoriesMap,customersMap,companionsMap,enterpriseName,itemsMap,paymentsMap,cancelHistoryMap){
  // Determine property from enterprise name (fallback to "Alegria" for demo/unknown)
  let prop="";
  if(enterpriseName.includes("Alegria"))prop="Alegria";
  else if(enterpriseName.includes("Barbara II")||enterpriseName.includes("Bárbara II"))prop="SB II";
  else if(enterpriseName.includes("Barbara I")||enterpriseName.includes("Bárbara I"))prop="SB I";
  else prop="Alegria";

  const arr=res.StartUtc?new Date(res.StartUtc):null;
  const dep=res.EndUtc?new Date(res.EndUtc):null;
  const cre=res.CreatedUtc?new Date(res.CreatedUtc):null;
  const now=new Date();
  const nights=arr&&dep?Math.round((dep-arr)/864e5):0;
  const lt=arr&&cre?Math.round((arr-cre)/864e5):0;
  const du=arr?Math.round((arr-now)/864e5):999;

  // Rate name from ratesMap
  const rateName=ratesMap[res.RateId]||"";

  // Source name from sourcesMap
  const sourceName=sourcesMap[res.SourceId]||res.Origin||"";

  // Customer info (API v2023-06-06 uses AccountId instead of CustomerId)
  const customer=customersMap[res.AccountId]||customersMap[res.CustomerId]||{};
  const email=customer.Email||"";
  const phone=customer.Phone||"";
  const firstName=customer.FirstName||"";
  const lastName=customer.LastName||"";
  const nationality=customer.NationalityCode||"";
  const hasOtaEmail=customer.HasOtaEmail||false;

  // Room info
  const resource=resourcesMap[res.AssignedResourceId]||{};
  const categoryId=res.RequestedResourceCategoryId||resource.CategoryId||"";
  const category=categoriesMap[categoryId]||{};
  let room=resource.Name||"";
  // Strip property prefix from room name
  room=room.replace(/^SBII\s*/i,"").replace(/^SBI\s*/i,"").replace(/^ALE\s*/i,"").trim();

  // Person count — prefer PersonCounts from API, fallback to companionships
  const pc=res.PersonCounts;
  const apiPersonCount=pc?pc.reduce((s,p)=>s+(p.Count||0),0):0;
  const companions=companionsMap[res.Id]||[];
  const personCount=apiPersonCount>0?apiPersonCount:(1+companions.length);

  // ADR calculation — use orderItems total, fallback to TotalAmount
  const itemsTotal=itemsMap?Math.round(itemsMap[res.Id]||0):0;
  const totalAmount=itemsTotal>0?itemsTotal:(res.TotalAmount?(res.TotalAmount.Value||0):0);
  const adr=nights>0?Math.round(totalAmount/nights):0;

  // Notes from res.Notes
  const notes=res.Notes||"";

  const noc=!email&&!phone;

  // v10: Payment status from real payment data
  const paymentStatus=paymentsMap[res.AccountId]||"";

  // v10: Credit card on file
  const hasCreditCard=!!(res.CreditCardId);

  // v10: Booking was modified (CreatedUtc != UpdatedUtc by more than 60 seconds)
  const createdMs=res.CreatedUtc?new Date(res.CreatedUtc).getTime():0;
  const updatedMs=res.UpdatedUtc?new Date(res.UpdatedUtc).getTime():0;
  const wasModified=Math.abs(updatedMs-createdMs)>60000;

  // v11: Booking hour (from CreatedUtc)
  const bookingHour=cre?cre.getUTCHours():null;

  // v11: Modification count (estimate from UpdatedUtc intervals — 1 if modified, 0 if not)
  // More precise count would require event history; this is a boolean->count proxy
  const modificationCount=wasModified?Math.max(1,Math.round(Math.abs(updatedMs-createdMs)/3600000)):0;

  // v10: Guest history (previous stays and cancellations)
  const history=cancelHistoryMap[res.AccountId||res.CustomerId]||{stays:0,cancels:0};
  const previousStays=history.stays;
  const previousCancels=history.cancels;

  // v10: Has children (check PersonCounts for child age categories)
  const hasChildren=pc?pc.some(p=>(p.Count||0)>0&&p.AgeCategoryId&&p.AgeCategoryId!==pc[0]?.AgeCategoryId):false;

  // v10: Has travel agency
  const hasTravelAgency=!!(res.TravelAgencyId);

  return{
    id:res.Id,
    guest:(firstName+" "+lastName).trim(),
    prop:prop,
    room:room,
    roomType:category.Name||"",
    status:res.State||"",
    arrival:arr?arr.toISOString().split("T")[0]:"",
    departure:dep?dep.toISOString().split("T")[0]:"",
    nights:nights,
    daysUntil:du,
    leadTimeDays:lt,
    rate:rateName,
    adr:adr,
    total:Math.round(totalAmount),
    source:sourceName,
    payment:normPayment(res.PaymentState||""),
    email:email,
    phone:phone,
    persons:personCount,
    nationality:nationality,
    hasNoContact:noc,
    isSolo:personCount===1,
    arrMonth:arr?arr.getMonth()+1:null,
    // V10 intelligence fields
    isRelay:email.includes("@guest.booking.com"),
    isGenius:notes.includes("booker_is_genius"),
    hasPet:/bringing your pet.*(Sim|Yes)/i.test(notes),
    hasParking:false,
    hasVoucher:!!(res.VoucherId),
    guestCheckedIn:notes.includes("Guest Check-in info")||notes.includes("online check-in")||notes.includes("pre-check-in"),
    cardType:"",
    classifications:"",
    lateArrival:/between 2[0-3]|between 0[0-4]/i.test(notes),
    travelAgency:res.TravelAgencyId||"",
    hasOtaEmail:hasOtaEmail,
    paymentStatus:paymentStatus,
    hasCreditCard:hasCreditCard,
    wasModified:wasModified,
    previousStays:previousStays,
    previousCancels:previousCancels,
    hasChildren:hasChildren,
    hasTravelAgency:hasTravelAgency,
    // v11 new fields
    bookingHour:bookingHour,
    modificationCount:modificationCount,
    propAvgAdr:0, // will be set after all reservations mapped
    bookPayGapDays:null, // set from payment data
    guestActiveBookings:1, // set from guest booking count
    weatherCode:null // set from OpenWeatherMap
  };
}

function mapMewsAvailability(availData,categoriesMap){
  const result={};
  const datesUtc=availData.DatesUtc||[];
  const categoryAvails=availData.CategoryAvailabilities||[];

  datesUtc.forEach((dateStr,idx)=>{
    const date=new Date(dateStr);
    const dateKey=date.toISOString().split("T")[0];

    let totalSpaces=0;
    let totalAvailable=0;

    categoryAvails.forEach(ca=>{
      const cat=categoriesMap[ca.CategoryId];
      if(!cat)return;
      const avails=ca.Availabilities||[];
      const availOnDay=avails[idx]||0;
      const maxAvail=Math.max(...avails,0);

      totalSpaces+=maxAvail;
      totalAvailable+=availOnDay;
    });

    const totalOccupied=Math.max(0,totalSpaces-totalAvailable);
    const occPct=totalSpaces>0?Math.round(totalOccupied/totalSpaces*1000)/10:0;

    result[dateKey]={
      occ:totalOccupied,
      spaces:totalSpaces,
      avail:totalAvailable,
      avgRate:0,
      occPct:occPct
    };
  });

  return result;
}

async function fetchFromMews(){

    const resourcesRes=await callMewsProxy("resources/getAll",{Extent:{Resources:true,ResourceCategories:true}});

    const categoriesMap={};
    (resourcesRes.Resources||[]).forEach(r=>{resourcesMap[r.Id]=r});
    (resourcesRes.ResourceCategories||[]).forEach(c=>{categoriesMap[c.Id]=c});

    st.umsg="(5/10) Carregando reservas...";

    const filteredResv=resvRes;

    st.umsg="(6/10) Carregando clientes...";
    render();

    // Fetch customers by their IDs from reservations (AccountId in API v2023-06-06)
    const accountIds=[...new Set(filteredResv.map(r=>r.AccountId||r.CustomerId).filter(Boolean))];
    const customersMap={};
    for(let i=0;i<accountIds.length;i+=200){
      try{
        const batch=accountIds.slice(i,i+200);

        (res.Customers||[]).forEach(c=>{customersMap[c.Id]=c});
      }catch(e){console.warn("SHIELD: Customer batch "+(i/200+1)+" failed:",e.message)}
    }

    st.umsg="(7/10) Carregando receita...";
    render();

    // Fetch order items to calculate revenue per reservation
    const itemsMap={};
    const resIds=filteredResv.map(r=>r.Id);
    for(let i=0;i<resIds.length;i+=50){
      try{
        const batch=resIds.slice(i,i+50);
        const itemsRes=await callMewsProxy("orderItems/getAll",{ServiceOrderIds:batch,Limitation:{Count:1000}});
        (itemsRes.OrderItems||[]).forEach(it=>{

        (payRes.Payments||[]).forEach(p=>{
          const aid=p.AccountId;
          const state=(p.State||"").toLowerCase();
          // Keep the "best" payment state per account: Charged > Pending > anything
          if(state==="charged"||state==="paid"){paymentsMap[aid]="charged"}
          else if(!paymentsMap[aid]&&state==="pending"){paymentsMap[aid]="pending"}
          else if(!paymentsMap[aid]){paymentsMap[aid]=state}

      if(weatherRes?.forecasts){

        mappedResv.forEach(r=>{
          if(r.arrival&&D.weatherCache[r.arrival]){

          }
        });
        addLog("🌤️ Previsão meteo carregada: "+Object.keys(weatherRes.forecasts).length+" dias");
      }
    }catch(e){console.warn("SHIELD: Weather fetch skipped:",e.message)}

    // Map availability for all categories at once
    const availData=mapMewsAvailability(availRes,categoriesMap);

    // Determine property from mapped reservations
    const detectedProp=mappedResv.length>0?mappedResv[0].prop:"";

    // Merge with existing pending files
    pendingFiles.push({type:"mews-reservations",data:mappedResv});
    pendingFiles.push({type:"mews-availability",data:availData,prop:detectedProp});

    st.umsg="Processando dados...";
    render();

    // Process as normal
    await processMewsFiles();

    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    st.uping=false;
    st.umsg=`✅ ${mappedResv.length} reservas carregadas em ${elapsed}s`;
    addLog("✅ Mews API: "+mappedResv.length+" reservas e "+Object.keys(availData).length+" dias de disponibilidade");
    render();

  }catch(err){
    st.uping=false;
    st.umsg="❌ "+err.message;
    addLog("❌ Mews API error: "+err.message);
    render();
  }
}

async function processMewsFiles(){
  const results={res:[],avail:{},logs:[]};

  for(const pf of pendingFiles){
    if(pf.type==="mews-reservations"){
      results.res.push(...pf.data);
      results.logs.push(`✅ Mews API: ${pf.data.length} reservas carregadas`);
    }else if(pf.type==="mews-availability"){
      const prop=pf.prop||"Mews";
      results.avail[prop]=pf.data;
      results.logs.push(`✅ Mews API: ${Object.keys(pf.data).length} dias de disponibilidade (${prop})`);
    }
  }

  // Continue with normal processing
  st.umsg="A calcular riscos...";
  render();

  // ─── V11: Compute derived fields before scoring ───
  // 1. Property average ADR
  const propAdrSum={},propAdrCnt={};
  results.res.forEach(r=>{if(r.adr>0){propAdrSum[r.prop]=(propAdrSum[r.prop]||0)+r.adr;propAdrCnt[r.prop]=(propAdrCnt[r.prop]||0)+1}});
  const propAvgAdrs={};Object.keys(propAdrSum).forEach(p=>{propAvgAdrs[p]=propAdrCnt[p]>0?Math.round(propAdrSum[p]/propAdrCnt[p]):0});

  // 2. Guest active booking count
  const guestBookCnt={};
  results.res.forEach(r=>{const gid=r.email||r.guest;if(gid)guestBookCnt[gid]=(guestBookCnt[gid]||0)+1});

  // 3. Apply derived fields
  results.res.forEach(r=>{
    r.propAvgAdr=propAvgAdrs[r.prop]||0;
    const gid=r.email||r.guest;
    r.guestActiveBookings=guestBookCnt[gid]||1;
  });

  const scored=results.res.map(r=>{
    const{score,level,override,prob}=computeRisk(r);
    const factors=[];
    if(r.previousCancels>0)factors.push("PrevCancel:"+r.previousCancels);
    if(r.previousStays>0)factors.push("Repeat:"+r.previousStays+"x");
    if(!r.hasCreditCard&&r.paymentStatus!=="charged")factors.push("NoCard");
    if(r.hasOtaEmail)factors.push("OtaEmail");
    if(r.hasTravelAgency)factors.push("Agency");
    if(r.hasChildren)factors.push("Family");
    if(r.wasModified)factors.push("Modified");
    if(r.isRelay)factors.push("Relay email");
    if(sRate(r.rate)>=35)factors.push("Rate");
    if(sChan(r.source)>=35)factors.push("Canal");
    if(r.leadTimeDays>30)factors.push("LT:"+r.leadTimeDays+"d");
    if(r.nights>7)factors.push("LOS:"+r.nights+"n");
    if(sPay(r.payment)>=30)factors.push("NoPay");
    if(sADR(r.adr)>=40)factors.push("ADR€"+r.adr);
    if(r.hasNoContact)factors.push("NoContact");
    if(r.bookingHour!==null&&(r.bookingHour>=22||r.bookingHour<=5))factors.push("LateBook:"+r.bookingHour+"h");
    if(r.modificationCount>=2)factors.push("Mods:"+r.modificationCount);
    if(r.propAvgAdr>0&&r.adr>0&&r.adr/r.propAvgAdr<0.7)factors.push("CheapADR");
    if(r.guestActiveBookings>=2)factors.push("MultiBook:"+r.guestActiveBookings);
    if(r.weatherCode&&r.weatherCode>=500)factors.push("BadWeather");
    const nt=natTier(r.nationality);if(nt==="HIGH")factors.push("Nat:"+r.nationality.split(" ")[0]);
    const riskRev=Math.round(r.total*prob/100);
    return{...r,score,level,override,prob,factors,riskRev,natTier:nt,template:tmpl(level,r.daysUntil,r.nights),offer:offer(level,r.daysUntil,r.nights),channel:chan(r.source,level)};
  });

  // Compute overbooking — hybrid: API availability + reservation-based fallback
  const ob=[];
  const dnArr=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const cutoff=new Date(Date.now()+90*864e5).toISOString().split("T")[0];

  // Step 1: Build per-day reservation count (works for any hotel, any size)
  const dayOcc={};
  scored.forEach(r=>{
    let d=new Date(r.arrival+"T12:00:00");
    const dep=new Date(r.departure+"T12:00:00");
    while(d<dep){
      const ds=d.toISOString().split("T")[0];
      const key=r.prop+"|"+ds;
      if(!dayOcc[key])dayOcc[key]={total:0,high:[],adrs:[]};
      dayOcc[key].total++;
      if(r.adr>0)dayOcc[key].adrs.push(r.adr);
      if(r.level==="HIGH")dayOcc[key].high.push(r);
      d.setDate(d.getDate()+1);
    }
  });

  PS.forEach(prop=>{
    const avail=results.avail[prop]||{};
    // Collect all days that have either availability data or reservations
    const allDays=new Set([...Object.keys(avail),...Object.keys(dayOcc).filter(k=>k.startsWith(prop+"|")).map(k=>k.split("|")[1])]);

    allDays.forEach(ds=>{
      if(ds<today||ds>cutoff)return;
      const key=prop+"|"+ds;
      const dd=dayOcc[key]||{total:0,high:[],adrs:[]};
      const av=avail[ds];
      const hi=dd.high;
      if(hi.length<2)return; // Need at least 2 HIGH risk to consider OB

      // Occupancy: prefer API data, fallback to reservation-based estimate
      // API gives real capacity (spaces) and real occupied count
      let occPct=0;
      let capacity=0;
      if(av&&av.spaces>0){
        occPct=av.occPct||0;
        capacity=av.spaces;
      }
      // If API occupancy seems unreliable (e.g. too many spaces inflating denominator),
      // also compute reservation-based occupancy as a cross-check
      const resvOccPct=dd.total>0&&capacity>0?Math.round(dd.total/capacity*1000)/10:0;
      // Use whichever is HIGHER — this prevents inflated capacity from hiding real demand
      if(resvOccPct>occPct)occPct=resvOccPct;

      // avgRate from actual reservations on that day (real revenue data)
      const avgRate=dd.adrs.length>0?Math.round(dd.adrs.reduce((s,v)=>s+v,0)/dd.adrs.length):(av?.avgRate||100);

      // Trigger OB: occupancy >= 70% AND at least 2 HIGH risk on that day
      // OR: at least 3 HIGH risk regardless of occupancy (strong signal even without full availability data)
      if((occPct>=70&&hi.length>=2)||hi.length>=3){
        const n=Math.min(Math.max(1,Math.floor(hi.length*.4)),3);
        const adj=Math.max(1,n-(hi.some(r=>r.daysUntil>7)?1:0));
        const hiGuests=hi.sort((a,b)=>b.score-a.score).slice(0,5).map(r=>r.guest.split(" ").pop()+" ("+r.score+")");
        const fr=av?(av.rooms||[]).filter(rt=>rt.avail===0&&rt.rate>0):[];
        // V11: EV overbooking calculation
        const avgProb=hi.length>0?hi.reduce((s,r)=>s+(r.prob||0),0)/hi.length/100:0;
        const combinedProb=Math.min(0.95,1-Math.pow(1-avgProb,adj));
        const walkCost=avgRate*2.5;
        const extraRev=avgRate*adj;
        const ev=Math.round(combinedProb*extraRev-(1-combinedProb)*walkCost);
        ob.push({date:ds,prop,occPct,nHigh:hi.length,ob:adj,
          rooms:fr.slice(0,adj).map(rt=>({type:rt.type,rate:rt.rate})),
          roomsStr:fr.slice(0,adj).map(rt=>rt.type.split(" - ").pop().replace("Apartment","Apt")+" €"+rt.rate).join(" | ")||"Qualquer tipo",
          avgRate,dow:dnArr[new Date(ds+"T12:00:00").getDay()],
          hiGuests:hiGuests.join(", "),
          week:Math.ceil((new Date(ds+"T12:00:00").getDate())/7),
          month:new Date(ds+"T12:00:00").toLocaleString("pt",{month:"short"}),
          ev,combinedProb:Math.round(combinedProb*100),walkCost:Math.round(walkCost)
        });
      }
    });
  });
  ob.sort((a,b)=>a.date.localeCompare(b.date));

  const obMap={};
  ob.forEach(o=>{
    const key=o.prop+"|"+o.date;
    const hiOnDay=scored.filter(r=>r.prop===o.prop&&r.level==="HIGH"&&r.arrival<=o.date&&r.departure>o.date);
    const hiRoomIds=hiOnDay.map(r=>r.room);
    obMap[key]={ob:o.ob,rooms:o.rooms,rate:o.avgRate,hiRooms:hiRoomIds,hiGuests:hiOnDay.slice(0,3).map(r=>r.guest.split(" ").pop())};
  });

  D={reservations:scored,availability:results.avail,overbooking:ob,obMap,log:D.log.concat(results.logs),generated:new Date().toISOString()};
  st.phase="dashboard";st.uping=false;st.umsg="";pendingFiles=[];
  render();
  addLog(`Dashboard loaded: ${scored.length} reservations, ${ob.length} OB days`);
}

// Add a warning note to a HIGH-risk reservation in Mews
async function addShieldNote(resvId, guestName, score, prob, level, factors){
  try{
    const text=`⚠️ CANCELLATION SHIELD — Risco ${level} (${prob}%)\nScore: ${score}/100 | Factores: ${factors.join(", ")}\nGerado automaticamente em ${new Date().toLocaleString("pt")}`;
    await callMewsProxy("serviceOrderNotes/add",{ServiceOrderNotes:[{ServiceOrderId:resvId,Text:text,Type:"General"}]});
    addLog(`📝 Nota adicionada: ${guestName} (${level})`);
    return true;
  }catch(e){addLog(`❌ Nota falhou: ${e.message}`);return false}
}

// Create a retention task in Mews for the front-desk team
async function addShieldTask(resvId, guestName, score, prob, arrival, offer){
  try{
    const deadline=new Date(arrival+"T10:00:00Z");
    if(deadline<new Date())deadline.setTime(Date.now()+86400000); // if past, set to tomorrow
    const name=`🛡️ Shield: Contactar ${guestName} (${prob}% risco)`;
    const desc=`Cancellation Shield detectou risco ${prob}% de cancelamento.\n\nScore: ${score}\nChegada: ${arrival}\nSugestão: ${offer}\n\nReserva ID: ${resvId}`;
    await callMewsProxy("tasks/add",{Tasks:[{Name:name.slice(0,100),Description:desc,DeadlineUtc:deadline.toISOString(),ServiceOrderId:resvId}]});
    addLog(`✅ Task criada: ${guestName}`);
    return true;
  }catch(e){addLog(`❌ Task falhou: ${e.message}`);return false}
}

// Bulk: add notes to ALL HIGH-risk reservations
async function bulkAddNotes(){
  if(!confirm("Adicionar nota de alerta em TODAS as "+D.reservations.filter(r=>r.level==="HIGH").length+" reservas HIGH risk?"))return;
  st.uping=true;st.umsg="Adicionando notas...";render();
  const hi=D.reservations.filter(r=>r.level==="HIGH");
  let ok=0,fail=0;
  for(const r of hi){
    const success=await addShieldNote(r.id,r.guest,r.score,r.prob,r.level,r.factors||[]);
    if(success)ok++;else fail++;
    st.umsg=`Notas: ${ok+fail}/${hi.length}...`;render();
  }
  st.uping=false;st.umsg=`✅ ${ok} notas adicionadas${fail?", "+fail+" falharam":""}`;render();
}

  const med=D.reservations.filter(r=>r.level==="MEDIUM"&&r.daysUntil>0&&r.daysUntil<=7);
  if(hi.length===0&&med.length===0){alert("Nenhuma reserva de alto risco nos próximos 14 dias.");return}
  const dt=new Date().toLocaleDateString("pt");
  const totalRiskRev=hi.reduce((s,r)=>s+(r.riskRev||0),0);
  let body=`CANCELLATION SHIELD — Alerta Diário (${dt})\n\n`;
  body+=`${hi.length} reservas HIGH risk (próximos 14 dias)\n`;
  body+=`${med.length} reservas MEDIUM risk (próximos 7 dias)\n`;
  body+=`€${totalRiskRev.toLocaleString("pt")} receita em risco\n\n`;
  body+=`═══════════════════════════════\n`;
  body+=`RESERVAS HIGH RISK:\n`;
  body+=`═══════════════════════════════\n\n`;
  hi.sort((a,b)=>a.daysUntil-b.daysUntil).forEach((r,i)=>{
    body+=`${i+1}. ${r.guest} — ${r.prop}\n`;
    body+=`   Chegada: ${fmt(r.arrival)} (${r.daysUntil} dias) | ${r.nights} noites\n`;
    body+=`   Score: ${r.score}/100 | Prob: ${r.prob}% | €${r.total}\n`;
    body+=`   Canal: ${r.source} | Rate: ${r.rate}\n`;
    body+=`   Fatores: ${(r.factors||[]).join(", ")}\n`;
    body+=`   Ação: ${r.offer||"Contactar hóspede"}\n\n`;
  });
  if(med.length>0){
    body+=`═══════════════════════════════\n`;
    body+=`RESERVAS MEDIUM RISK:\n`;
    body+=`═══════════════════════════════\n\n`;

function applyCalibration(){
  if(!D.calibratedWeights)return;
  // Re-score all current reservations with calibrated weights
  D.reservations=D.reservations.map(r=>{
    const{score,level,override,prob}=computeRisk(r,D.calibratedWeights);
    const riskRev=Math.round(r.total*prob/100);
    return{...r,score,level,override,prob,riskRev};
  });
  st.umsg="✅ Pesos calibrados aplicados — reservas re-scored";
  render();
}
function resetCalibration(){
  D.calibratedWeights=null;
  D.reservations=D.reservations.map(r=>{
    const{score,level,override,prob}=computeRisk(r,null);

    return{...r,score,level,override,prob,riskRev};
  });

  render();
}

// ─── BACKTEST: Accuracy tracking from historical data ───

async function runBacktest(){
  st.uping=true;st.umsg="(1/3) Carregando reservas históricas...";render();
  try{
    // Fetch ALL canceled reservations (to see what actually canceled)
    const canceledRes=await fetchAllPages("reservations/getAll/2023-06-06",{
      States:["Canceled"],
      TimeFilter:"Start",
      StartUtc:new Date(Date.now()-365*864e5).toISOString(),
      EndUtc:new Date().toISOString(),
      Limitation:{Count:200},
      Extent:{Reservations:true}
    },"Reservations");

    st.umsg="(2/3) Carregando reservas processadas...";render();

    // Fetch ALL processed reservations (completed stays)
    const processedRes=await fetchAllPages("reservations/getAll/2023-06-06",{
      States:["Processed"],
      TimeFilter:"Start",
      StartUtc:new Date(Date.now()-365*864e5).toISOString(),
      EndUtc:new Date().toISOString(),
      Limitation:{Count:200},
      Extent:{Reservations:true}
    },"Reservations");

    st.umsg="(3/3) Analisando accuracy...";render();

    // Fetch reference data needed for scoring
    const ratesRes=await fetchAllPages("rates/getAll",{Limitation:{Count:1000}},"Rates");
    const ratesMap={};ratesRes.forEach(r=>{ratesMap[r.Id]=r.Name||""});
    const sourcesRes=await fetchAllPages("sources/getAll",{Limitation:{Count:1000}},"Sources");
    const sourcesMap={};sourcesRes.forEach(s=>{sourcesMap[s.Id]=s.Name||""});
    const resourcesRes=await callMewsProxy("resources/getAll",{Extent:{Resources:true,ResourceCategories:true}});
    const resourcesMap={};const categoriesMap={};
    (resourcesRes.Resources||[]).forEach(r=>{resourcesMap[r.Id]=r});
    (resourcesRes.ResourceCategories||[]).forEach(c=>{categoriesMap[c.Id]=c});
    const config=await callMewsProxy("configuration/get",{});
    const enterpriseName=config.Enterprise?.Name||"";

    // Combine all historical reservations and score them
    const allHist=[
      ...canceledRes.map(r=>({...r,_outcome:"canceled"})),
      ...processedRes.map(r=>({...r,_outcome:"stayed"}))
    ];

    // Map to our format (simplified, no payments/history for speed)
    const mapped=allHist.map(r=>{
      const m=mapMewsReservation(r,ratesMap,sourcesMap,resourcesMap,categoriesMap,{},{},enterpriseName,{},{},{});
      const{score,level,prob}=computeRisk(m,{});
      return{outcome:r._outcome,score,level,prob,arrival:m.arrival,total:m.total,source:m.source,rate:m.rate,leadTimeDays:m.leadTimeDays};
    });

    // Calculate accuracy by risk level
    const stats={HIGH:{total:0,canceled:0},MEDIUM:{total:0,canceled:0},LOW:{total:0,canceled:0}};
    const byMonth={};
    const byLT={"0-1":{t:0,c:0},"2-7":{t:0,c:0},"8-14":{t:0,c:0},"15-30":{t:0,c:0},"31-60":{t:0,c:0},"61+":{t:0,c:0}};
    const byChan={};
    const byScore=[];
    for(let i=0;i<=100;i+=5)byScore.push({min:i,max:i+5,t:0,c:0});

    mapped.forEach(r=>{
      const isCanceled=r.outcome==="canceled";
      stats[r.level].total++;
      if(isCanceled)stats[r.level].canceled++;

      // By month
      const mo=r.arrival?r.arrival.slice(0,7):"?";
      if(!byMonth[mo])byMonth[mo]={t:0,c:0};
      byMonth[mo].t++;
      if(isCanceled)byMonth[mo].c++;

      // By lead time bucket
      const lt=r.leadTimeDays||0;
      const ltKey=lt<=1?"0-1":lt<=7?"2-7":lt<=14?"8-14":lt<=30?"15-30":lt<=60?"31-60":"61+";
      byLT[ltKey].t++;if(isCanceled)byLT[ltKey].c++;

      // By channel
      const ch=r.source||"Unknown";
      if(!byChan[ch])byChan[ch]={t:0,c:0};
      byChan[ch].t++;if(isCanceled)byChan[ch].c++;

      // By score bucket
      const idx=Math.min(Math.floor(r.score/5),19);
      byScore[idx].t++;if(isCanceled)byScore[idx].c++;
    });

    // ─── V11: AUTO-CALIBRATION via gradient descent ───
    const calData=allHist.map(r=>{
      const m=mapMewsReservation(r,ratesMap,sourcesMap,resourcesMap,categoriesMap,{},{},enterpriseName,{},{},{});
      const pay=(m.paymentStatus||m.payment||"").toLowerCase().trim();
      return{
        y:r._outcome==="canceled"?1:0,
        signals:{
          pay:sPay(pay)/100, rate:sRate(m.rate)/100, lt:sLT(m.daysUntil,m.prop)/100,
          chan:sChan(m.source)/100, los:sLOS(m.nights)/100, adr:sADR(m.adr)/100,
          repeat:sRepeat(m.previousStays||0,m.previousCancels||0)/100,
          card:sCard(m.hasCreditCard)/100, mod:sMod(m.wasModified)/100,
          sea:sSea(m.arrMonth,m.prop)/100, persons:sPersons(m.persons,m.hasChildren)/100,
          dow:sDow(m.arrival)/100, otaEmail:sOtaEmail(m.hasOtaEmail,m.email)/100,
          nat:sNat(m.nationality)/100, natMiss:sNatMissing(m.nationality)/100,
          agency:sAgency(m.hasTravelAgency)/100,
          noContact:(m.hasNoContact?55:5)/100, solo:(m.isSolo?35:15)/100,
          bookHour:sBookingHour(m.bookingHour)/100, modCount:sModCount(m.modificationCount||0)/100,
          adrVsAvg:50/100, bookPayGap:50/100, multiBook:45/100, weather:50/100
        }
      };
    });
    // Simple logistic regression with gradient descent
    const sigKeys=Object.keys(calData[0]?.signals||{});
    const calWeights={};
    sigKeys.forEach(k=>calWeights[k]=0.05); // start uniform
    const lr=0.01,epochs=200;
    let calLog=[];
    for(let ep=0;ep<epochs;ep++){
      let totalLoss=0;
      calData.forEach(d=>{
        let z=0;sigKeys.forEach(k=>z+=calWeights[k]*(d.signals[k]||0));
        const p=1/(1+Math.exp(-z)); // sigmoid
        const err=d.y-p;
        totalLoss+=-d.y*Math.log(p+1e-10)-(1-d.y)*Math.log(1-p+1e-10);
        sigKeys.forEach(k=>{calWeights[k]+=lr*err*(d.signals[k]||0)});
      });
      if(ep%50===0)calLog.push({epoch:ep,loss:(totalLoss/calData.length).toFixed(4)});
    }
    // Normalize weights to sum to ~1
    const wSum=sigKeys.reduce((s,k)=>s+Math.abs(calWeights[k]),0);
    sigKeys.forEach(k=>calWeights[k]=Math.round(Math.abs(calWeights[k])/wSum*1000)/1000);
    D.calibratedWeights=calWeights;
    const calAccuracy={log:calLog,weights:calWeights};

    D.backtest={stats,byMonth,byLT,byChan,byScore,totalCanceled:canceledRes.length,totalProcessed:processedRes.length,total:allHist.length,generated:new Date().toISOString(),calibration:calAccuracy};
    st.uping=false;st.umsg=`✅ Backtest: ${allHist.length} reservas analisadas + modelo calibrado`;
    st.tab="accuracy";render();
  }catch(e){
    st.uping=false;st.umsg="❌ Backtest falhou: "+e.message;render();
  }
}

    months.forEach(([mo,d])=>{
      const hiPct=d.total>0?Math.round(d.hi/d.total*100):0;
      h+=`<div style="background:#12162a;border:1px solid #1e2545;border-radius:8px;padding:12px"><div style="font-size:11px;font-weight:800;color:#93b4ff;margin-bottom:6px">${mo}</div>`;
      h+=`<div style="font-size:9px;color:#4a5280;margin-bottom:4px">${d.total} reservas · ${d.nights} noites</div>`;
      h+=`<div style="display:flex;gap:8px;margin-bottom:6px"><span style="font-size:10px;font-weight:800;color:#ef4444">${d.hi} HIGH</span><span style="font-size:10px;font-weight:800;color:#f59e0b">${d.me} MED</span><span style="font-size:10px;font-weight:800;color:#22c55e">${d.lo} LOW</span></div>`;
      // Risk bar
      h+=`<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:6px">`;
      if(d.total>0){
        h+=`<div style="width:${d.hi/d.total*100}%;background:#ef4444"></div>`;
        h+=`<div style="width:${d.me/d.total*100}%;background:#f59e0b"></div>`;
        h+=`<div style="width:${d.lo/d.total*100}%;background:#22c55e"></div>`;
      }
      h+=`</div>`;
      h+=`<div style="font-size:9px;color:#4a5280">€${Math.round(d.rev/1000)}K receita · <span style="color:#ef4444">€${Math.round(d.riskRev/1000)}K</span> em risco (${hiPct}%)</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
    // Detail table
    h+=`<table><tr><th>MÊS</th><th>RESERVAS</th><th>NOITES</th><th style="color:#ef4444">HIGH</th><th style="color:#f59e0b">MEDIUM</th><th style="color:#22c55e">LOW</th><th>%HIGH</th><th>RECEITA</th><th>EM RISCO</th><th>ADR MÉDIO</th></tr>`;
    months.forEach(([mo,d])=>{
      const hiPct=d.total>0?Math.round(d.hi/d.total*100):0;
      const adr=d.nights>0?Math.round(d.rev/d.nights):0;
      h+=`<tr><td style="font-weight:700;color:#93b4ff">${mo}</td><td>${d.total}</td><td>${d.nights}</td><td style="color:#ef4444;font-weight:800">${d.hi}</td><td style="color:#f59e0b;font-weight:800">${d.me}</td><td style="color:#22c55e;font-weight:800">${d.lo}</td><td style="font-weight:800;color:${hiPct>=30?"#ef4444":"#f59e0b"}">${hiPct}%</td><td style="color:#f0f4ff">€${Math.round(d.rev/1000)}K</td><td style="color:#ef4444;font-weight:700">€${Math.round(d.riskRev/1000)}K</td><td style="color:#4a5280">€${adr}</td></tr>`;
    });
    h+=`</table>`;
    h+=`</div>`}
  h+=`</div>`;
  // PANEL
  if(sel){const bg=rc(sel.level);const pc=probColor(sel.prob||0);
    h+=`<div class="panel"><div style="padding:12px 14px;border-bottom:1px solid #1e2545;display:flex;justify-content:space-between;align-items:start"><div><h2>${sel.guest}</h2><h3>${sel.prop} — ${sel.room} — ${sel.roomType}</h3></div><button onclick="csel()" style="background:0;border:0;color:#4a5280;font-size:16px;cursor:pointer">✕</button></div>`;
    h+=`<div class="risk" style="background:${bg}18;border:1px solid ${bg}30"><span class="sc" style="color:${bg}">${sel.score}</span><span class="lv" style="color:${bg}">${sel.level}</span>${sel.override?`<span class="ov">${sel.override}</span>`:""}</div>`;
    h+=`<div style="margin:0 12px 8px;padding:10px 14px;background:#0c0f1a;border-radius:6px;border:1px solid #1e2545"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:9px;color:#4a5280;font-weight:700">PROBABILIDADE DE CANCELAR</span><span style="font-size:18px;font-weight:900;color:${pc}">${sel.prob||0}%</span></div><div style="background:#1e2545;border-radius:3px;height:8px;overflow:hidden"><div style="width:${sel.prob||0}%;height:100%;background:${pc};border-radius:3px;transition:width .3s"></div></div><div style="margin-top:6px;font-size:8px;color:#3a4270">€${sel.riskRev||0} revenue em risco (€${sel.total} × ${sel.prob||0}%)</div></div>`;
    h+=`<div style="padding:0 14px">`;
    [{l:"Arrival",v:fmt(sel.arrival)+" ("+sel.daysUntil+"d)"},{l:"Departure",v:fmt(sel.departure)},{l:"Noites",v:sel.nights},{l:"Rate",v:sel.rate},{l:"ADR",v:"€"+sel.adr},{l:"Total",v:"€"+sel.total},{l:"Canal",v:sel.source},{l:"Pagamento",v:sel.payment||"—"},{l:"Pagamento API",v:sel.paymentStatus||"—"},{l:"Cartão",v:sel.hasCreditCard?"Sim":"Não"},{l:"Hóspede repetente",v:sel.previousStays>0?sel.previousStays+" estadias anteriores":"Novo"},{l:"Cancelamentos anteriores",v:sel.previousCancels>0?sel.previousCancels+"x":"Nenhum"},{l:"Reserva modificada",v:sel.wasModified?"Sim":"Não"},{l:"Email OTA",v:sel.hasOtaEmail?"Sim":"Não"},{l:"Agência",v:sel.hasTravelAgency?"Sim":"Não"},{l:"Crianças",v:sel.hasChildren?"Sim":"Não"},{l:"Nacionalidade",v:(sel.nationality||"—")+(sel.natTier==="HIGH"?' <span class="nat-tag" style="background:#ef444420;color:#ef9090">HIGH RISK</span>':sel.natTier==="LOW"?' <span class="nat-tag" style="background:#22c55e20;color:#4ade80">LOW</span>':"")},{l:"Email",v:sel.isRelay?'<span style="color:#ef4444;font-weight:700">'+sel.email+'</span> <span class="nat-tag" style="background:#ef444420;color:#ef9090">RELAY</span>':sel.email||"—"},{l:"Tel",v:sel.phone||"—"},{l:"Genius",v:sel.isGenius?"Sim":"Não"},{l:"Parking",v:sel.hasParking?"Sim":"Não"},{l:"Pet",v:sel.hasPet?"Sim":"Não"},{l:"Guest Check-in",v:sel.guestCheckedIn?"Check-in online completo":"—"},{l:"Template",v:sel.template},{l:"Contactar via",v:sel.channel},{l:"Oferta",v:sel.offer}].forEach(d=>{h+=`<div class="row"><label>${d.l}</label><span>${d.v}</span></div>`});
    h+=`</div>`;
    if(sel.factors&&sel.factors.length){h+=`<div style="padding:10px 14px"><div style="font-size:8px;font-weight:800;color:#3a4270;letter-spacing:1.5px;margin-bottom:6px">FACTORES DE RISCO</div>`;sel.factors.forEach(f=>{h+=`<span class="ftag">${f}</span>`});h+=`</div>`}
    // Action buttons
    if(sel.level==="HIGH"||sel.level==="MEDIUM"){
      h+=`<div style="padding:10px 14px;border-top:1px solid #1e2545;margin-top:8px"><div style="font-size:8px;font-weight:800;color:#3a4270;letter-spacing:1.5px;margin-bottom:8px">AÇÕES NA MEWS</div>`;
      h+=`<button onclick="addShieldNote('${sel.id}','${sel.guest.replace(/'/g,"\\'")}',${sel.score},${sel.prob},'${sel.level}',${JSON.stringify(sel.factors||[]).replace(/"/g,'&quot;')})" style="width:100%;padding:8px;margin-bottom:6px;background:#ef444418;border:1px solid #ef444430;border-radius:6px;color:#ef9090;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer">📝 Adicionar nota na reserva</button>`;
      h+=`<button onclick="addShieldTask('${sel.id}','${sel.guest.replace(/'/g,"\\'")}',${sel.score},${sel.prob},'${sel.arrival}','${(sel.offer||"").replace(/'/g,"\\'")}')" style="width:100%;padding:8px;margin-bottom:6px;background:#f59e0b18;border:1px solid #f59e0b30;border-radius:6px;color:#f5c890;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer">📋 Criar task para a equipe</button>`;
      h+=`<button onclick="window.open('mailto:?subject='+encodeURIComponent('🛡️ Shield: ${sel.guest.replace(/'/g,"\\'")} (${sel.level} ${sel.prob}%)')+'&body='+encodeURIComponent('Cancellation Shield Alert\\n\\nHóspede: ${sel.guest.replace(/'/g,"\\'")}\\nPropriedade: ${sel.prop}\\nChegada: ${sel.arrival} (${sel.daysUntil}d)\\nNoites: ${sel.nights}\\nScore: ${sel.score}/100 | Prob: ${sel.prob}%\\nTotal: €${sel.total}\\nCanal: ${sel.source}\\nRate: ${sel.rate}\\nAção sugerida: ${(sel.offer||"Contactar hóspede").replace(/'/g,"\\'")}\\nFatores: ${(sel.factors||[]).join(", ")}'))" style="width:100%;padding:8px;margin-bottom:6px;background:#22c55e18;border:1px solid #22c55e30;border-radius:6px;color:#4ade80;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer">📧 Enviar alerta por email</button>`;
      if(sel.phone){const wl=waLink(sel.phone,waMsg(sel.level,sel.guest,sel.prop,sel.arrival,sel.nights,sel.offer));
      h+=`<a href="${wl}" target="_blank" style="display:block;width:100%;padding:8px;margin-bottom:6px;background:#25D36618;border:1px solid #25D36630;border-radius:6px;color:#25D366;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;box-sizing:border-box">💬 Enviar WhatsApp</a>`}
      h+=`</div>`}
    h+=`</div>`}
  h+=`</div>`;app.innerHTML=h;
}

function rupload(){
  const rC=pendingFiles.filter(f=>f.type==="reservation").length;
  const aC=pendingFiles.filter(f=>f.type==="availability").length;
  let h=`<div class="hdr"><div class="logo"><i>CS</i><div><h1>CANCELLATION SHIELD</h1><small>v11.0 — CALIBRATED MODEL — UNIVERSAL</small></div></div></div>`;
  h+=`<div class="up-zone"><div style="font-size:48px;margin-bottom:12px">🛡️</div><div style="font-size:18px;font-weight:800;color:#f0f4ff;margin-bottom:4px">Cancellation Shield v10.1</div><div style="font-size:11px;color:#4a5280;margin-bottom:24px">27 sinais · auto-calibração · EV overbooking · WhatsApp · ações diretas na Mews</div>`;

  // API Section
  h+=`<div class="api-section"><h3>🔗 Carregar da Mews API</h3><div class="msg">Conecta à Mews API para carregar dados ao vivo. Serão carregadas reservas, disponibilidade e informações de clientes.</div><button class="api-btn" onclick="fetchFromMews()" ${st.uping?'disabled':''}>${st.uping?'⏳ '+st.umsg:'🚀 Carregar dados ao vivo'}</button>${st.umsg&&st.uping?`<div class="api-status">${st.umsg}</div>`:''}${st.umsg&&!st.uping?`<div class="msg ${st.umsg.includes("❌")?"err":"ok"}">${st.umsg}</div>`:''}</div>`;

  h+=`<div style="text-align:center;margin:20px 0;color:#3a4270;font-size:10px;font-weight:700;letter-spacing:2px">OU</div>`;

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  h+=`<label class="up-box${rC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${rC?"✅":"📋"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Reservation Report</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${rC?rC+" ficheiro(s)":"Mews .xlsx (vários)"}</div><input type="file" accept=".xlsx" multiple onchange="addFiles('reservation',event)" style="display:none"></label>`;
  h+=`<label class="up-box${aC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${aC?"✅":"📊"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Availability Report</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${aC?aC+" ficheiro(s)":"Mews .xlsx (1/prop)"}</div><input type="file" accept=".xlsx" multiple onchange="addFiles('availability',event)" style="display:none"></label>`;
  h+=`</div>`;
  const btnText=st.uping?"⏳ "+st.umsg:("🚀 Processar ("+pendingFiles.length+" ficheiros)");
  h+=`<button class="up-btn" onclick="processFiles()" ${rC&&!st.uping?"":"disabled"}>${btnText}</button>`;
  if(st.umsg&&!st.uping)h+=`<div class="msg ${st.umsg.includes("❌")?"err":"ok"}">${st.umsg}</div>`;
  // Show processing log
  if(D.log.length){h+=`<div style="margin-top:16px;text-align:left;background:#12162a;border-radius:6px;padding:10px;font-size:9px;max-height:150px;overflow-y:auto">`;D.log.forEach(l=>{h+=`<div style="color:${l.includes("❌")?"#ef4444":"#22c55e"};margin-bottom:2px">${l}</div>`});h+=`</div>`}
  h+=`</div>`;return h;
}

function sp(p){st.prop=p;st.sel=null;render()}
function stab(t){st.tab=t;render()}
function sd(d){st.viewDays=d;render()}
function np(){const d=new Date(st.vs+"T12:00:00");d.setDate(d.getDate()-st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nn(){const d=new Date(st.vs+"T12:00:00");d.setDate(d.getDate()+st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nt(){const d=new Date();d.setDate(d.getDate()-1);st.vs=d.toISOString().split("T")[0];render()}
function sel(id){st.sel=D.reservations.find(r=>r.id===id)||null;render()}
function csel(){st.sel=null;render()}

render();
</script>
</body>
