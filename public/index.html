<script>
// ═══════════════════════════════════════════════════
// CANCELLATION SHIELD v9 — INTELLIGENT MODEL
// 12 signals · probability calibration · 3859 res backtest
// 87.3% precision · 92.3% recall
// ═══════════════════════════════════════════════════

const SH={Alegria:"ALE","SB I":"SBI","SB II":"SBII"};
const PS=["Alegria","SB I","SB II"];
const fmt=d=>{if(!d)return"";const p=d.split("-");return p[2]+"/"+p[1]};
const dn=d=>["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][new Date(d+"T12:00:00").getDay()];
const rc=l=>l==="HIGH"?"#ef4444":l==="MEDIUM"?"#f59e0b":"#22c55e";
const oc=o=>o==="NR+Paid"?"#60a5fa":o&&o.includes("Safe")?"#4ade80":null;
const cb=r=>oc(r.override)||rc(r.level);
const today=new Date().toISOString().split("T")[0];

// ─── BOOKING.COM BENCHMARKS (2657 reservations) ───
const BDC_LT={Alegria:{1:6.6,3:0,7:1.9,14:26.9,30:38.6,60:42.5,90:69.1,999:67.7},"SB I":{1:8.4,3:2.6,7:9.5,14:31.7,30:46.7,60:51,90:54.5,999:51},"SB II":{1:1.2,3:0,7:10.1,14:20.5,30:40.3,60:46.8,90:64.6,999:55.6}};
const BDC_MO={Alegria:[39.2,29.2,31.2,22.2,33.3,32,32,29.4,29.2,49,40.7,33.3],"SB I":[11.3,25.3,18.3,37.4,41.5,47.4,34.6,37.6,45.1,50,57.1,34.5],"SB II":[9.7,26.5,27.9,31.9,33,30.1,31.5,30.8,38.3,40.5,29.2,46.1]};

// ─── NATIONALITY RISK TIERS (from 3859 res backtest) ───
const NAT_HIGH=["india","angola","mozambique","united arab emirates","saudi arabia","nigeria","greece","türkiye","turkey","morocco"];
const NAT_MED=["brazil","serbia","singapore","korea","finland","israel","taiwan","romania"];
const NAT_LOW=["belgium","switzerland","latvia","mexico","sweden","netherlands","ukraine","france","czech republic","norway"];

// ─── PROBABILITY CALIBRATION TABLE (from 3859 res backtest) ───
function cancelProb(score){
  if(score<=5)return 3;if(score<=10)return 5;if(score<=15)return 50;
  if(score<=20)return 84;if(score<=25)return 64;if(score<=30)return 75;
  if(score<=35)return 74;if(score<=40)return 68;if(score<=50)return 91;
  if(score<=60)return 88;return 90;
}
function probColor(p){return p>=70?"#ef4444":p>=40?"#f59e0b":p>=15?"#60a5fa":"#22c55e"}

// ─── V9 SCORING MODEL (12 signals) ───
function isNR(r){const l=(r||"").toLowerCase();return l.includes("nr ")||l.startsWith("nr")||l.includes("non-ref")||l.includes("non-refundable")||l.includes("early bird")}
function sRate(r){const l=(r||"").toLowerCase();if(l.includes("flex 3"))return 58;if(l.includes("standard")&&l.includes("breakfast"))return 50;if(l.includes("flex 5"))return 48;if(l.includes("semi-flex"))return 35;if(l.includes("standard")&&l.includes("booking"))return 30;if(l.includes("standard"))return 35;if(l.includes("flex")&&l.includes("ota"))return 30;if(l.includes("black friday"))return 35;if(l.includes("friends")||l.includes("family"))return 5;if(l.includes("welcome"))return 3;if(isNR(r))return 3;if(l.includes("long"))return 10;return 25}
function sChan(s){const l=(s||"").toLowerCase();if(l.includes("telephone"))return 85;if(l.includes("a-hotels")||l.includes("american express"))return 82;if(l.includes("booking engine sbii"))return 42;if(l.includes("booking.com"))return 38;if(l.includes("booking engine sbi"))return 32;if(l.includes("booking engine alegria"))return 30;if(l.includes("channel"))return 35;if(l.includes("in person"))return 30;if(l.includes("message")||l.includes("email"))return 25;if(l.includes("hotels.com"))return 18;if(l.includes("airbnb"))return 14;if(l.includes("expedia"))return 17;if(l.includes("booking engine"))return 12;return 20}
function sLT(d,p){if(!d||d<0)return 15;const b=BDC_LT[p]||BDC_LT["SB II"];if(d<=1)return Math.round(b[1]*.8);if(d<=3)return Math.round((b[3]||5)*.8+5);if(d<=7)return Math.round(b[7]*.9);if(d<=14)return Math.round(b[14]*.85);if(d<=30)return Math.round(b[30]*.85);if(d<=60)return Math.round(b[60]*.85);if(d<=90)return Math.round(b[90]*.8);return Math.round(b[999]*.8)}
function sSea(m,p){if(!m)return 25;const b=BDC_MO[p]||BDC_MO["SB II"];const i=(m-3+12)%12;return Math.round((b[i]||30)*.7)}
function sLOS(n){if(!n||n<=0)return 20;if(n<=2)return 20;if(n<=4)return 25;if(n<=7)return 35;if(n<=14)return 60;return 78}
function sPay(p){const s=(p||"").toLowerCase().trim();if(s==="success")return 2;if(s==="fail")return 10;return 40}
function sADR(a){if(!a||a<=0)return 25;if(a<100)return 12;if(a<150)return 10;if(a<200)return 20;if(a<300)return 45;return 65}
function sNat(nat){const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return 8;if(NAT_MED.some(x=>n.includes(x)))return 3;if(NAT_LOW.some(x=>n.includes(x)))return -5;return 0}
function natTier(nat){const n=(nat||"").toLowerCase();if(NAT_HIGH.some(x=>n.includes(x)))return"HIGH";if(NAT_LOW.some(x=>n.includes(x)))return"LOW";return""}

function computeRisk(r,duve){
  const rate=r.rate||"",pay=(r.payment||"").toLowerCase().trim();
  // ─── SAFE OVERRIDES (probability <5%) ───
  if(isNR(rate)&&pay==="success")return{score:3,level:"LOW",override:"NR+Paid",prob:4};
  if(r.hasParking)return{score:2,level:"LOW",override:"Safe:Parking",prob:0};
  if(r.hasVoucher)return{score:3,level:"LOW",override:"Safe:Voucher",prob:4};
  const dv=duve?duve[r.id]:null;
  if(dv&&dv.status==="preCheckedIn")return{score:3,level:"LOW",override:"Safe:DuveCheckedIn",prob:3};
  if(r.duveCheckinNotes)return{score:5,level:"LOW",override:"Safe:DuveNotes",prob:3};
  if(r.hasPet)return{score:5,level:"LOW",override:"Safe:Pet",prob:5};
  // ─── WEIGHTED SCORE (9 original + 3 new signals) ───
  let s=.18*sRate(rate)+.16*sLT(r.leadTimeDays,r.prop)+.14*sChan(r.source)+.12*sPay(r.payment)+.08*sLOS(r.nights)+.06*sADR(r.adr)+.05*sSea(r.arrMonth,r.prop)+.03*(r.hasNoContact?60:5)+.03*(r.isSolo?40:20);
  // ─── NEW V9 SIGNALS ───
  if(r.isRelay)s+=20;  // @guest.booking.com → 81.2% cancel
  s+=sNat(r.nationality);  // nationality risk tier
  if(r.isGenius)s-=3;  // genius guests cancel less
  // ─── MODIFIERS ───
  let ov="";
  if(dv){if(dv.status==="beforeCheckIn"&&dv.terms==="Didn't agree"){s+=5;ov="Duve:noEngagement"}else if(dv.status==="beforeCheckIn"&&dv.terms==="Agreed"){s-=3;ov="Duve:partial"}}
  if(isNR(rate)&&pay!=="success"){s+=8;ov=ov||"NR:noPay"}
  s=Math.max(0,Math.min(Math.round(s),100));
  const prob=cancelProb(s);
  return{score:s,level:s>=33?"HIGH":s>=18?"MEDIUM":"LOW",override:ov,prob};
}
function tmpl(lv,d,n){if(lv==="HIGH"){if(n>=8)return"7A";if(d>14)return n>=5?"1B":"1A";if(d>7)return"2A/2B";if(d>3)return"3A/3B";return"3A"}if(lv==="MEDIUM")return d>14?"4A":"5A";return"-"}
function offer(lv,d,n){if(lv==="HIGH"){if(n>=8)return"Welcome+mid-stay+late c-out";if(d>14)return"Early c-in+late c-out";if(d>7)return"Early c-in+upgrade";if(d>3)return"Crédito/datas alt.";return"Contacto urgente"}if(lv==="MEDIUM")return d>14?"Guia bairro":"Info check-in";return"-"}
function chan(src,lv){const s=(src||"").toLowerCase();if(s.includes("booking.com"))return"BDC Extranet";if(s.includes("airbnb"))return"Airbnb";if(s.includes("expedia")||s.includes("hotels.com"))return"Expedia";return lv==="HIGH"?"WhatsApp":"Email"}

// ─── EXCEL PARSING (runs in browser via SheetJS CDN) ───
function detectProp(wb){
  const ps=wb.Sheets["Parameters"];
  if(!ps)return"";
  const d=XLSX.utils.sheet_to_json(ps,{header:1});
  for(const r of d){
    const k=String(r[0]||""),v=String(r[1]||"");
    if(k.includes("Enterprise")){
      if(v.includes("Alegria"))return"Alegria";
      if(v.includes("Barbara II"))return"SB II";
      if(v.includes("Barbara I"))return"SB I";
    }
  }
  return"";
}

function parseRes(wb){
  const prop=detectProp(wb);
  const ws=wb.Sheets["Reservations"];
  if(!ws)return{prop,res:[],err:"No Reservations sheet"};
  const data=XLSX.utils.sheet_to_json(ws,{defval:""});
  const now=new Date();
  const res=data.filter(r=>r.Identifier&&(r.Status==="Confirmed"||r.Status==="Checked in")).map(r=>{
    const arr=r.Arrival?new Date(r.Arrival):null;
    const dep=r.Departure?new Date(r.Departure):null;
    const cre=r.Created?new Date(r.Created):null;
    const nights=arr&&dep?Math.round((dep-arr)/864e5):0;
    const lt=arr&&cre?Math.round((arr-cre)/864e5):0;
    const du=arr?Math.round((arr-now)/864e5):999;
    const adr=r["Average rate (nightly)"]||(r["Cancelled cost"]&&nights?r["Cancelled cost"]/nights:0);
    const noc=(!r.Email||r.Email==="")&&(!r.Telephone||r.Telephone==="");
    const notes=r.Notes||"";
    const email=r.Email||"";
    const products=r.Products||"";
    let rm=String(r["Space number"]||(r["Requested category"]||"").split(" - ")[0]);
    rm=rm.replace(/^SBII\s*/i,"").replace(/^SBI\s*/i,"").replace(/^ALE\s*/i,"").trim();
    return{id:r.Identifier,guest:`${r["First name"]||""} ${r["Last name"]||""}`.trim(),prop,room:rm,
      roomType:r["Requested category"]||"",arrival:arr?arr.toISOString().split("T")[0]:"",
      departure:dep?dep.toISOString().split("T")[0]:"",nights,daysUntil:du,leadTimeDays:lt,
      rate:r.Rate||"",adr:Math.round(adr||0),total:Math.round(r["Total amount"]||0),
      source:r["Reservation source"]||"",payment:r["Automatic payment"]||"",
      email:email,phone:r.Telephone||"",persons:r["Person count"]||1,
      nationality:r["Customer nationality"]||"",hasNoContact:noc,isSolo:r["Person count"]===1,
      arrMonth:arr?arr.getMonth()+1:null,
      // ─── V9 NEW INTELLIGENCE FIELDS ───
      isRelay:email.includes("@guest.booking.com"),
      isGenius:notes.includes("booker_is_genius"),
      hasPet:/bringing your pet.*(Sim|Yes)/i.test(notes),
      hasParking:products.includes("Parking"),
      hasVoucher:!!(r.Voucher&&r.Voucher!==""),
      duveCheckinNotes:notes.includes("Guest Check-in info by Duve"),
      cardType:r["Payment card type"]||"",
      classifications:r["Customer classifications"]||"",
      lateArrival:/between 2[0-3]|between 0[0-4]/i.test(notes),
      travelAgency:r["Travel agency"]||""
    };
  });
  return{prop,res,err:null,total:data.length,active:res.length};
}

function parseAvail(wb){
  const prop=detectProp(wb);
  const os=wb.Sheets["Occupancy"];
  if(!os)return{prop,data:{}};
  const od=XLSX.utils.sheet_to_json(os,{header:1,cellDates:true});
  const as=wb.Sheets["Availability"]?XLSX.utils.sheet_to_json(wb.Sheets["Availability"],{header:1,cellDates:true}):null;
  const rs=wb.Sheets["Rate"]?XLSX.utils.sheet_to_json(wb.Sheets["Rate"],{header:1,cellDates:true}):null;
  const dates=(od[0]||[]).slice(2).filter(d=>d instanceof Date);
  const result={};
  dates.forEach((date,di)=>{
    const key=date.toISOString().split("T")[0];
    let tO=0,tS=0,tA=0,tR=0,rc=0;const rts=[];
    for(let ri=1;ri<od.length;ri++){
      if(od[ri][0]!=="Stay")continue;
      const rt=String(od[ri][1]||"").trim();
      const o=Number(od[ri][di+2])||0;
      const a=as?(Number(as[ri]?.[di+2])||0):0;
      const rate=rs?(Number(rs[ri]?.[di+2])||0):0;
      tO+=o;tS++;tA+=a;if(rate>0){tR+=rate;rc++}
      rts.push({type:rt,occ:o,avail:a,rate:Math.round(rate)});
    }
    result[key]={occ:tO,spaces:tS,avail:tA,avgRate:rc>0?Math.round(tR/rc):0,occPct:tS>0?Math.round(tO/tS*1000)/10:0,rooms:rts};
  });
  return{prop,data:result};
}

function parseDuve(text){
  const lines=text.split("\n");if(lines.length<2)return{};
  const hdr=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
  const ei=hdr.indexOf("External Id"),si=hdr.indexOf("Status");
  const ti=hdr.findIndex(h=>h.includes("Terms")),pi=hdr.findIndex(h=>h.includes("passport"));
  if(ei<0)return{};const map={};
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(",").map(x=>x.trim().replace(/"/g,""));
    if(c[ei])map[c[ei]]={status:c[si]||"",terms:ti>=0?c[ti]||"":"",passport:pi>=0?c[pi]||"":""};
  }
  return map;
}

// ─── MEWS API INTEGRATION ───
async function callMewsProxy(endpoint,params){
  const maxRetries=2;
  for(let attempt=0;attempt<=maxRetries;attempt++){
    try{
      const resp=await fetch("/api/mews",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({endpoint,params})
      });
      const text=await resp.text();
      let data;
      try{data=JSON.parse(text)}catch(e){
        if(attempt<maxRetries){await new Promise(r=>setTimeout(r,(attempt+1)*1000));continue}
        throw new Error("API returned non-JSON response (status "+resp.status+")")
      }
      if(!resp.ok){
        const msg=data.error||data.details?.Message||("HTTP "+resp.status);
        if(resp.status>=500&&attempt<maxRetries){await new Promise(r=>setTimeout(r,(attempt+1)*1000));continue}
        throw new Error(msg);
      }
      return data;
    }catch(e){
      if(attempt>=maxRetries)throw e;
      await new Promise(r=>setTimeout(r,(attempt+1)*1000));
    }
  }
}

async function fetchAllPages(endpoint,params,dataKey,maxPages=5){
  let allData=[];
  let cursor=null;
  let page=0;
  do{
    try{
      const p={...params,Limitation:{...params.Limitation,Cursor:cursor}};
      const result=await callMewsProxy(endpoint,p);
      const items=result[dataKey]||[];
      allData=allData.concat(items);
      cursor=result.Cursor||null;
    }catch(e){
      console.warn("SHIELD: Page "+(page+1)+" of "+endpoint+" failed: "+e.message+". Returning "+allData.length+" items collected so far.");
      break;
    }
    page++;
    if(page>=maxPages)break;
  }while(cursor);
  return allData;
}

function normPayment(mewsState){
  if(!mewsState)return"";
  const s=mewsState.toLowerCase();
  if(s==="charged"||s==="completed")return"success";
  if(s==="pending")return"";
  if(s==="failed"||s==="canceled")return"fail";
  return mewsState;
}

function mapMewsReservation(res,ratesMap,sourcesMap,resourcesMap,categoriesMap,customersMap,companionsMap,enterpriseName){
  // Determine property from enterprise name
  let prop="";
  if(enterpriseName.includes("Alegria"))prop="Alegria";
  else if(enterpriseName.includes("Barbara II")||enterpriseName.includes("Bárbara II"))prop="SB II";
  else if(enterpriseName.includes("Barbara I")||enterpriseName.includes("Bárbara I"))prop="SB I";

  const arr=res.StartUtc?new Date(res.StartUtc):null;
  const dep=res.EndUtc?new Date(res.EndUtc):null;
  const cre=res.CreatedUtc?new Date(res.CreatedUtc):null;
  const now=new Date();
  const nights=arr&&dep?Math.round((dep-arr)/864e5):0;
  const lt=arr&&cre?Math.round((arr-cre)/864e5):0;
  const du=arr?Math.round((arr-now)/864e5):999;

  // Rate name from ratesMap
  const rateName=ratesMap[res.RateId]||"";

  // Source name from sourcesMap
  const sourceName=sourcesMap[res.SourceId]||res.Origin||"";

  // Customer info
  const customer=customersMap[res.CustomerId]||{};
  const email=customer.Email||"";
  const phone=customer.Phone||"";
  const firstName=customer.FirstName||"";
  const lastName=customer.LastName||"";
  const nationality=customer.NationalityCode||"";

  // Room info
  const resource=resourcesMap[res.AssignedResourceId]||{};
  const categoryId=res.RequestedResourceCategoryId||resource.CategoryId||"";
  const category=categoriesMap[categoryId]||{};
  let room=resource.Name||"";
  // Strip property prefix from room name
  room=room.replace(/^SBII\s*/i,"").replace(/^SBI\s*/i,"").replace(/^ALE\s*/i,"").trim();

  // Person count from companionships
  const companions=companionsMap[res.Id]||[];
  const personCount=1+companions.length;

  // ADR calculation
  const totalAmount=res.TotalAmount?(res.TotalAmount.Value||0):0;
  const adr=nights>0?Math.round(totalAmount/nights):0;

  // Notes from res.Notes
  const notes=res.Notes||"";

  const noc=!email&&!phone;

  return{
    id:res.Id,
    guest:(firstName+" "+lastName).trim(),
    prop:prop,
    room:room,
    roomType:category.Name||"",
    arrival:arr?arr.toISOString().split("T")[0]:"",
    departure:dep?dep.toISOString().split("T")[0]:"",
    nights:nights,
    daysUntil:du,
    leadTimeDays:lt,
    rate:rateName,
    adr:adr,
    total:Math.round(totalAmount),
    source:sourceName,
    payment:normPayment(res.PaymentState||""),
    email:email,
    phone:phone,
    persons:personCount,
    nationality:nationality,
    hasNoContact:noc,
    isSolo:personCount===1,
    arrMonth:arr?arr.getMonth()+1:null,
    // V9 intelligence fields
    isRelay:email.includes("@guest.booking.com"),
    isGenius:notes.includes("booker_is_genius"),
    hasPet:/bringing your pet.*(Sim|Yes)/i.test(notes),
    hasParking:false,
    hasVoucher:!!(res.VoucherId),
    duveCheckinNotes:notes.includes("Guest Check-in info by Duve"),
    cardType:"",
    classifications:"",
    lateArrival:/between 2[0-3]|between 0[0-4]/i.test(notes),
    travelAgency:res.TravelAgencyId||""
  };
}

function mapMewsAvailability(availData,categoriesMap){
  const result={};
  const datesUtc=availData.DatesUtc||[];
  const categoryAvails=availData.CategoryAvailabilities||[];

  datesUtc.forEach((dateStr,idx)=>{
    const date=new Date(dateStr);
    const dateKey=date.toISOString().split("T")[0];

    let totalSpaces=0;
    let totalAvailable=0;

    categoryAvails.forEach(ca=>{
      const cat=categoriesMap[ca.CategoryId];
      if(!cat)return;
      const avails=ca.Availabilities||[];
      const availOnDay=avails[idx]||0;
      const maxAvail=Math.max(...avails,0);

      totalSpaces+=maxAvail;
      totalAvailable+=availOnDay;
    });

    const totalOccupied=Math.max(0,totalSpaces-totalAvailable);
    const occPct=totalSpaces>0?Math.round(totalOccupied/totalSpaces*1000)/10:0;

    result[dateKey]={
      occ:totalOccupied,
      spaces:totalSpaces,
      avail:totalAvailable,
      avgRate:0,
      occPct:occPct
    };
  });

  return result;
}

async function fetchFromMews(){
  st.uping=true;
  st.umsg="Conectando à Mews API...";
  const startTime=Date.now();
  render();

  try{
    // Calculate time windows
    const now=new Date();
    const startUtcRes=new Date(now);
    startUtcRes.setDate(startUtcRes.getDate()-14);
    const endUtcRes=new Date(now);
    endUtcRes.setDate(endUtcRes.getDate()+14);

    const startUtcAvail=new Date(now);
    const endUtcAvail=new Date(now);
    endUtcAvail.setDate(endUtcAvail.getDate()+14);

    // BATCH 1: Configuration
    st.umsg="(1/7) Carregando configuração...";
    render();

    const config=await callMewsProxy("configuration/get",{});
    const enterpriseName=config.Enterprise?.Name||"";

    st.umsg="(2/7) Carregando serviços...";
    render();

    const servicesRes=await callMewsProxy("services/getAll",{});
    const services=servicesRes.Services||[];

    // BATCH 2: Reference data (parallel)
    st.umsg="(3/7) Carregando taxas e fontes...";
    render();

    const ratesRes=await fetchAllPages("rates/getAll",{Limitation:{Count:1000}},"Rates");
    const ratesMap={};
    ratesRes.forEach(r=>{ratesMap[r.Id]=r.Name||""});

    const sourcesRes=await fetchAllPages("sources/getAll",{Limitation:{Count:1000}},"Sources");
    const sourcesMap={};
    sourcesRes.forEach(s=>{sourcesMap[s.Id]=s.Name||""});

    st.umsg="(4/7) Carregando apartamentos...";
    render();

    const resourcesRes=await callMewsProxy("resources/getAll",{Extent:{Resources:true,ResourceCategories:true}});
    const resourcesMap={};
    const categoriesMap={};
    (resourcesRes.Resources||[]).forEach(r=>{resourcesMap[r.Id]=r});
    (resourcesRes.ResourceCategories||[]).forEach(c=>{categoriesMap[c.Id]=c});

    st.umsg="(5/7) Carregando reservas...";
    render();

    const resvRes=await fetchAllPages("reservations/getAll/2023-06-06",{
      TimeFilter:"Colliding",
      StartUtc:startUtcRes.toISOString(),
      EndUtc:endUtcRes.toISOString(),
      Limitation:{Count:200},
      Extent:{Reservations:true,Items:false,BusinessSegments:false}
    },"Reservations");

    // Filter for active reservations (Confirmed, Started, or Processed)
    const filteredResv=resvRes.filter(r=>r.State==="Confirmed"||r.State==="Started"||r.State==="Processed");

    st.umsg="(6/7) Carregando clientes e disponibilidade...";
    render();

    const customerIds=[...new Set(filteredResv.map(r=>r.CustomerId).filter(Boolean))];
    let customersRes=[];
    for(let i=0;i<customerIds.length;i+=100){
      const batch=customerIds.slice(i,i+100);
      const res=await callMewsProxy("customers/getAll",{CustomerIds:batch,Limitation:{Count:100}});
      customersRes.push(...(res.Customers||[]));
    }
    const customersMap={};
    customersRes.forEach(c=>{customersMap[c.Id]=c});

    // Find the accommodation (Reservable) service
    const accomService=services.find(s=>s.Type==="Reservable")||services[0];
    const availRes=await callMewsProxy("services/getAvailability",{
      ServiceId:accomService?accomService.Id:"",
      StartUtc:startUtcAvail.toISOString(),
      EndUtc:endUtcAvail.toISOString()
    });

    let companionsMap={};
    try{
      const companionsRes=await fetchAllPages("companionships/getAll",{
        ReservationIds:filteredResv.map(r=>r.Id).slice(0,200),
        Limitation:{Count:1000}
      },"Companionships",2);
      companionsRes.forEach(c=>{
        if(!companionsMap[c.ReservationId]){companionsMap[c.ReservationId]=[]}
        companionsMap[c.ReservationId].push(c);
      });
    }catch(e){console.warn("SHIELD: Companionships fetch failed, defaulting to 1 person per reservation")}

    st.umsg="(7/7) Mapeando dados...";
    render();

    // Map reservations
    const mappedResv=filteredResv.map(r=>mapMewsReservation(r,ratesMap,sourcesMap,resourcesMap,categoriesMap,customersMap,companionsMap,enterpriseName));

    // Map availability for all categories at once
    const availData=mapMewsAvailability(availRes,categoriesMap);

    // Determine property from mapped reservations
    const detectedProp=mappedResv.length>0?mappedResv[0].prop:"";

    // Merge with existing pending files
    pendingFiles.push({type:"mews-reservations",data:mappedResv});
    pendingFiles.push({type:"mews-availability",data:availData,prop:detectedProp});

    st.umsg="Processando dados...";
    render();

    // Process as normal
    await processMewsFiles();

    const elapsed=((Date.now()-startTime)/1000).toFixed(1);
    st.uping=false;
    st.umsg=`✅ ${mappedResv.length} reservas carregadas em ${elapsed}s`;
    addLog("✅ Mews API: "+mappedResv.length+" reservas e "+Object.keys(availData).length+" dias de disponibilidade");
    render();

  }catch(err){
    st.uping=false;
    st.umsg="❌ "+err.message;
    addLog("❌ Mews API error: "+err.message);
    render();
  }
}

async function processMewsFiles(){
  const results={res:[],avail:{},duve:{},logs:[]};

  for(const pf of pendingFiles){
    if(pf.type==="mews-reservations"){
      results.res.push(...pf.data);
      results.logs.push(`✅ Mews API: ${pf.data.length} reservas carregadas`);
    }else if(pf.type==="mews-availability"){
      const prop=pf.prop||"Mews";
      results.avail[prop]=pf.data;
      results.logs.push(`✅ Mews API: ${Object.keys(pf.data).length} dias de disponibilidade (${prop})`);
    }
  }

  // Continue with normal processing
  st.umsg="A calcular riscos...";
  render();

  const scored=results.res.map(r=>{
    const{score,level,override,prob}=computeRisk(r,results.duve);
    const factors=[];
    if(r.isRelay)factors.push("Relay email");
    if(sRate(r.rate)>=35)factors.push("Rate");
    if(sChan(r.source)>=35)factors.push("Canal");
    if(r.leadTimeDays>30)factors.push("LT:"+r.leadTimeDays+"d");
    if(r.nights>7)factors.push("LOS:"+r.nights+"n");
    if(sPay(r.payment)>=30)factors.push("NoPay");
    if(sADR(r.adr)>=40)factors.push("ADR€"+r.adr);
    if(r.hasNoContact)factors.push("NoContact");
    const nt=natTier(r.nationality);if(nt==="HIGH")factors.push("Nat:"+r.nationality.split(" ")[0]);
    const riskRev=Math.round(r.total*prob/100);
    return{...r,score,level,override,prob,factors,riskRev,natTier:nt,template:tmpl(level,r.daysUntil,r.nights),offer:offer(level,r.daysUntil,r.nights),channel:chan(r.source,level)};
  });

  // Compute overbooking
  const ob=[];
  const dnArr=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const cutoff=new Date(Date.now()+90*864e5).toISOString().split("T")[0];
  PS.forEach(prop=>{
    const avail=results.avail[prop];
    if(!avail)return;
    const pr=scored.filter(r=>r.prop===prop);
    Object.entries(avail).forEach(([ds,dd])=>{
      if(ds<today||ds>cutoff)return;
      const hi=pr.filter(r=>r.level==="HIGH"&&r.arrival<=ds&&r.departure>ds);
      if((dd.occPct||0)>=70&&hi.length>0){
        const n=Math.min(Math.max(1,Math.floor(hi.length*.4)),3);
        const adj=Math.max(0,n-(hi.some(r=>r.daysUntil>7)?1:0));
        if(adj>0){
          const fr=(dd.rooms||[]).filter(rt=>rt.avail===0&&rt.rate>0);
          const hiGuests=hi.sort((a,b)=>b.score-a.score).slice(0,5).map(r=>r.guest.split(" ").pop()+" ("+r.score+")");
          ob.push({date:ds,prop,occPct:dd.occPct,nHigh:hi.length,ob:adj,
            rooms:fr.slice(0,adj).map(rt=>({type:rt.type,rate:rt.rate})),
            roomsStr:fr.slice(0,adj).map(rt=>rt.type.split(" - ").pop().replace("Apartment","Apt")+" €"+rt.rate).join(" | ")||"Qualquer tipo",
            avgRate:dd.avgRate,dow:dnArr[new Date(ds+"T12:00:00").getDay()],
            hiGuests:hiGuests.join(", "),
            week:Math.ceil((new Date(ds+"T12:00:00").getDate())/7),
            month:new Date(ds+"T12:00:00").toLocaleString("pt",{month:"short"})
          });
        }
      }
    });
  });
  ob.sort((a,b)=>a.date.localeCompare(b.date));

  const obMap={};
  ob.forEach(o=>{
    const key=o.prop+"|"+o.date;
    const hiOnDay=scored.filter(r=>r.prop===o.prop&&r.level==="HIGH"&&r.arrival<=o.date&&r.departure>o.date);
    const hiRoomIds=hiOnDay.map(r=>r.room);

  });

  D={reservations:scored,availability:results.avail,overbooking:ob,obMap,duve:results.duve,log:D.log.concat(results.logs),generated:new Date().toISOString()};
  st.phase="dashboard";st.uping=false;st.umsg="";pendingFiles=[];
  render();
  addLog(`Dashboard loaded: ${scored.length} reservations, ${ob.length} OB days`);
}

  const totalRiskRev=res.reduce((s,r)=>s+(r.riskRev||0),0);
  h+=`<div class="kpis">`;
  [{l:"RESERVAS",v:res.length,c:"#f0f4ff"},{l:"HIGH RISK",v:hi.length,s:"€"+Math.round(hi.reduce((s,r)=>s+r.total,0)/1000)+"K",c:"#ef4444"},
   {l:"MEDIUM",v:me.length,s:"€"+Math.round(me.reduce((s,r)=>s+r.total,0)/1000)+"K",c:"#f59e0b"},
   {l:"LOW/SAFE",v:lo.length,s:lo.filter(r=>r.override).length+" overrides",c:"#22c55e"},
   {l:"€ EM RISCO",v:"€"+Math.round(totalRiskRev/1000)+"K",s:"prob. ponderado",c:"#ff6b6b"},
   {l:"OB DIAS",v:ob.length,s:ob.reduce((s,o)=>s+o.ob,0)+" nights",c:"#a78bfa"},
   {l:"OB RECEITA",v:"€"+Math.round(ob.reduce((s,o)=>s+o.ob*o.avgRate,0)/1000)+"K",s:"potencial",c:"#c084fc"}
  ].forEach(k=>{h+=`<div class="kpi"><label>${k.l}</label><b style="color:${k.c}">${k.v}</b>${k.s?`<small>${k.s}</small>`:""}</div>`});
  h+=`</div>`;
  // Tabs + Nav
  h+=`<div class="tabs">`;
  [{id:"timeline",l:"▦ Timeline"},{id:"retention",l:"☎ Retenção"},{id:"overbooking",l:"⊕ Overbooking"}].forEach(t=>{h+=`<button class="tab${st.tab===t.id?" on":""}" onclick="stab('${t.id}')">${t.l}</button>`});
  h+=`<div class="nav"><button class="nbtn" onclick="np()">◀</button><button class="nbtn on" onclick="nt()">HOJE</button><button class="nbtn" onclick="nn()">▶</button>`;
  [14,30,60,90].forEach(d=>{h+=`<button class="nbtn${st.viewDays===d?" on":""}" onclick="sd(${d})">${d}d</button>`});
  h+=`</div></div><div class="content"><div class="main">`;
  // TIMELINE
  if(st.tab==="timeline"){
    h+=`<div class="tl-wrap"><div class="tl"><div class="tl-lbl" style="width:${lW}px"><div style="height:28px;background:#12162a;border-bottom:1px solid #1e2545;border-right:1px solid #1e2545"></div>`;
    rows.forEach((row,i)=>{h+=`<div class="tl-r" style="height:${rH}px;background:${i%2===0?"#0c0f1a":"#0e1125"}"><span style="color:#3a4270;width:32px;font-size:8px;font-weight:700">${SH[row.prop]||""}</span><span style="color:#8090c0;font-weight:600">${row.room}</span></div>`});
    h+=`</div><div style="display:flex">`;
    days.forEach(day=>{const iT=day===today,iW=[0,6].includes(new Date(day+"T12:00:00").getDay());
      h+=`<div style="width:${cW}px;flex-shrink:0"><div style="height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${iT?"#1e3a8a":"#12162a"};border-bottom:1px solid #1e2545"><span style="font-size:7px;color:${iT?"#93b4ff":iW?"#4a5280":"#3a4270"};font-weight:600">${dn(day)}</span><span style="font-size:${cW>=38?10:8}px;color:${iT?"#fff":"#6070a0"};font-weight:700">${new Date(day+"T12:00:00").getDate()}</span></div>`;
      rows.forEach(row=>{const r=row.res.find(x=>x.arrival<=day&&x.departure>day);
        const obKey=row.prop+"|"+day;
        const obDay=D.obMap[obKey];
        if(!r){
          if(obDay&&obDay.rooms.length>0){
            const rowCat=(row.res[0]&&row.res[0].roomType)||"";
            const matchesOB=obDay.rooms.some(rt=>rowCat.includes(rt.type.split(" - ").pop().trim().split(" ")[0]));
            if(matchesOB){
              h+=`<div class="tl-c" style="height:${rH}px;background:#7c3aed30;border:1px dashed #a78bfa60;border-radius:2px;cursor:pointer" title="OB: abrir ${row.room} à venda (€${obDay.rate})" onclick="stab('overbooking')"><span style="font-size:7px;color:#a78bfa;font-weight:900">+1</span></div>`;
              return;
            }
          }
          h+=`<div class="tl-c" style="height:${rH}px;background:${iW?"#0b0e18":"#0c0f1a"}"></div>`;return}
        const isA=r.arrival===day,bg=cb(r);
        const isObTarget=obDay&&r.level==="HIGH"&&obDay.hiRooms.includes(row.room);
        const obStyle=isObTarget?"box-shadow:inset 0 0 0 2px #a78bfa;":"";
        h+=`<div class="tl-c res" style="height:${rH}px;background:${bg};opacity:${isA?1:.7};${isA?"border-radius:3px 0 0 3px;":""}${obStyle}" onclick="sel('${r.id}')" title="${r.guest}|${r.level}(${r.score})${isObTarget?" ⊕OB":""}">${isA&&cW>=30?`<span style="font-size:7px;color:#fff;font-weight:800;text-shadow:0 1px 3px #000;padding:0 2px;overflow:hidden;white-space:nowrap">${(r.guest.split(" ").pop()||"").slice(0,5)}</span>`:""}</div>`});
      h+=`</div>`});
    h+=`</div></div><div class="legend"><span><i style="background:#ef4444"></i>HIGH</span><span><i style="background:#f59e0b"></i>MEDIUM</span><span><i style="background:#22c55e"></i>LOW</span><span><i style="background:#60a5fa"></i>NR+Paid</span><span><i style="background:#4ade80"></i>Safe</span><span><i style="background:#7c3aed;border:1px dashed #a78bfa"></i>OB +1</span></div></div>`}
  // RETENTION
  if(st.tab==="retention"){
    h+=`<div class="tbl"><div style="font-size:12px;font-weight:800;margin-bottom:10px;color:#f0f4ff">Contactar — ${ret.length} reservas · €${Math.round(ret.reduce((s,r)=>s+(r.riskRev||0),0)/1000)}K em risco</div><table><tr><th>#</th><th>PROB</th><th>SC</th><th>PROP</th><th>GUEST</th><th>NAT</th><th>ARRIVAL</th><th>N</th><th>DIAS</th><th>€RISCO</th><th>CANAL</th><th>OFERTA</th></tr>`;
    ret.forEach((r,i)=>{const pc=probColor(r.prob);h+=`<tr onclick="sel('${r.id}')"><td style="color:#4a5280">${i+1}</td><td><span class="prob-bar" style="width:${Math.max(4,r.prob*.4)}px;background:${pc}"></span><span style="font-weight:800;color:${pc};font-size:10px">${r.prob}%</span></td><td style="font-weight:800;color:${rc(r.level)};font-size:9px">${r.score}</td><td style="color:#5a6a9a;font-size:9px">${SH[r.prop]||""}</td><td style="color:#c8d0e0;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.guest}</td><td style="font-size:8px;color:#4a5280">${r.nationality?r.nationality.split(" ")[0].slice(0,6):""}${r.natTier==="HIGH"?`<span class="nat-tag" style="background:#ef444420;color:#ef9090">!</span>`:r.natTier==="LOW"?`<span class="nat-tag" style="background:#22c55e20;color:#4ade80">ok</span>`:""}</td><td style="color:#6a7aaa">${fmt(r.arrival)}</td><td style="color:#6a7aaa">${r.nights}n</td><td style="color:${r.daysUntil<=7?"#ef4444":"#6a7aaa"};font-weight:${r.daysUntil<=7?800:400}">${r.daysUntil}d</td><td style="color:#ff6b6b;font-weight:700;font-size:9px">€${r.riskRev||0}</td><td style="color:#a78bfa;font-size:9px">${r.channel}</td><td style="color:#4a5280;font-size:9px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.offer}</td></tr>`});
    h+=`</table></div>`}
  // OVERBOOKING
  if(st.tab==="overbooking"){
    h+=`<div class="tbl">`;
    if(!ob.length){h+=`<div style="padding:40px;text-align:center;color:#3a4270">${Object.keys(D.availability).length?"Nenhuma oportunidade no período":"Faz upload dos Availability Reports"}</div>`}
    else{
      const obByProp={};ob.forEach(o=>{if(!obByProp[o.prop])obByProp[o.prop]={days:0,nights:0,rev:0};obByProp[o.prop].days++;obByProp[o.prop].nights+=o.ob;obByProp[o.prop].rev+=o.ob*o.avgRate});
      h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">`;
      PS.forEach(p=>{const d=obByProp[p]||{days:0,nights:0,rev:0};
        h+=`<div style="background:#12162a;border:1px solid ${d.nights>0?"#a78bfa30":"#1e2545"};border-radius:8px;padding:12px;text-align:center"><div style="font-size:8px;color:#4a5280;font-weight:700;letter-spacing:1px;margin-bottom:4px">${SH[p]}</div><div style="font-size:22px;font-weight:900;color:${d.nights>0?"#a78bfa":"#2a3050"}">+${d.nights}</div><div style="font-size:9px;color:#4a5280">${d.days} dias · €${Math.round(d.rev).toLocaleString()}</div></div>`});
      h+=`</div>`;
      h+=`<div style="background:#1e3a8a20;border:1px solid #1e3a8a40;border-radius:6px;padding:10px 14px;margin-bottom:14px"><div style="font-size:11px;font-weight:800;color:#93b4ff;margin-bottom:4px">📋 Como usar esta tabela</div><div style="font-size:9px;color:#6a7aaa;line-height:1.5">Cada linha = 1 dia onde podes abrir <b style="color:#a78bfa">apartamentos extra</b> à venda porque temos hóspedes HIGH risk que provavelmente vão cancelar.<br><b style="color:#f0f4ff">ABRIR À VENDA</b> = no Mews, cria uma reserva extra para o tipo de apartamento indicado (ou abre overbooking no Atomize para esse dia).<br><b style="color:#ef4444">QUEM PODE CANCELAR</b> = os hóspedes HIGH risk activos nesse dia (score entre parêntesis).</div></div>`;
      let lastWeekLabel="";
      h+=`<table><tr><th>DATA</th><th>DIA</th><th>PROP</th><th>OCUP</th><th style="color:#ef4444">HIGH</th><th style="color:#a78bfa">ABRIR</th><th>APARTAMENTO A VENDER</th><th>RATE</th><th style="max-width:200px">QUEM PODE CANCELAR</th></tr>`;
      ob.forEach(o=>{
        const weekLabel=o.month+" sem"+o.week;
        const showWeek=weekLabel!==lastWeekLabel;lastWeekLabel=weekLabel;
        if(showWeek)h+=`<tr><td colspan="9" style="padding:8px 0 4px;font-size:9px;font-weight:800;color:#4f6ef7;letter-spacing:1px;border-bottom:1px solid #1e2545">${weekLabel.toUpperCase()}</td></tr>`;
        h+=`<tr><td style="color:#c8d0e0;font-weight:700">${fmt(o.date)}</td><td style="color:#4a5280">${o.dow}</td><td style="color:#6a7aaa;font-size:9px">${SH[o.prop]||""}</td><td style="color:${o.occPct>=90?"#ef4444":"#f59e0b"};font-weight:800">${Math.round(o.occPct)}%</td><td style="color:#ef4444;font-weight:800">${o.nHigh}</td><td style="color:#a78bfa;font-weight:900;font-size:14px;text-align:center">+${o.ob}</td><td style="color:#f0f4ff;font-size:9px;font-weight:600">${o.roomsStr}</td><td style="color:#22c55e;font-weight:700">€${o.avgRate}</td><td style="color:#4a5280;font-size:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.hiGuests}</td></tr>`});
      h+=`</table>`;
      h+=`<div style="padding:10px;font-size:10px;color:#4a5280;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #1e2545;margin-top:8px"><span>${ob.length} dias com oportunidade · ${ob.reduce((s,o)=>s+o.ob,0)} noites extra</span><span style="color:#22c55e;font-weight:800;font-size:12px">€${Math.round(ob.reduce((s,o)=>s+o.ob*o.avgRate,0)).toLocaleString()} receita potencial</span></div>`}
    h+=`</div>`}
  h+=`</div>`;
  // PANEL
  if(sel){const bg=rc(sel.level);const pc=probColor(sel.prob||0);
    h+=`<div class="panel"><div style="padding:12px 14px;border-bottom:1px solid #1e2545;display:flex;justify-content:space-between;align-items:start"><div><h2>${sel.guest}</h2><h3>${sel.prop} — ${sel.room} — ${sel.roomType}</h3></div><button onclick="csel()" style="background:0;border:0;color:#4a5280;font-size:16px;cursor:pointer">✕</button></div>`;
    h+=`<div class="risk" style="background:${bg}18;border:1px solid ${bg}30"><span class="sc" style="color:${bg}">${sel.score}</span><span class="lv" style="color:${bg}">${sel.level}</span>${sel.override?`<span class="ov">${sel.override}</span>`:""}</div>`;
    h+=`<div style="margin:0 12px 8px;padding:10px 14px;background:#0c0f1a;border-radius:6px;border:1px solid #1e2545"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:9px;color:#4a5280;font-weight:700">PROBABILIDADE DE CANCELAR</span><span style="font-size:18px;font-weight:900;color:${pc}">${sel.prob||0}%</span></div><div style="background:#1e2545;border-radius:3px;height:8px;overflow:hidden"><div style="width:${sel.prob||0}%;height:100%;background:${pc};border-radius:3px;transition:width .3s"></div></div><div style="margin-top:6px;font-size:8px;color:#3a4270">€${sel.riskRev||0} revenue em risco (€${sel.total} × ${sel.prob||0}%)</div></div>`;
    h+=`<div style="padding:0 14px">`;
    [{l:"Arrival",v:fmt(sel.arrival)+" ("+sel.daysUntil+"d)"},{l:"Departure",v:fmt(sel.departure)},{l:"Noites",v:sel.nights},{l:"Rate",v:sel.rate},{l:"ADR",v:"€"+sel.adr},{l:"Total",v:"€"+sel.total},{l:"Canal",v:sel.source},{l:"Pagamento",v:sel.payment||"—"},{l:"Cartão",v:sel.cardType||"—"},{l:"Nacionalidade",v:(sel.nationality||"—")+(sel.natTier==="HIGH"?' <span class="nat-tag" style="background:#ef444420;color:#ef9090">HIGH RISK</span>':sel.natTier==="LOW"?' <span class="nat-tag" style="background:#22c55e20;color:#4ade80">LOW</span>':"")},{l:"Email",v:sel.isRelay?'<span style="color:#ef4444;font-weight:700">'+sel.email+'</span> <span class="nat-tag" style="background:#ef444420;color:#ef9090">RELAY</span>':sel.email||"—"},{l:"Tel",v:sel.phone||"—"},{l:"Genius",v:sel.isGenius?"Sim":"Não"},{l:"Parking",v:sel.hasParking?"Sim":"Não"},{l:"Pet",v:sel.hasPet?"Sim":"Não"},{l:"Duve",v:sel.duveCheckinNotes?"Check-in completo":"—"},{l:"Template",v:sel.template},{l:"Contactar via",v:sel.channel},{l:"Oferta",v:sel.offer}].forEach(d=>{h+=`<div class="row"><label>${d.l}</label><span>${d.v}</span></div>`});
    h+=`</div>`;
    if(sel.factors&&sel.factors.length){h+=`<div style="padding:10px 14px"><div style="font-size:8px;font-weight:800;color:#3a4270;letter-spacing:1.5px;margin-bottom:6px">FACTORES DE RISCO</div>`;sel.factors.forEach(f=>{h+=`<span class="ftag">${f}</span>`});h+=`</div>`}
    h+=`</div>`}
  h+=`</div>`;app.innerHTML=h;
}

function rupload(){
  const rC=pendingFiles.filter(f=>f.type==="reservation").length;
  const aC=pendingFiles.filter(f=>f.type==="availability").length;
  const dC=pendingFiles.filter(f=>f.type==="duve").length;
  let h=`<div class="hdr"><div class="logo"><i>CS</i><div><h1>CANCELLATION SHIELD</h1><small>v9 — INTELLIGENT MODEL — THE HAUS GROUP</small></div></div></div>`;
  h+=`<div class="up-zone"><div style="font-size:48px;margin-bottom:12px">🛡️</div><div style="font-size:18px;font-weight:800;color:#f0f4ff;margin-bottom:4px">Cancellation Shield v9</div><div style="font-size:11px;color:#4a5280;margin-bottom:24px">12 sinais · probabilidade calibrada · 87% precisão · 92% recall</div>`;

  // API Section
  h+=`<div class="api-section"><h3>🔗 Carregar da Mews API</h3><div class="msg">Conecta à Mews API para carregar dados ao vivo. Serão carregadas reservas, disponibilidade e informações de clientes.</div><button class="api-btn" onclick="fetchFromMews()" ${st.uping?'disabled':''}>${st.uping?'⏳ '+st.umsg:'🚀 Carregar dados ao vivo'}</button>${st.umsg&&st.uping?`<div class="api-status">${st.umsg}</div>`:''}${st.umsg&&!st.uping?`<div class="msg ${st.umsg.includes("❌")?"err":"ok"}">${st.umsg}</div>`:''}</div>`;

  h+=`<div style="text-align:center;margin:20px 0;color:#3a4270;font-size:10px;font-weight:700;letter-spacing:2px">OU</div>`;

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">`;
  h+=`<label class="up-box${rC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${rC?"✅":"📋"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Reservation Report</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${rC?rC+" ficheiro(s)":"Mews .xlsx (vários)"}</div><input type="file" accept=".xlsx" multiple onchange="addFiles('reservation',event)" style="display:none"></label>`;
  h+=`<label class="up-box${aC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${aC?"✅":"📊"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Availability Report</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${aC?aC+" ficheiro(s)":"Mews .xlsx (1/prop)"}</div><input type="file" accept=".xlsx" multiple onchange="addFiles('availability',event)" style="display:none"></label>`;
  h+=`<label class="up-box${dC?" ok":""}"><div style="font-size:24px;margin-bottom:6px">${dC?"✅":"👤"}</div><div style="font-size:11px;font-weight:700;color:#f0f4ff">Duve Export</div><div style="font-size:9px;color:#4a5280;margin-top:2px">${dC?"1 ficheiro":"CSV (opcional)"}</div><input type="file" accept=".csv" onchange="addFiles('duve',event)" style="display:none"></label>`;
  h+=`</div>`;
  const btnText=st.uping?"⏳ "+st.umsg:("🚀 Processar ("+pendingFiles.length+" ficheiros)");
  h+=`<button class="up-btn" onclick="processFiles()" ${rC&&!st.uping?"":"disabled"}>${btnText}</button>`;
  if(st.umsg&&!st.uping)h+=`<div class="msg ${st.umsg.includes("❌")?"err":"ok"}">${st.umsg}</div>`;
  // Show processing log
  if(D.log.length){h+=`<div style="margin-top:16px;text-align:left;background:#12162a;border-radius:6px;padding:10px;font-size:9px;max-height:150px;overflow-y:auto">`;D.log.forEach(l=>{h+=`<div style="color:${l.includes("❌")?"#ef4444":"#22c55e"};margin-bottom:2px">${l}</div>`});h+=`</div>`}
  h+=`</div>`;return h;
}

function sp(p){st.prop=p;st.sel=null;render()}
function stab(t){st.tab=t;render()}
function sd(d){st.viewDays=d;render()}
function np(){const d=new Date(st.vs+"T12:00:00");d.setDate(d.getDate()-st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nn(){const d=new Date(st.vs+"T12:00:00");d.setDate(d.getDate()+st.viewDays);st.vs=d.toISOString().split("T")[0];render()}
function nt(){const d=new Date();d.setDate(d.getDate()-1);st.vs=d.toISOString().split("T")[0];render()}
function sel(id){st.sel=D.reservations.find(r=>r.id===id)||null;render()}
function csel(){st.sel=null;render()}

render();
</script>
</body>
</html>
